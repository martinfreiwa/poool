- id: kyc.identity-verification
  page_type: page
  name: Identity verification
  url_path: /kyc
  route_aliases: []
  source_template: frontend/platform/kyc.html
  backend_route:
    file: backend/src/kyc/mod.rs
    handler: page_kyc
  related_js: []
  related_css: []
  access_level: authenticated user
  data_sensitivity: KYC/identity data
  business_risk: high
  owner: unassigned
  notes: '2026-04-28 page audit report and fix pass: docs/page-audits/2026-04-28-kyc-identity-verification.md.
    Fixed upload CSRF, manual document linking, identity/profile persistence, transactional
    audit rows, KYC rate limits, provider-return status verification, and document/file
    constants. Authenticated browser/API recheck remains; durable email outbox and
    private-storage orphan cleanup are still documented.'
  reviews:
    security_review:
      status: issues found
      last_review_date: '2026-04-28'
      reviewer: ChatGPT/Codex
      reviewed_git_commit_sha: bc6f1d187f134f741632dc8adee9e257d0065faf
      next_review_due_date: '2026-05-28'
      evidence: Static review of frontend/platform/kyc.html, frontend/platform/static/js/kyc-page.js,
        backend/src/kyc/routes.rs, backend/src/kyc/service.rs, backend/src/storage/routes.rs,
        backend/src/auth/csrf.rs, docs/DATABASE_SCHEMA.md, and database/018_gcs_file_storage.sql.
        node --check, cargo fmt --check, and targeted KYC static pytest passed. Full
        cargo check was blocked by concurrent Cargo build activity in the shared workspace.
      findings_summary: Manual KYC now requires a linked user-owned document, mutation
        audit rows are transactional, and KYC submit/initiate/upload have user-scoped
        rate limits. Remaining risks are durable email outbox/retry support and cleanup
        for private storage objects if a later DB/audit write fails.
    accessibility_review:
      status: needs recheck
      last_review_date: '2026-04-28'
      reviewer: ChatGPT/Codex
      reviewed_git_commit_sha: bc6f1d187f134f741632dc8adee9e257d0065faf
      next_review_due_date: '2026-05-28'
      evidence: Static review of labels, wizard buttons, upload control, progress
        indicator, status states, and Alpine-rendered review fields. Browser keyboard/mobile
        checks were blocked because no local backend was listening on :8888.
      findings_summary: Main fields have labels and review output uses x-text, but
        file upload and drag/drop controls need authenticated keyboard/mobile/browser
        recheck after the CSRF fix; status/loading/error live-region behavior was
        not browser-verified.
    e2e_review:
      status: needs recheck
      last_review_date: '2026-04-28'
      reviewer: ChatGPT/Codex
      reviewed_git_commit_sha: bc6f1d187f134f741632dc8adee9e257d0065faf
      next_review_due_date: '2026-05-28'
      evidence: node --check frontend/platform/static/js/kyc-page.js passed; cd backend
        && cargo fmt --check passed; python3 -m pytest tests/test_kyc_identity_static.py
        -q passed. Full cargo check was blocked by concurrent Cargo build activity;
        authenticated browser/API coverage remains missing for file upload/manual
        submit.
      findings_summary: Static regression coverage now covers the fixed contracts.
        Authenticated browser/API coverage is still missing for file upload, manual
        submit, provider return, CSRF rejection/success, and DB state verification.
    functional_review:
      status: issues found
      last_review_date: '2026-04-28'
      reviewer: ChatGPT/Codex
      reviewed_git_commit_sha: bc6f1d187f134f741632dc8adee9e257d0065faf
      next_review_due_date: '2026-05-28'
      evidence: Static route/template/JS/backend/schema/test review plus node --check,
        cargo fmt --check, and targeted KYC static pytest. Runtime browser/API smoke
        remains blocked by lack of seeded authenticated KYC fixture and Cargo contention.
      findings_summary: Upload CSRF, manual document linking, manual identity/profile
        persistence, provider-return status verification, and document/file constants
        are fixed in code. Authenticated browser/API recheck remains.
  issues:
  - issue_id: PAGE-ISSUE-0540
    review_category: functional_review
    severity: high
    title: KYC document upload omits CSRF header
    description: The manual KYC upload control posts FormData through XMLHttpRequest
      without setting X-CSRF-Token. The global CSRF helper only patches fetch, HTMX,
      and normal form submissions, while the backend CSRF middleware protects POST
      /api/upload/kyc. Authenticated browser uploads are therefore expected to fail
      with 403 before creating a kyc_documents row.
    affected_page_route: /kyc
    status: fixed
    owner: unassigned
    date_found: '2026-04-28'
    date_fixed: '2026-04-28'
    fixed_in_commit_or_pr: local working tree
    recheck_required: true
    notes: Fixed by reading csrf_token and setting X-CSRF-Token on the upload XHR
      before send; static regression added in tests/test_kyc_identity_static.py.
  - issue_id: PAGE-ISSUE-0541
    review_category: security_review
    severity: high
    title: Manual KYC submit allows records without documents
    description: POST /api/kyc/submit accepts document_id as optional and inserts
      a pending manual kyc_records row even when no document is supplied. When a document_id
      is supplied, the link update is best-effort and does not verify that exactly
      one user-owned pending document was linked.
    affected_page_route: /kyc
    status: fixed
    owner: unassigned
    date_found: '2026-04-28'
    date_fixed: '2026-04-28'
    fixed_in_commit_or_pr: local working tree
    recheck_required: true
    notes: Fixed by requiring document_id and transactionally updating exactly one
      same-user pending kyc_documents row with kyc_record_id IS NULL.
  - issue_id: PAGE-ISSUE-0542
    review_category: functional_review
    severity: high
    title: Manual KYC drops entered identity fields
    description: The manual wizard collects date of birth, nationality, address, city,
      and country and sends them to /api/kyc/submit, but submit_kyc only best-effort
      updates first_name and last_name in user_profiles and stores only document_type
      in kyc_records.
    affected_page_route: /kyc
    status: fixed
    owner: unassigned
    date_found: '2026-04-28'
    date_fixed: '2026-04-28'
    fixed_in_commit_or_pr: local working tree
    recheck_required: true
    notes: Fixed by validating and upserting DOB, nationality, address, city, and
      country into user_profiles during manual KYC submit.
  - issue_id: PAGE-ISSUE-0543
    review_category: security_review
    severity: medium
    title: KYC mutation audit and email side effects are swallowed
    description: KYC initiation, manual submit, webhook-derived updates, and document
      upload use best-effort audit/email/notification writes after the main mutation.
      Failed audit logging can leave sensitive identity workflow changes without durable
      audit evidence.
    affected_page_route: /kyc
    status: partially fixed
    owner: unassigned
    date_found: '2026-04-28'
    date_fixed: '2026-04-28'
    fixed_in_commit_or_pr: local working tree
    recheck_required: true
    notes: Required audit writes are now transactional for KYC initiate, manual submit,
      webhook updates, and document upload. Remaining email enqueue is logged but
      not durable/retried through an outbox.
  - issue_id: PAGE-ISSUE-0544
    review_category: security_review
    severity: medium
    title: KYC initiate submit and upload lack route rate limits
    description: Authenticated users can repeatedly initiate KYC sessions, submit
      manual applications, and upload 10 MB identity documents without endpoint-specific
      throttling, creating account-level spam and storage-cost abuse risk.
    affected_page_route: /kyc
    status: fixed
    owner: unassigned
    date_found: '2026-04-28'
    date_fixed: '2026-04-28'
    fixed_in_commit_or_pr: local working tree
    recheck_required: true
    notes: Fixed with user-scoped kyc:initiate, kyc:submit, and kyc:upload rate-limit
      keys.
  - issue_id: PAGE-ISSUE-0545
    review_category: functional_review
    severity: medium
    title: Provider return can display unverified in-review status
    description: After a provider redirect is initiated, initKyc trusts the poool_kyc_pending
      localStorage flag and immediately displays in_review without fetching backend
      status, so a canceled or failed provider flow can look submitted until refresh.
    affected_page_route: /kyc
    status: fixed
    owner: unassigned
    date_found: '2026-04-28'
    date_fixed: '2026-04-28'
    fixed_in_commit_or_pr: local working tree
    recheck_required: true
    notes: Fixed by removing the localStorage early return and always fetching /api/kyc/status.
  - issue_id: PAGE-ISSUE-0546
    review_category: functional_review
    severity: low
    title: KYC document type and file accept options are inconsistent
    description: The redirect flow sends driving_license while the manual upload route
      accepts driving_licence, and the browser file picker accepts image/* even though
      the backend rejects GIF and the UI hint lists only PNG, JPG, or PDF.
    affected_page_route: /kyc
    status: fixed
    owner: unassigned
    date_found: '2026-04-28'
    date_fixed: '2026-04-28'
    fixed_in_commit_or_pr: local working tree
    recheck_required: true
    notes: Fixed by using driving_licence in the template, normalizing legacy driving_license
      backend input, and matching accept/copy to JPEG, PNG, WebP, and PDF.
  - issue_id: PAGE-ISSUE-0550
    review_category: security_review
    severity: medium
    title: KYC email delivery still lacks durable outbox
    description: KYC submit/initiate email enqueue happens after the DB transaction
      and failures are logged, but there is no durable outbox/retry table to guarantee
      notification delivery or operator retry.
    affected_page_route: /kyc
    status: open
    owner: unassigned
    date_found: '2026-04-28'
    date_fixed: null
    fixed_in_commit_or_pr: ''
    recheck_required: true
    notes: Add a transactional email outbox or retryable notification job for KYC
      lifecycle email events.
  - issue_id: PAGE-ISSUE-0566
    review_category: functional_review
    severity: low
    title: KYC upload can orphan private object after DB failure
    description: The upload route writes bytes to private storage before starting
      the DB/audit transaction. If the later DB insert, audit row, or commit fails,
      the private object can remain unreferenced until cleanup tooling removes it.
    affected_page_route: /kyc
    status: open
    owner: unassigned
    date_found: '2026-04-28'
    date_fixed: null
    fixed_in_commit_or_pr: ''
    recheck_required: true
    notes: Add best-effort object deletion on DB/audit failure or a scheduled cleanup
      job for unreferenced private KYC objects.
