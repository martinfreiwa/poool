      status: issues found
      last_review_date: '2026-04-25'
      reviewer: ChatGPT/Codex
      reviewed_git_commit_sha: 6165b1c8d8734648e5a6c07a7f1f7979f690acd9
      next_review_due_date: null
      evidence: Static review of frontend/platform/admin/affiliate-applications.html, frontend/platform/admin/js/admin-affiliate-applications.js,
        backend/src/admin/rewards.rs, backend/src/admin/pages.rs, backend/src/admin/extractors.rs; runtime unauthenticated curl checks for auth/CSRF.
      findings_summary: Approve endpoint ignores admin-supplied referral_code/commission_rate_bps; pending API swallows DB errors; inline handler
        string rendering increases injection surface; missing fine-grained permission checks for affiliate management.
    accessibility_review:
      status: issues found
      last_review_date: '2026-04-25'
      reviewer: ChatGPT/Codex
      reviewed_git_commit_sha: 6165b1c8d8734648e5a6c07a7f1f7979f690acd9
      next_review_due_date: null
      evidence: Static template review of details/approve/reject modals (no aria roles, no focus management, no ESC close).
      findings_summary: Modals lack baseline dialog accessibility (role/aria, focus trap, keyboard close) and rely on click-only dismiss.
    e2e_review:
      status: needs recheck
      last_review_date: '2026-04-25'
      reviewer: ChatGPT/Codex
      reviewed_git_commit_sha: 6165b1c8d8734648e5a6c07a7f1f7979f690acd9
      next_review_due_date: null
      evidence: Local cargo run server start; unauthenticated curl checks for page/API auth + CSRF behavior. No authenticated admin session available.
      findings_summary: Auth and CSRF protections responded as expected in unauthenticated smoke, but approve/reject flows were not executed with an
        admin session and must be rechecked after contract fixes.
    functional_review:
      status: issues found
      last_review_date: '2026-04-25'
      reviewer: ChatGPT/Codex
      reviewed_git_commit_sha: 6165b1c8d8734648e5a6c07a7f1f7979f690acd9
      next_review_due_date: null
      evidence: Static review of template + JS wiring; backend review of pending/approve/reject endpoints; runtime unauthenticated curl returned 401 for
        pending API and 403 for CSRF-missing POSTs.
      findings_summary: Page is wired, but approve modal contract is inconsistent with backend; KPIs and details modal fields are incomplete and require
        backend payload alignment.
  issues:
  - issue_id: PAGE-ISSUE-0024
    review_category: functional_review
    severity: high
    title: Approve modal inputs are ignored by backend approval handler
    description: Frontend POSTs referral_code + commission_rate_bps from the approve modal, but backend api_admin_affiliate_approve does not accept a JSON
      payload and instead hardcodes 50 bps and generates a random referral code, overriding operator intent.
    affected_page_route: /admin/affiliate-applications
    status: open
    owner: unassigned
    date_found: '2026-04-25'
    date_fixed: null
    fixed_in_commit_or_pr: ''
    recheck_required: true
    notes: See docs/page-audits/2026-04-25-admin-affiliate-applications.md.
  - issue_id: PAGE-ISSUE-0025
    review_category: functional_review
    severity: high
    title: Pending applications API can silently return empty on DB error
    description: GET /api/admin/rewards/affiliates/pending uses unwrap_or_default on the DB query, returning 200 with an empty pending list when the query
      fails; this can hide real pending applications from admins.
    affected_page_route: /admin/affiliate-applications
    status: open
    owner: unassigned
    date_found: '2026-04-25'
    date_fixed: null
    fixed_in_commit_or_pr: ''
    recheck_required: true
    notes: See docs/page-audits/2026-04-25-admin-affiliate-applications.md.
  - issue_id: PAGE-ISSUE-0026
    review_category: functional_review
    severity: medium
    title: Details modal and KPI cards show incomplete/placeholder data
    description: The details modal expects user_name and tax_id, but /pending does not return them. KPI cards for active affiliates and rejected apps are
      never updated by page JS and remain as '—'.
    affected_page_route: /admin/affiliate-applications
    status: open
    owner: unassigned
    date_found: '2026-04-25'
    date_fixed: null
    fixed_in_commit_or_pr: ''
    recheck_required: true
    notes: See docs/page-audits/2026-04-25-admin-affiliate-applications.md.
  - issue_id: PAGE-ISSUE-0027
    review_category: security_review
    severity: medium
    title: Inline onclick and HTML string rendering increase XSS/injection surface
    description: The page renders pending rows with inline onclick handlers using app.id interpolation and uses innerHTML to render details URLs. While URLs
      are escaped, the pattern is brittle and avoidable in an admin-only surface handling user-provided fields.
    affected_page_route: /admin/affiliate-applications
    status: open
    owner: unassigned
    date_found: '2026-04-25'
    date_fixed: null
    fixed_in_commit_or_pr: ''
    recheck_required: true
    notes: See docs/page-audits/2026-04-25-admin-affiliate-applications.md.
  - issue_id: PAGE-ISSUE-0028
    review_category: accessibility_review
    severity: medium
    title: Modals lack baseline dialog accessibility and keyboard handling
    description: Details/approve/reject modals have no role/aria wiring, no focus management, and no ESC-to-close behavior, making keyboard-only navigation
      unreliable.
    affected_page_route: /admin/affiliate-applications
    status: open
    owner: unassigned
    date_found: '2026-04-25'
    date_fixed: null
    fixed_in_commit_or_pr: ''
    recheck_required: true
    notes: See docs/page-audits/2026-04-25-admin-affiliate-applications.md.
  - issue_id: PAGE-ISSUE-0029
    review_category: functional_review
    severity: low
    title: Unauthenticated admin page GET returns JSON 401 instead of redirecting to login
    description: Because AdminUser rejection is ApiError (JSON), GET /admin/affiliate-applications returns a JSON 401 response rather than redirecting to a
      login page, which is confusing for normal browser navigation.
    affected_page_route: /admin/affiliate-applications
    status: open
    owner: unassigned
    date_found: '2026-04-25'
    date_fixed: null
    fixed_in_commit_or_pr: ''
    recheck_required: true
    notes: See docs/page-audits/2026-04-25-admin-affiliate-applications.md.
  - issue_id: PAGE-ISSUE-0030
    review_category: security_review
    severity: high
    title: Affiliate approval/rejection APIs lack fine-grained permission checks
    description: Affiliate management endpoints (pending/approve/reject/suspend/payout/clawback) require only AdminUser (admin or super_admin role) and do
      not enforce a dedicated permission like affiliates.manage, increasing blast radius if an admin account is compromised or roles are overly broad.
    affected_page_route: /admin/affiliate-applications
    status: open
    owner: unassigned
    date_found: '2026-04-25'
    date_fixed: null
    fixed_in_commit_or_pr: ''
    recheck_required: true
    notes: See docs/page-audits/2026-04-25-admin-affiliate-applications.md.
  - issue_id: PAGE-ISSUE-0031
    review_category: security_review
    severity: medium
    title: Reject flow is not transactional with audit logging
    description: POST /api/admin/rewards/affiliates/:id/reject updates affiliates.status before writing to audit_logs and sending email; if audit insert fails,
      the rejection has no durable compliance record. The status update and audit insert should be in one DB transaction.
    affected_page_route: /admin/affiliate-applications
    status: open
    owner: unassigned
    date_found: '2026-04-25'
    date_fixed: null
    fixed_in_commit_or_pr: ''
    recheck_required: true
    notes: See docs/page-audits/2026-04-25-admin-affiliate-applications.md.
  last_tested_date: '2026-04-25'
