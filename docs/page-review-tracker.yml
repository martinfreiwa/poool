      evidence: Static source review found /payment-in-progress polling expects deposit.order_id,
        while backend/src/main.rs selected a non-schema/incorrectly typed order_id
        field from deposit_requests. Fixed by returning an explicit nullable text
        order_id field and casting created_at to text.
      findings_summary: Fixed. Deposit status polling no longer fails while constructing
        the status payload when no order link exists for wallet deposits.
  issues:
  - issue_id: PAGE-ISSUE-0011
    review_category: functional_review
    severity: high
    title: Deposit status polling can break when a paid deposit has an order_id
    description: The /payment-in-progress page polls /api/deposits/:deposit_id/status
      and redirects to /payment-success when order_id is present. The registered handler
      in backend/src/main.rs reads deposit_requests.order_id as Option<String>, but
      order_id is a UUID column. A paid deposit with an order_id can therefore fail
      during response construction or omit the usable redirect target, leaving users
      stuck on the pending page after funds are credited.
    affected_page_route: /payment-in-progress
    status: fixed
    owner: ''
    date_found: '2026-04-24'
    date_fixed: '2026-04-24'
    fixed_in_commit_or_pr: local working tree
    recheck_required: true
    notes: 'Evidence: frontend/platform/static/js/payment-in-progress.js:554-562 expects
      deposit.order_id; backend/src/main.rs:1986-2003 selected order_id from deposit_requests
      even though the current schema does not define that column. Fix: the status
      query now returns NULL::text AS order_id and created_at::text, preserving the
      frontend payload shape without selecting a missing/incorrectly typed column.
      Fix: Deposit status now returns order_id::text instead of a null/incorrectly
      decoded order_id field, preserving paid-deposit redirect data.'
  last_tested_date: null
