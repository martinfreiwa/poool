      exists. See docs/page-audits/2026-04-26-admin-reports.md.
  - issue_id: PAGE-ISSUE-0275
    review_category: functional_review
    severity: high
    title: Download flow can export error JSON as success
    description: downloadReport does not require resp.ok for CSV/JSON exports, so
      403, 400, or 500 JSON responses can be converted into downloaded files with
      success feedback.
    affected_page_route: /admin/reports
    status: fixed
    owner: unassigned
