    review_category: security_review
    severity: critical
    title: Emergency pause/unpause sends an empty CSRF header
    description: 'admin-blockchain-treasury.js reads a non-existent meta[name="csrf-token"] value and sends X-CSRF-Token:
      "" on emergency pause/unpause POSTs. The global fetch interceptor treats the header as already present, so it does not
