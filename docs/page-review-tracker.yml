      exists.
    affected_page_route: /marketplace-trading-v3
    status: fixed
    owner: ''
    date_found: '2026-04-24'
    date_fixed: '2026-04-24'
    fixed_in_commit_or_pr: local working tree
    recheck_required: false
    notes: 'Evidence: backend/src/marketplace/models.rs SecondaryAsset uses #[serde(rename_all = "camelCase")]; frontend/platform/static/js/marketplace-trading-v3.js
      checks rawAsset.buy_interest. Fix: V3 now reads rawAsset.buyInterest with a snake_case fallback.'
