ambiguous_entries:
- id: platform.profile-template
  kind: route/template
  path_or_route: /profile -> frontend/platform/profile.html
  reason: Route handler exists, but the referenced template is missing.
  recommended_follow_up: Confirm whether /profile should be removed, redirected, or
    backed by a template.
- id: admin.affiliate-fraud-template
  kind: route/template
  path_or_route: /admin/affiliate-fraud -> admin/affiliate-fraud.html
  reason: Backend generic route expects admin/affiliate-fraud.html, but the repo has
    admin/admin-affiliate-fraud.html.
  recommended_follow_up: Rename the template or add an explicit route for the existing
    file.
- id: admin.static-fallback-pages
  kind: access-control
  path_or_route: /admin/asset-change-requests.html, /admin/asset-change-review.html,
    /admin/pending-settlements.html, /admin/storage.html
  reason: These admin-looking pages have no explicit server-side admin route in backend/src/admin/mod.rs
    and may rely on static fallback plus client-side guards.
  recommended_follow_up: Add server-side admin routes or confirm static fallback exposure
    is acceptable.
- id: static-html-fallback
  kind: routing
  path_or_route: frontend/platform/**/*.html
  reason: platform_router fallback serves files under frontend/platform directly,
    so some templates may be reachable without their clean Axum route semantics.
  recommended_follow_up: Confirm which .html direct URLs are intended public surface
    and block internal templates if needed.
