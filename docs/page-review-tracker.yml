- id: developer.application-form
  page_type: page
  name: Developer application form
  url_path: /developer/application-form
  route_aliases: []
  source_template: frontend/platform/developer/application-form.html
  backend_route:
    file: backend/src/developer/mod.rs
    handler: page_developer_application_form
  related_js:
  - frontend/platform/static/js/developer-application-form.js
  related_css:
  - frontend/platform/static/css/developer-application-form.css
  - frontend/platform/static/css/mobile-developer-application-form.css
  access_level: authenticated user
  data_sensitivity: personal data
  business_risk: high
  owner: unassigned
  notes: '2026-04-25 production-readiness start: hardened draft pricing/property validation in backend, prevented stale-draft
    fallback from duplicating assets on validation/permission errors, and stopped Save & Exit from navigating after failed
    saves. Full authenticated browser and E2E pass still required.'
  reviews:
    security_review:
      status: needs recheck
      last_review_date: '2026-04-25'
      reviewer: ChatGPT/Codex
      reviewed_git_commit_sha: ''
      next_review_due_date: null
      evidence: Static review of frontend/platform/static/js/developer-application-form.js and backend/src/developer/routes.rs;
        added server-side type/range validation for asset type, property dimensions, years, cents, minimum share price, and
        derived token count.
      findings_summary: Server no longer trusts client-provided token counts or malformed pricing values. Authenticated browser
        abuse cases and cross-user API recheck still needed.
    accessibility_review:
      status: needs recheck
      last_review_date: '2026-04-25'
      reviewer: ChatGPT/Codex
      reviewed_git_commit_sha: ''
      next_review_due_date: null
      evidence: No visual or keyboard browser pass performed in this change; existing inline error rendering was preserved.
      findings_summary: Needs a dedicated keyboard/mobile pass for custom dropdowns, field errors, and toast dismissal.
    e2e_review:
      status: needs recheck
      last_review_date: '2026-04-25'
      reviewer: ChatGPT/Codex
      reviewed_git_commit_sha: ''
      next_review_due_date: null
      evidence: node --check passed and cargo check passed. cargo test developer::routes::draft_validation_tests was blocked
        by an existing payments/service.rs test compile error unrelated to this page.
      findings_summary: Needs full authenticated draft create/update/resume browser or Python E2E pass once the existing test
        compile blocker is cleared.
    functional_review:
      status: needs recheck
      last_review_date: '2026-04-25'
      reviewer: ChatGPT/Codex
      reviewed_git_commit_sha: ''
      next_review_due_date: null
      evidence: Code fixes in backend/src/developer/routes.rs and frontend/platform/static/js/developer-application-form.js;
        verified JavaScript syntax and backend compilation.
      findings_summary: Fixed broad PUT-to-POST fallback, fake-success Save & Exit, missing draft ID navigation risk, and
        backend draft shape validation gaps. Needs runtime browser recheck.
  issues:
  - issue_id: PAGE-ISSUE-0056
    review_category: functional_review
    severity: high
    title: Application form duplicates assets on non-stale PUT failures
    description: When saving an existing draft failed for validation, permission, or state reasons, the frontend cleared the
      draft ID and retried POST /api/developer/draft, creating a new draft instead of showing the real error.
    affected_page_route: /developer/application-form
    status: fixed
    owner: unassigned
    date_found: '2026-04-25'
    date_fixed: '2026-04-25'
    fixed_in_commit_or_pr: local working tree
    recheck_required: true
    notes: Fallback is now limited to 404/410 stale draft responses.
  - issue_id: PAGE-ISSUE-0057
    review_category: functional_review
    severity: high
    title: Save & Exit navigates away after failed saves
    description: Save & Exit redirected to /developer/submissions even when the draft save failed, making users believe unsaved
      data had been persisted.
    affected_page_route: /developer/application-form
    status: fixed
    owner: unassigned
    date_found: '2026-04-25'
    date_fixed: '2026-04-25'
    fixed_in_commit_or_pr: local working tree
    recheck_required: true
    notes: Save failures now keep the user on the page and display the API/network error.
  - issue_id: PAGE-ISSUE-0058
    review_category: security_review
    severity: high
    title: Draft API accepted malformed asset pricing and property numbers
    description: The backend relied heavily on client-side validation and accepted negative/out-of-range values and client-provided
      token counts that could diverge from purchase price and share price.
    affected_page_route: /developer/application-form
    status: fixed
    owner: unassigned
    date_found: '2026-04-25'
    date_fixed: '2026-04-25'
    fixed_in_commit_or_pr: local working tree
    recheck_required: true
    notes: Backend now validates ranges and derives tokens_total from total_value_cents/token_price_cents.
  last_tested_date: '2026-04-25'
