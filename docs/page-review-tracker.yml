      evidence: ''
      findings_summary: ''
    functional_review:
      status: fixed
      last_review_date: '2026-04-24'
      reviewer: Codex low-risk-fixes
      reviewed_git_commit_sha: ''
      next_review_due_date: null
      evidence: Static source review found add_to_cart could attempt a zero-token insert for sold-out assets. Fixed by adding
        a server-side tokens_available/tokens_to_buy guard, preserving /cart?error=sold_out redirects, and rendering a cart
        page alert.
      findings_summary: Fixed. Sold-out assets are blocked before cart_items insert and produce a visible cart-page error.
  issues:
  - issue_id: PAGE-ISSUE-0014
    review_category: functional_review
    severity: medium
    title: Sold-out asset add-to-cart redirects silently instead of returning a user error
    description: When tokens_available is zero, add_to_cart computes tokens_to_buy as 0 and attempts to insert the cart item.
      The cart_items table requires tokens_quantity > 0, so the insert fails and the handler redirects to /cart without a
      specific sold-out response. The user receives no clear explanation that the asset is unavailable.
    affected_page_route: /cart
    status: fixed
    owner: ''
    date_found: '2026-04-24'
    date_fixed: '2026-04-24'
    fixed_in_commit_or_pr: local working tree
    recheck_required: true
    notes: 'Evidence: backend/src/cart/routes.rs:221-245 allows tokens_to_buy=0 when _tokens_available=0, while database/001_initial_schema.sql:331
      has CHECK (tokens_quantity > 0); error path at routes.rs:247-250 redirects to /cart. Fix: backend/src/cart/routes.rs
      now redirects sold-out/non-positive token adds to /cart?error=sold_out; cart.js renders a visible alert and property
      detail add-to-cart scripts preserve the query string. Fix: Add-to-cart now blocks sold-out/non-positive token quantities
      before insert and redirects with error=sold_out; the cart page already surfaces that error.'
  last_tested_date: null
