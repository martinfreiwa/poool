      findings_summary: 'Unauthenticated Playwright smoke redirected /wallet to /auth/login with no console errors. Static
        review: authenticated wallet route protected; payment-method mutating requests rely on global fetch CSRF injection.'
    accessibility_review:
      status: needs recheck
      last_review_date: '2026-04-24'
      reviewer: Codex automation poool-page-reviews
      reviewed_git_commit_sha: 3c10b5af0a24b4b817cf0c54bbb1bf28e4a27406
      next_review_due_date: '2026-05-24'
      evidence: 'Heartbeat 2026-04-24: tracker audit, localhost Playwright unauthenticated route smoke, curl header checks,
        and static source review. Browser Use plugin guidance used, but in-app browser backend was unavailable in this session.'
      findings_summary: Unauthenticated browser smoke completed where applicable, but full keyboard/focus/contrast checks
        require authenticated page access and a11y tooling.
    e2e_review:
      status: needs recheck
      last_review_date: '2026-04-24'
      reviewer: Codex automation poool-page-reviews
      reviewed_git_commit_sha: 3c10b5af0a24b4b817cf0c54bbb1bf28e4a27406
      next_review_due_date: '2026-05-24'
      evidence: 'Heartbeat 2026-04-24: tracker audit, localhost Playwright unauthenticated route smoke, curl header checks,
        and static source review. Browser Use plugin guidance used, but in-app browser backend was unavailable in this session.'
      findings_summary: 'Unauthenticated Playwright smoke redirected /wallet to /auth/login with no console errors. Static
        review: authenticated wallet route protected; payment-method mutating requests rely on global fetch CSRF injection.
        Authenticated happy-path and failure-state E2E still require seeded credentials/test data.'
    functional_review:
      status: issues found
      last_review_date: '2026-04-24'
      reviewer: Codex investor-dashboard-audit
      reviewed_git_commit_sha: 3c10b5af0a24b4b817cf0c54bbb1bf28e4a27406
      next_review_due_date: '2026-05-24'
      evidence: Static source review found wallet.html falls back from Stripe Elements to a manual card flow that generates
        a manual_* mock token and submits it to /api/payment-methods/card.
      findings_summary: Card saving can persist mock/manual payment method identifiers when Stripe is unavailable or unconfigured.
  issues:
  - issue_id: PAGE-ISSUE-0010
    review_category: functional_review
    severity: high
    title: Wallet card save can persist mock manual payment tokens
    description: When Stripe Elements is not available, the wallet card modal accepts manually typed card details, generates
      a manual_* token client-side, and posts it to the real /api/payment-methods/card endpoint. This records a card-like
      payment method that is not a real processor token and can mislead users/admins about whether card payments are usable.
    affected_page_route: /wallet
    status: fixed
    owner: ''
    date_found: '2026-04-24'
    date_fixed: '2026-04-24'
    fixed_in_commit_or_pr: ''
    recheck_required: true
    notes: 'Evidence: frontend/platform/wallet.html manual fallback generates stripeId = "manual_" + brand + last4 + Date.now();
      backend/src/payment_methods/routes.rs handle_add_card persists submitted stripe_payment_method_id via service::attach_card.
      Fix: Wallet card saving now requires Stripe configuration/client PaymentMethod IDs, disables the fallback form when
      Stripe is unavailable, and rejects non-pm_ tokens server-side.'
  last_tested_date: '2026-04-24'
