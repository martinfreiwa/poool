schema_version: 1
tracker_name: POOOL Page Review Tracker
generated_date: '2026-04-26'
inventory_source_commit_sha: 3c10b5af0a24b4b817cf0c54bbb1bf28e4a27406
source_of_truth: docs/page-review-tracker.yml
human_report: docs/PAGE_REVIEW_TRACKER.md
audit_script: scripts/audit_page_review_tracker.py
allowed_access_levels:
- public
- authenticated user
- verified investor
- developer
- admin
- support/admin role
- unknown or needs verification
allowed_data_sensitivity:
- public
- personal data
- financial data
- KYC/identity data
- admin-only data
- mixed sensitive data
- unknown
allowed_business_risk:
- critical
- high
- medium
- low
allowed_review_statuses:
- not reviewed
- reviewed
- issues found
- fixed
- needs recheck
- stale
- not applicable
allowed_issue_severities:
- critical
- high
- medium
- low
- info
allowed_issue_statuses:
- open
- in progress
- fixed
- needs recheck
- closed
- accepted risk
status_legend:
- not reviewed
- reviewed
- issues found
- fixed
- needs recheck
- stale
- not applicable
severity_legend:
- critical
- high
- medium
- low
- info
freshness_policy:
  critical: Review every 30 days or after any meaningful code change.
  high: Review every 60 days or after any meaningful code change.
  medium: Review every 90 days or after any meaningful code change.
  low: Review every 180 days or after any meaningful code change.
  pull_request_rule: Any page touched in a PR should be checked against this tracker before release.
recommended_review_capabilities:
- name: Browser Use
  status: already installed
  purpose: Best for opening local pages, clicking through flows, screenshots, responsive checks, and console errors.
- name: Playwright/E2E review skill
  status: useful if available
  purpose: Useful because this tracker needs repeatable page testing and route coverage checks.
- name: Accessibility/a11y audit skill
  status: useful if available
  purpose: Useful for keyboard, focus, labels, contrast, modal/dropdown checks.
- name: Security review skill
  status: useful if available
  purpose: Useful for auth/authorization, CSRF, sensitive-data leaks, upload handling, and admin-route exposure.
review_checklists:
  security_review:
  - authentication required where expected
  - authorization and role checks verified server-side
  - CSRF protection checked for state-changing actions
  - no sensitive data leaked into HTML, JS, logs, or URLs
  - all financial logic verified server-side
  - all monetary values handled as integer cents
  - form inputs validated server-side
  - file uploads validated where applicable
  - rate limits or abuse controls considered
  - no unsafe unwraps or panics in production paths
  accessibility_review:
  - keyboard navigation works
  - focus states are visible
  - form fields have labels
  - buttons and links have accessible names
  - color contrast meets expected standards
  - headings are semantic and ordered
  - errors are announced or visible clearly
  - modals/dropdowns are usable with keyboard
  - page works at mobile and desktop sizes
  e2e_review:
  - happy path tested
  - important failure states tested
  - authentication/authorization behavior tested
  - redirects tested
  - form validation tested
  - relevant backend state verified
  - no console errors during normal use
  - page works with realistic data
  functional_review:
  - page loads successfully
  - all primary actions work
  - empty/loading/error states work
  - navigation links work
  - server-rendered data is correct
  - client-side JS behavior works
  - responsive layout works
  - no obvious visual regressions
