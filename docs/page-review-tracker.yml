  issues:
  - issue_id: PAGE-ISSUE-0015
    review_category: functional_review
    severity: medium
    title: Support ticket attachments can be silently dropped when storage upload fails
    description: "The support form accepts attachments and submits multipart data. The backend validates and uploads the file,\
      \ but upload failures are logged and the ticket still returns success. In local or misconfigured environments, the user\
      \ sees \u201CTicket submitted\u201D even though the attachment was not saved or visible to support staff."
    affected_page_route: /support
    status: fixed
    owner: ''
    date_found: '2026-04-24'
    date_fixed: '2026-04-24'
    fixed_in_commit_or_pr: ''
    recheck_required: true
    notes: 'Evidence: frontend/platform/static/js/support.js:523-540 appends attachment; backend/src/support/service.rs:141-163
      logs upload/DB failures but still returns Ok(()). Fix: Support ticket submission now fails the request if attachment
      upload or attachment record persistence fails, instead of returning success after dropping the attachment.'
  last_tested_date: null
