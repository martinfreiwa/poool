{% with title="KYC Verification | POOOL", extra_css=['kyc'], extra_js=['profile-dropdown', 'mobile-navigation',
'kyc-page'] %}{%
include "components/head.html" %}{% endwith %}

<body id="kyc-body" class="fouc-guard" x-data="kycForm" x-init="initKyc()" x-cloak>
  <!-- Mobile Header -->
  <header id="mobile-header" class="mobile-header">
    <a href="/marketplace" class="mobile-header__logo"><img src="/images/Logo Pool.svg" alt="POOOL" /></a>
    <div class="mobile-header__icons">
      <button id="mobile-burger-btn" class="mobile-header__icon-btn mobile-header__icon-btn--burger"
        onclick="toggleMobileMenu()" aria-label="Menu">
        <div class="mobile-header__burger-icon">
          <span class="mobile-header__burger-line"></span>
          <span class="mobile-header__burger-line"></span>
          <span class="mobile-header__burger-line"></span>
        </div>
      </button>
    </div>
  </header>

  <div id="mobile-menu-overlay" class="mobile-menu-overlay" onclick="closeMobileMenu()"></div>

  <div class="kyc-page">
    <!-- Sidebar -->
    <div class="kyc-sidebar">
      {% include 'components/sidebar.html' %}
    </div>

    <main class="ds-main kyc-main">
      <div class="kyc-container">

        <!-- Page Header -->
        <div class="kyc-page-header">
          <div class="kyc-title-wrapper">
            <div class="kyc-page-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
              </svg>
            </div>
            <h1 class="kyc-title">Identity Verification</h1>
          </div>
          <p class="kyc-subtitle" x-text="getStatusMessage()"></p>
        </div>

        <!-- Content Wrapper -->
        <div class="kyc-content-wrapper">

          <!-- Step Indicator (manual flow only) -->
          <template x-if="!supportsRedirect && canStartVerification()">
            <div class="kyc-stepper-bar">
              <div class="kyc-step" :class="step >= 1 ? 'active' : ''">
                <div class="kyc-step-circle">
                  <span x-show="step > 1">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                      <polyline points="20 6 9 17 4 12" />
                    </svg>
                  </span>
                  <span x-show="step <= 1">1</span>
                </div>
                <span class="kyc-step-label">Personal Info</span>
              </div>
              <div class="kyc-step-connector" :class="step >= 2 ? 'active' : ''"></div>
              <div class="kyc-step" :class="step >= 2 ? 'active' : ''">
                <div class="kyc-step-circle">
                  <span x-show="step > 2">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                      <polyline points="20 6 9 17 4 12" />
                    </svg>
                  </span>
                  <span x-show="step <= 2">2</span>
                </div>
                <span class="kyc-step-label">Additional Details</span>
              </div>
              <div class="kyc-step-connector" :class="step >= 3 ? 'active' : ''"></div>
              <div class="kyc-step" :class="step >= 3 ? 'active' : ''">
                <div class="kyc-step-circle">
                  <span x-show="step > 3">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                      <polyline points="20 6 9 17 4 12" />
                    </svg>
                  </span>
                  <span x-show="step <= 3">3</span>
                </div>
                <span class="kyc-step-label">Address</span>
              </div>
              <div class="kyc-step-connector" :class="step >= 4 ? 'active' : ''"></div>
              <div class="kyc-step" :class="step >= 4 ? 'active' : ''">
                <div class="kyc-step-circle">
                  <span x-show="step > 4">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                      <polyline points="20 6 9 17 4 12" />
                    </svg>
                  </span>
                  <span x-show="step <= 4">4</span>
                </div>
                <span class="kyc-step-label">Identity Doc</span>
              </div>
              <div class="kyc-step-connector" :class="step >= 5 ? 'active' : ''"></div>
              <div class="kyc-step" :class="step >= 5 ? 'active' : ''">
                <div class="kyc-step-circle">5</div>
                <span class="kyc-step-label">Review & Submit</span>
              </div>
            </div>
          </template>

          <!-- Main Content Card -->
          <div class="kyc-card ds-card">

            <!-- NOT STARTED STATE -->
            <template x-if="canStartVerification()">
              <div>
                <!-- Redirect Flow (Didit / Sumsub) -->
                <template x-if="supportsRedirect">
                  <div class="kyc-center-state">
                    <div class="kyc-status-icon kyc-status-icon--start">
                      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0000FF" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                      </svg>
                    </div>
                    <h2 class="kyc-state-title">Verify Your Identity</h2>
                    <p class="kyc-state-desc">
                      You'll be redirected to our secure partner <strong x-text="getProviderLabel()"></strong> to
                      complete
                      your identity check. Have your ID document ready — it takes under 2 minutes.
                    </p>
                    <div class="kyc-checklist">
                      <div class="kyc-check-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#03FF88" stroke-width="2.5">
                          <polyline points="20 6 9 17 4 12" />
                        </svg>
                        <span>Takes less than 2 minutes</span>
                      </div>
                      <div class="kyc-check-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#03FF88" stroke-width="2.5">
                          <polyline points="20 6 9 17 4 12" />
                        </svg>
                        <span>Bank-grade encryption</span>
                      </div>
                      <div class="kyc-check-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#03FF88" stroke-width="2.5">
                          <polyline points="20 6 9 17 4 12" />
                        </svg>
                        <span>Required to start investing</span>
                      </div>
                    </div>
                    <div class="kyc-form-group" style="max-width:400px;width:100%;">
                      <label class="kyc-form-label">Document Type</label>
                      <select x-model="formData.documentType" class="kyc-select ds-select">
                        <option value="passport">Passport</option>
                        <option value="national_id">National ID</option>
                        <option value="driving_license">Driver's License</option>
                      </select>
                    </div>
                    <button class="kyc-btn-primary full-width-btn" @click="submitKyc()" :disabled="submitting">
                      <span x-show="!submitting">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M5 12h14M12 5l7 7-7 7" />
                        </svg>
                        Start Verification
                      </span>
                      <span x-show="submitting">Connecting...</span>
                    </button>
                  </div>
                </template>

                <!-- Manual Flow -->
                <template x-if="!supportsRedirect">
                  <div>
                    <!-- Step 1 -->
                    <div x-show="step === 1">
                      <h2 class="kyc-step-title">Personal Information</h2>
                      <p class="kyc-step-desc">Please enter your details exactly as they appear on your
                        government-issued ID.</p>
                      <div class="kyc-form-row">
                        <div class="kyc-form-group">
                          <label class="kyc-form-label">First Name</label>
                          <input type="text" x-model="formData.firstName" class="kyc-input ds-input" placeholder="e.g. John" />
                        </div>
                        <div class="kyc-form-group">
                          <label class="kyc-form-label">Last Name</label>
                          <input type="text" x-model="formData.lastName" class="kyc-input ds-input" placeholder="e.g. Doe" />
                        </div>
                      </div>
                      <div class="kyc-form-actions">
                        <button class="kyc-btn-primary" @click="nextStep()">Continue</button>
                      </div>
                    </div>
                    <!-- Step 2 -->
                    <div x-show="step === 2">
                      <h2 class="kyc-step-title">Additional Details</h2>
                      <p class="kyc-step-desc">We need a few more details to verify your identity.</p>
                      <div class="kyc-form-row">
                        <div class="kyc-form-group">
                          <label class="kyc-form-label">Date of Birth</label>
                          <input type="date" x-model="formData.dob" class="kyc-input ds-input" />
                        </div>
                        <div class="kyc-form-group">
                          <label class="kyc-form-label">Nationality</label>
                          <input type="text" x-model="formData.nationality" class="kyc-input ds-input"
                            placeholder="e.g. Germany" />
                        </div>
                      </div>
                      <div class="kyc-form-actions space-between">
                        <button class="kyc-btn-secondary" @click="prevStep()">Back</button>
                        <button class="kyc-btn-primary" @click="nextStep()">Continue</button>
                      </div>
                    </div>
                    <!-- Step 3 -->
                    <div x-show="step === 3">
                      <h2 class="kyc-step-title">Residential Address</h2>
                      <p class="kyc-step-desc">Please provide your current residential address.</p>
                      <div class="kyc-form-group">
                        <label class="kyc-form-label">Address Line 1</label>
                        <input type="text" x-model="formData.addressLine1" class="kyc-input ds-input"
                          placeholder="Street address" />
                      </div>
                      <div class="kyc-form-group">
                        <label class="kyc-form-label">City</label>
                        <input type="text" x-model="formData.city" class="kyc-input ds-input" placeholder="City" />
                      </div>
                      <div class="kyc-form-actions space-between">
                        <button class="kyc-btn-secondary" @click="prevStep()">Back</button>
                        <button class="kyc-btn-primary" @click="nextStep()">Continue</button>
                      </div>
                    </div>
                    <!-- Step 4: Document Upload -->
                    <div x-show="step === 4">
                      <h2 class="kyc-step-title">Identity Document</h2>
                      <p class="kyc-step-desc">Please upload a clear photo or scan of your government-issued ID.</p>

                      <div class="kyc-form-group">
                        <label class="kyc-form-label">Document Type</label>
                        <select x-model="formData.documentType" class="kyc-select ds-select">
                          <option value="passport">Passport</option>
                          <option value="national_id">National ID</option>
                          <option value="driving_licence">Driver's License</option>
                        </select>
                      </div>

                      <div class="kyc-upload-container" :class="formData.documentId ? 'has-file' : ''"
                        @dragover.prevent="dragActive = true" @dragleave.prevent="dragActive = false"
                        @drop.prevent="handleDocDrop($event)">

                        <template x-if="!formData.documentId">
                          <div class="kyc-upload-placeholder">
                            <div class="kyc-upload-icon">
                              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />
                              </svg>
                            </div>
                            <div class="kyc-upload-text">
                              <label class="kyc-upload-link">
                                <span>Click to upload</span>
                                <input type="file" @change="handleDocSelect($event)" class="hidden"
                                  accept="image/*,application/pdf">
                              </label>
                              <span>or drag and drop</span>
                            </div>
                            <p class="kyc-upload-hint">PNG, JPG or PDF (max. 10MB)</p>
                          </div>
                        </template>

                        <template x-if="formData.documentId">
                          <div class="kyc-uploaded-file">
                            <div class="kyc-file-info">
                              <div class="kyc-file-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#027A48"
                                  stroke-width="2">
                                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                                  <polyline points="14 2 14 8 20 8" />
                                </svg>
                              </div>
                              <div class="kyc-file-details">
                                <span class="kyc-file-name" x-text="formData.documentName"></span>
                                <span class="kyc-file-status">✓ Uploaded successfully</span>
                              </div>
                            </div>
                            <button class="kyc-file-remove" @click="removeDocument()">
                              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                  d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                              </svg>
                            </button>
                          </div>
                        </template>

                        <div class="kyc-upload-progress" x-show="uploading">
                          <div class="kyc-progress-bar ds-progress ds-progress--sm">
                            <div class="kyc-progress-fill ds-progress__fill" :style="'width: ' + uploadProgress + '%'"></div>
                          </div>
                          <span x-text="uploadProgress + '%'"></span>
                        </div>
                      </div>

                      <div class="kyc-form-actions space-between">
                        <button class="kyc-btn-secondary" @click="prevStep()">Back</button>
                        <button class="kyc-btn-primary" @click="nextStep()"
                          :disabled="!formData.documentId || uploading">Continue</button>
                      </div>
                    </div>
                    <!-- Step 5 -->
                    <div x-show="step === 5">
                      <h2 class="kyc-step-title">Review & Submit</h2>
                      <p class="kyc-step-desc">Please confirm all details are correct before submitting.</p>
                      <div class="kyc-review-box">
                        <div class="kyc-review-row">
                          <span class="kyc-review-label">Full Name</span>
                          <span class="kyc-review-value" x-text="formData.firstName + ' ' + formData.lastName"></span>
                        </div>
                        <div class="kyc-review-row">
                          <span class="kyc-review-label">Nationality</span>
                          <span class="kyc-review-value" x-text="formData.nationality"></span>
                        </div>
                        <div class="kyc-review-row">
                          <span class="kyc-review-label">City</span>
                          <span class="kyc-review-value" x-text="formData.city"></span>
                        </div>
                      </div>
                      <div class="kyc-form-actions space-between">
                        <button class="kyc-btn-secondary" @click="prevStep()">Back</button>
                        <button class="kyc-btn-primary" @click="submitKyc()"
                          :disabled="submitting || !formData.documentId">
                          <span x-show="!submitting">Submit for Review</span>
                          <span x-show="submitting">Submitting...</span>
                        </button>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </template>

            <!-- IN REVIEW STATE (actually submitted to provider) -->
            <template x-if="status === 'in_review'">
              <div class="kyc-center-state">
                <div class="kyc-status-icon kyc-status-icon--pending">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#b54708" stroke-width="2">
                    <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                </div>
                <h2 class="kyc-state-title">Under Review</h2>
                <p class="kyc-state-desc">
                  We are currently verifying your identity. This usually takes less than 24 hours. We'll notify you by
                  email once it's complete.
                </p>
                <div class="kyc-info-banner">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                  </svg>
                  Verification typically completes within 24 hours
                </div>
                <button class="kyc-btn-secondary" onclick="window.location.href='/marketplace'">Back to
                  Marketplace</button>
              </div>
            </template>

            <!-- APPROVED STATE -->
            <template x-if="status === 'approved'">
              <div class="kyc-center-state">
                <div class="kyc-status-icon kyc-status-icon--success">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#027a48" stroke-width="3">
                    <path d="M5 13l4 4L19 7" />
                  </svg>
                </div>
                <h2 class="kyc-state-title">Verified Successfully</h2>
                <p class="kyc-state-desc">
                  Your identity has been verified. You can now start investing in premium real-world assets on the
                  marketplace.
                </p>
                <div class="kyc-success-highlights">
                  <div class="kyc-highlight-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#03FF88" stroke-width="2.5">
                      <polyline points="20 6 9 17 4 12" />
                    </svg>
                    <span>Full marketplace access unlocked</span>
                  </div>
                  <div class="kyc-highlight-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#03FF88" stroke-width="2.5">
                      <polyline points="20 6 9 17 4 12" />
                    </svg>
                    <span>Investment limits lifted</span>
                  </div>
                  <div class="kyc-highlight-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#03FF88" stroke-width="2.5">
                      <polyline points="20 6 9 17 4 12" />
                    </svg>
                    <span>Withdrawal privileges enabled</span>
                  </div>
                </div>
                <button class="kyc-btn-primary full-width-btn" onclick="window.location.href='/marketplace'">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                  </svg>
                  Go to Marketplace
                </button>
              </div>
            </template>

            <!-- REJECTED STATE -->
            <template x-if="status === 'rejected' || status === 'expired'">
              <div class="kyc-center-state">
                <div class="kyc-status-icon kyc-status-icon--rejected">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#b42318" stroke-width="2.5">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="15" y1="9" x2="9" y2="15" />
                    <line x1="9" y1="9" x2="15" y2="15" />
                  </svg>
                </div>
                <h2 class="kyc-state-title"
                  x-text="status === 'expired' ? 'Verification Expired' : 'Verification Rejected'"></h2>
                <p class="kyc-state-desc"
                  x-text="status === 'expired' ? 'Your verification has expired. Please submit new documents.' : 'Your previous verification was rejected. Please try again with valid documents.'">
                </p>
                <button class="kyc-btn-primary full-width-btn" @click="status = 'not_started'">
                  Try Again
                </button>
              </div>
            </template>

          </div><!-- end .kyc-card -->
        </div><!-- end .kyc-content-wrapper -->
      </div><!-- end .kyc-container -->
    </main>
  </div><!-- end .kyc-page -->

</body>

</html>
