{% with title="Set new password – POOOL", extra_css=['login'] %}{% include "components/head.html" %}{% endwith %}

<body>
  <div id="login-container">
    <section id="left-section">
      <div id="container">
        <div id="content">
          <!-- Header -->
          <div id="header" style="margin-bottom: 32px">
            <div id="logo-pool" style="margin-bottom: 24px">
              <img src="/static/images/logo-pool.svg" alt="Pool Logo" width="184" height="48" />
            </div>
            <div id="text-and-supporting-text">
              <h1 id="text">Set new password</h1>
              <p id="supporting-text">
                Your new password must be different to previously used
                passwords.
              </p>
            </div>
          </div>

          <div id="content-inner">
            <div id="auth-error"></div>

            <!-- Reset Password form -->
            <form id="reset-password-form" hx-post="/auth/reset-password" hx-target="#auth-error" hx-swap="innerHTML">
              <!-- Token (hidden) if passed via url -->
              <input type="hidden" name="token" id="reset-token" value="" />

              <div id="input-field" style="margin-bottom: 20px">
                <div id="input-with-label">
                  <div class="label-wrapper">
                    <label for="password-input" class="input-label">Password</label>
                  </div>
                  <div id="password-input-wrapper">
                    <input type="password" id="password-input" name="password" placeholder="Create a new password"
                      required autocomplete="new-password" />
                  </div>
                  <p style="font-size: 12px; color: #667085; margin-top: 6px">
                    Min. 8 characters
                  </p>
                </div>
              </div>

              <div id="input-field-password" style="margin-bottom: 24px">
                <div id="input-with-label-password">
                  <div class="label-wrapper">
                    <label for="confirm-password-input" class="input-label">Confirm password</label>
                  </div>
                  <div id="password-input-wrapper">
                    <input type="password" id="confirm-password-input" name="confirm_password"
                      placeholder="Confirm your newly created password" required autocomplete="new-password" />
                  </div>
                </div>
              </div>

              <button type="submit" id="login-button">
                <div id="button-text-padding">
                  <span id="button-text">Reset password</span>
                </div>
              </button>
            </form>

            <a href="/auth/login" id="back-to-login">
              <svg  width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15.8332 10.0001H4.1665M4.1665 10.0001L9.99984 15.8334M4.1665 10.0001L9.99984 4.16675"
                  stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              Back to log in
            </a>
          </div>
        </div>
      </div>
    </section>

    <section id="right-section">
      <div id="testimonial-image"></div>
    </section>
  </div>
  <script>
    // Pre-fill the token from the URL if available
    const params = new URLSearchParams(window.location.search);
    if (params.has("token")) {
      document.getElementById("reset-token").value = params.get("token");
    }

    // ─── HTMX Error Handling ─────────────────────────────────
    document.body.addEventListener('htmx:beforeSwap', function (evt) {
      if (evt.detail.xhr.status >= 400) {
        evt.detail.shouldSwap = true;
        evt.detail.isError = false;
      }
    });

    document.body.addEventListener('htmx:beforeRequest', function (evt) {
      var btn = document.getElementById('login-button');
      if (btn) {
        btn.disabled = true;
        btn.querySelector('#button-text').textContent = 'Resetting...';
        var err = document.getElementById('auth-error');
        if (err) err.innerHTML = '';
      }
    });

    document.body.addEventListener('htmx:afterRequest', function (evt) {
      var btn = document.getElementById('login-button');
      if (btn) {
        btn.disabled = false;
        btn.querySelector('#button-text').textContent = 'Reset password';
      }
    });
  </script>
</body>

</html>
