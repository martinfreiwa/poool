<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics & Analytics - POOOL Wealth Terminal</title>
    
    <!-- Base Platform Styles -->
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="stylesheet" href="/static/css/dashboard-tokens.css">
    <link rel="stylesheet" href="/static/css/main.css">
    
    <!-- Design System Components -->
    <link rel="stylesheet" href="/static/css/ds-typography.css">
    <link rel="stylesheet" href="/static/css/ds-page-layout.css">
    <link rel="stylesheet" href="/static/css/ds-cards.css">
    <link rel="stylesheet" href="/static/css/ds-buttons.css">
    <link rel="stylesheet" href="/static/css/ds-badges.css">
    
    <!-- Page Specific CSS -->
    <link rel="stylesheet" href="/static/css/statistics-template.css">

    <!-- HTMX for interactivity without a heavy framework -->
    <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC" crossorigin="anonymous"></script>
    
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Admin Context (Optional: Adds sidebar) -->
    <link rel="stylesheet" href="/static/css/admin.css">
    <script src="/static/js/admin-theme.js"></script>
</head>
<body class="admin-body ds-body dom-ready">
    <div class="admin-wrapper">
        <div id="admin-sidebar-placeholder"></div>
        <script src="/static/js/admin-sidebar-loader.js"></script>
        
        <main class="ds-main admin-main">
        
        <!-- Page Header -->
        <div class="ds-page-header">
            <div class="ds-page-header__title-row">
                <div class="ds-page-header__icon" style="background: rgba(0, 0, 255, 0.05); border-radius: 10px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0000FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                </div>
                <h1 class="ds-page-header__title ds-text-xl">Analytics & Performance</h1>
            </div>
            <div class="ds-page-header__actions">
                <button class="ds-btn ds-btn--primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Export Report
                </button>
            </div>
        </div>

        <!-- KPI Cards Grid (Polled dynamically with HTMX) -->
        <!-- In a real Rust setup: hx-get="/api/statistics/kpis" hx-trigger="every 60s" -->
        <div class="statistics-kpi-grid">
            
            <!-- KPI 1: Value -->
            <div class="ds-card ds-card--sm statistics-kpi-card">
                <div class="statistics-kpi-card__header">
                    <span class="ds-text-caption ds-text-secondary">Total Portfolio Value</span>
                    <div class="glass-icon-container glass-icon--blue">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0000FF" stroke-width="2">
                            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                            <line x1="2" y1="10" x2="22" y2="10"></line>
                        </svg>
                    </div>
                </div>
                <div class="statistics-kpi-card__body">
                    <div class="ds-text-display ds-text-money">$124,500.00</div>
                    <div class="statistics-kpi-card__trend ds-text-caption ds-text--success">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                        +12.4% All Time
                    </div>
                </div>
            </div>

            <!-- KPI 2: Yield -->
            <div class="ds-card ds-card--sm statistics-kpi-card">
                 <div class="statistics-kpi-card__header">
                    <span class="ds-text-caption ds-text-secondary">Yield Earned</span>
                    <div class="glass-icon-container glass-icon--green">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="16"></line>
                            <line x1="8" y1="12" x2="16" y2="12"></line>
                        </svg>
                    </div>
                </div>
                <div class="statistics-kpi-card__body">
                    <div class="ds-text-display ds-text-money">$4,250.75</div>
                    <div class="statistics-kpi-card__trend ds-text-caption ds-text--success">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                        +2.1% This Month
                    </div>
                </div>
            </div>

            <!-- KPI 3: Diversity -->
            <div class="ds-card ds-card--sm statistics-kpi-card">
                 <div class="statistics-kpi-card__header">
                    <span class="ds-text-caption ds-text-secondary">Active Assets</span>
                    <div class="glass-icon-container glass-icon--purple">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8B5CF6" stroke-width="2">
                             <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                             <polyline points="2 17 12 22 22 17"></polyline>
                             <polyline points="2 12 12 17 22 12"></polyline>
                        </svg>
                    </div>
                </div>
                <div class="statistics-kpi-card__body">
                    <div class="ds-text-display ds-text-money">12</div>
                    <div class="statistics-kpi-card__trend ds-text-caption ds-text-secondary">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        No recent changes
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Hero Chart Section -->
        <div class="ds-card statistics-hero-chart">
            <div class="statistics-chart-header">
                <div class="statistics-chart-header-titles">
                    <h2 class="ds-text-md">Portfolio Growth</h2>
                    <p class="ds-text-caption ds-text-secondary">Track your total asset value over time</p>
                </div>
                
                <!-- HTMX Filter Buttons -->
                <!-- Example of partial reload: Requests new chart canvas HTML fragment from backend.
                     hx-get resolves to endpoints like /api/statistics/chart?range=1W -->
                <div class="statistics-filters" hx-target="#hero-chart-container" hx-swap="innerHTML">
                    <!-- Defaulting to mock local urls for purely frontend template completeness -->
                    <button class="ds-btn ds-btn--ghost ds-btn--sm active" hx-get="/mock?range=1W">1W</button>
                    <button class="ds-btn ds-btn--ghost ds-btn--sm" hx-get="/mock?range=1M">1M</button>
                    <button class="ds-btn ds-btn--ghost ds-btn--sm" hx-get="/mock?range=1Y">1Y</button>
                    <button class="ds-btn ds-btn--ghost ds-btn--sm" hx-get="/mock?range=ALL">ALL</button>
                </div>
            </div>
            
            <div id="hero-chart-container" class="statistics-chart-body">
                <!-- HTMX will swap this content with a newly rendered canvas and script init if requested -->
                <canvas id="portfolioChart"></canvas>
            </div>
        </div>

        <!-- Breakdown Section -->
        <div class="statistics-breakdown-grid">
            
            <!-- Asset Allocation -->
            <div class="ds-card">
                 <div class="statistics-chart-header">
                    <div class="statistics-chart-header-titles">
                        <h2 class="ds-text-md">Asset Allocation</h2>
                        <p class="ds-text-caption ds-text-secondary">Diversification by category</p>
                    </div>
                </div>
                <!-- Doughnut Chart Canvas -->
                <div class="statistics-chart-body statistics-chart-body--donut">
                    <canvas id="allocationChart"></canvas>
                </div>
            </div>
            
             <!-- Monthly Dividends -->
             <div class="ds-card">
                 <div class="statistics-chart-header">
                    <div class="statistics-chart-header-titles">
                        <h2 class="ds-text-md">Monthly Dividends</h2>
                        <p class="ds-text-caption ds-text-secondary">Yield payout history</p>
                    </div>
                </div>
                <!-- Bar Chart Canvas -->
                <div class="statistics-chart-body statistics-chart-body--bar">
                    <canvas id="dividendsChart"></canvas>
                </div>
            </div>
            
        </div>

    </main>
    </div> <!-- .admin-wrapper -->

    <!-- Page Specific JS -->
    <script src="/static/js/statistics-template.js"></script>

</body>
</html>
