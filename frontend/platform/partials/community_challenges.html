<div id="community-challenges-tab" class="community-tab-panel" x-data="communityChallenges()">
  <div class="community-challenges">

    <!-- Active Challenges List -->
    <div>
      <h3 class="ds-text-md community-challenges__section-title">Active Challenges</h3>

      <!-- Loading State -->
      <div x-show="loading" class="community-challenges__loading">
        <div class="ds-spinner community-challenges__spinner"></div>
        <p class="ds-text-body community-challenges__loading-text">Loading challenges...</p>
      </div>

      <!-- Error State -->
      <div x-show="!loading && error" class="ds-card community-challenges__error">
        <p class="ds-text-subtitle community-challenges__error-msg" x-text="error"></p>
        <button type="button" class="ds-btn ds-btn--secondary ds-btn--sm" @click="loadChallenges()">Retry</button>
      </div>

      <!-- Challenge list -->
      <div x-show="!loading" class="community-challenges__list">
        <template x-for="ch in challenges" :key="ch.id">
          <div class="ds-card community-challenge-card" :class="ch.completed ? 'community-challenge-card--completed' : ''">
            <div class="community-challenge-card__icon" aria-hidden="true">
              <span x-text="challengeIcon(ch)"></span>
            </div>

            <div class="community-challenge-card__body">
              <div class="community-challenge-card__title-row">
                <h4 class="ds-text-md community-challenge-card__title" x-text="ch.title"></h4>
                <span class="ds-badge ds-badge--success community-challenge-card__xp" x-text="'+' + ch.xp_reward + ' XP'"></span>
              </div>
              <p class="ds-text-body community-challenge-card__desc" x-text="ch.description"></p>

              <div class="ds-progress community-challenge-card__progress">
                <div class="ds-progress__fill" :style="challengeProgressStyle(ch)"></div>
              </div>
              <div class="community-challenge-card__meta ds-text-caption">
                <span x-text="`${ch.current} / ${ch.target} · ` + challengeStateLabel(ch)"></span>
                <span x-text="challengeFrequencyLabel(ch)"></span>
              </div>

              <div class="community-challenge-card__actions">
                <template x-if="ch.completed">
                  <span class="ds-badge ds-badge--success community-challenge-card__done">
                    Completed
                    <template x-if="ch.completed_at">
                      <span x-text="' · ' + new Date(ch.completed_at).toLocaleDateString()"></span>
                    </template>
                  </span>
                </template>
                <template x-if="!ch.completed && ch.requirement_type === 'submission'">
                  <button type="button" class="ds-btn ds-btn--primary ds-btn--sm community-challenge-card__cta"
                          @click="openSubmitModal(ch)">Submit your entry</button>
                </template>
                <template x-if="!ch.completed && ch.requirement_type !== 'submission'">
                  <a class="ds-btn ds-btn--primary ds-btn--sm community-challenge-card__cta"
                     :href="challengeAction(ch).href"
                     x-text="challengeAction(ch).label"></a>
                </template>
                <template x-if="ch.badge_reward">
                  <span class="ds-badge ds-badge--info community-challenge-card__reward" x-text="'Badge: ' + ch.badge_reward"></span>
                </template>
              </div>

              <!-- Submission entries (vote-based challenges only) -->
              <template x-if="ch.requirement_type === 'submission'">
                <div class="community-challenge-card__submissions" style="margin-top:12px;">
                  <button type="button" class="ds-btn ds-btn--ghost ds-btn--sm" @click="toggleSubmissions(ch)">
                    <span x-text="ch.submissionsOpen ? 'Hide entries' : 'View entries'"></span>
                  </button>
                  <div x-show="ch.submissionsOpen" x-cloak style="margin-top:8px;">
                    <template x-for="s in (ch.submissions || [])" :key="s.id">
                      <div class="community-submission-row"
                           style="display:flex; gap:10px; align-items:flex-start; padding:10px; border:1px solid var(--ds-border, #E5E7EB); border-radius:8px; margin-bottom:6px;">
                        <div style="flex:1; min-width:0;">
                          <div style="font-weight:600; font-size:13px;" x-text="s.display_name"></div>
                          <div style="font-size:13px; color:var(--ds-text-secondary,#475467); white-space:pre-wrap;" x-text="s.content"></div>
                        </div>
                        <button type="button" class="ds-btn ds-btn--secondary ds-btn--sm"
                                :style="s.has_voted ? 'background:var(--ds-color-primary,#03FF88); color:#0a0b2e;' : ''"
                                @click="toggleVote(ch, s)"
                                aria-label="Toggle vote">
                          <span x-text="(s.has_voted ? '★ ' : '☆ ') + s.vote_count"></span>
                        </button>
                      </div>
                    </template>
                    <p x-show="(ch.submissions || []).length === 0" class="ds-helper-text">No entries yet — be the first.</p>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>

      <!-- Submit Entry Modal -->
      <div x-show="submitModalOpen" x-cloak class="community-modal" role="dialog" aria-modal="true"
           aria-labelledby="challenge-submit-title"
           style="display:flex; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;"
           @click.self="closeSubmitModal()">
        <div class="ds-card community-modal__panel" style="max-width:520px; width:90%;">
          <h3 id="challenge-submit-title" class="ds-text-md community-modal__title"
              x-text="'Submit entry — ' + (submitChallenge ? submitChallenge.title : '')"></h3>
          <p class="ds-text-body community-modal__description">Your entry will be visible to the community. Other members can upvote it; the highest voted entries earn the reward.</p>
          <label for="challenge-submit-content" class="ds-sr-only">Entry content</label>
          <textarea id="challenge-submit-content" x-model="submitContent"
                    class="ds-input" rows="5" maxlength="5000"
                    placeholder="Tell us your idea, strategy, or insight…"></textarea>
          <div class="ds-helper-text" x-text="(submitContent || '').length + ' / 5000'"></div>
          <div class="ds-form-error" x-show="submitError" x-text="submitError" role="alert"></div>
          <div class="community-modal__actions">
            <button type="button" class="ds-btn ds-btn--secondary" @click="closeSubmitModal()">Cancel</button>
            <button type="button" class="ds-btn ds-btn--primary" :disabled="submitBusy" @click="submitEntry()"
                    x-text="submitBusy ? 'Submitting…' : 'Submit'"></button>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div x-show="!loading && !error && challenges.length === 0" class="ds-card community-challenges__empty">
        <p class="ds-text-subtitle community-challenges__empty-msg">No active challenges right now. Check back later!</p>
      </div>
    </div>

  </div>
</div>
