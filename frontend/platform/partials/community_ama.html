<div id="community-ama-tab" class="community-tab-panel">
  <div class="ama-layout">

    <!-- Loading State -->
    <div id="ama-loading" style="text-align:center;padding:48px 0;">
      <div class="ds-spinner" style="margin:0 auto 16px;"></div>
      <p class="ds-text-body" style="color:var(--text-secondary);">Loading Expert AMAs...</p>
    </div>

    <!-- Empty State -->
    <div id="ama-empty" style="display:none;text-align:center;padding:64px 24px;">
      <div style="font-size:48px;margin-bottom:16px;">🎙️</div>
      <h3 class="ds-text-md" style="margin-bottom:8px;">No scheduled AMAs</h3>
      <p class="ds-text-body" style="color:var(--text-secondary);max-width:400px;margin:0 auto;">
        We don't have any upcoming Ask Me Anything sessions with experts right now. Check back later!
      </p>
    </div>

    <!-- AMA Content Container -->
    <div id="ama-content" style="display:none;max-width:1000px;margin:0 auto;">
      <!-- Active / Upcoming AMA -->
      <div class="ds-card" style="margin-bottom:24px;overflow:hidden;padding:0;">
        <div style="background:linear-gradient(135deg,#0a0b2e 0%,#1a1b4b 100%);color:#fff;padding:32px;display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap;">
          <div style="flex:1;min-width:300px;">
            <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600;margin-bottom:16px;">
              <span style="color:#03FF88;">●</span> <span id="ama-status-badge">UPCOMING</span>
            </div>
            <h2 id="ama-title" style="font-size:28px;font-weight:700;margin:0 0 12px;line-height:1.3;">—</h2>
            <p id="ama-description" style="font-size:16px;color:#cbd5e1;margin:0 0 24px;line-height:1.6;max-width:600px;">—</p>
            <div style="display:flex;gap:24px;font-size:14px;">
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:20px;">📅</span> <span id="ama-date-time">—</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:20px;">👤</span> <span id="ama-expert-name">—</span>
              </div>
            </div>
          </div>
          <div style="text-align:center;background:rgba(255,255,255,0.05);padding:20px;border-radius:16px;min-width:200px;border:1px solid rgba(255,255,255,0.1);">
            <div id="ama-expert-avatar" style="width:80px;height:80px;border-radius:50%;background:#EEF4FF;color:var(--btn-primary-bg);font-size:32px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">E</div>
            <div id="ama-expert-title" style="font-size:14px;color:#cbd5e1;margin-bottom:16px;">Expert</div>
          </div>
        </div>
      </div>

      <!-- Q&A Section -->
      <div style="display:grid;grid-template-columns:1fr 300px;gap:24px;" class="ama-grid">
        <div>
          <h3 class="ds-text-md" style="margin-bottom:16px;">Top Questions</h3>
          <div id="ama-questions-list" style="display:flex;flex-direction:column;gap:16px;">
            <!-- Rendered via JS -->
          </div>
        </div>

        <div class="ama-sidebar">
          <div class="ds-card" style="padding:20px;position:sticky;top:24px;">
            <h3 class="ds-text-md" style="margin-bottom:12px;">Ask a Question</h3>
            <p class="ds-text-caption" style="color:var(--text-secondary);margin-bottom:16px;">Submit a question for the expert. Upvoted questions get answered first.</p>
            <textarea id="ama-question-input" class="ds-input" rows="4" placeholder="Type your question..." style="width:100%;resize:vertical;margin-bottom:16px;"></textarea>
            <button id="ama-question-submit-btn" class="ds-btn ds-btn--primary" onclick="submitQuestion()" style="min-width:120px;width:100%;">Submit</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
