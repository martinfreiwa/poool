<div id="community-ama-tab" class="community-tab-panel">
  <div class="ama-layout community-ama">

    <!-- Loading State -->
    <div id="ama-loading" class="community-ama__loading">
      <div class="ds-spinner community-ama__spinner"></div>
      <p class="ds-text-body community-ama__loading-text">Loading Expert AMAs...</p>
    </div>

    <!-- Empty State -->
    <div id="ama-empty" class="community-ama__empty" hidden>
      <div class="community-ama__empty-icon" aria-hidden="true">🎙️</div>
      <h3 class="ds-text-md community-ama__empty-title">No scheduled AMAs</h3>
      <p class="ds-text-body community-ama__empty-desc">
        We don't have any upcoming Ask Me Anything sessions with experts right now. Check back later!
      </p>
    </div>

    <!-- AMA Content Container -->
    <div id="ama-content" class="community-ama__content" hidden>
      <!-- Active / Upcoming AMA hero — flat ds-card with brand accent (no dark gradient) -->
      <div class="ds-card community-ama-hero">
        <div class="community-ama-hero__body">
          <span class="ds-badge ds-badge--info community-ama-hero__status">
            <span aria-hidden="true">●</span> <span id="ama-status-badge">UPCOMING</span>
          </span>
          <h2 id="ama-title" class="community-ama-hero__title">—</h2>
          <p id="ama-description" class="community-ama-hero__desc">—</p>
          <div class="community-ama-hero__meta">
            <div class="community-ama-hero__meta-item">
              <span aria-hidden="true">📅</span> <span id="ama-date-time">—</span>
            </div>
            <div class="community-ama-hero__meta-item">
              <span aria-hidden="true">👤</span> <span id="ama-expert-name">—</span>
            </div>
          </div>
        </div>
        <div class="community-ama-hero__expert">
          <div id="ama-expert-avatar" class="community-ama-hero__expert-avatar">E</div>
          <div id="ama-expert-title" class="community-ama-hero__expert-title">Expert</div>
        </div>
      </div>

      <!-- Q&A Section -->
      <div class="ama-grid community-ama__grid">
        <div>
          <h3 class="ds-text-md community-ama__section-title">Top Questions</h3>
          <div id="ama-questions-list" class="community-ama__questions">
            <!-- Rendered via JS -->
          </div>
        </div>

        <aside class="ama-sidebar community-ama__sidebar">
          <div class="ds-card community-ama-ask">
            <h3 class="ds-text-md community-ama-ask__title">Ask a Question</h3>
            <p class="ds-text-caption community-ama-ask__hint">Submit a question for the expert. Upvoted questions get answered first.</p>
            <label for="ama-question-input" class="ds-sr-only">Your question</label>
            <textarea id="ama-question-input" class="ds-input community-ama-ask__textarea" rows="4" placeholder="Type your question..."></textarea>
            <button id="ama-question-submit-btn" class="ds-btn ds-btn--primary ds-btn--full" onclick="submitQuestion()">Submit</button>
          </div>
        </aside>
      </div>
    </div>
  </div>
</div>
