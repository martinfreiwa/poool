<div id="community-feed-tab" class="community-tab-panel">
  <div class="community-content-layout">

    <!-- Left: Feed -->
    <div class="community-feed">

      <!-- HTMX Filter State -->
      <form id="feed-filters" style="display:none;">
          <input type="hidden" id="form-feed-mode" name="feed_mode" value="all">
          <input type="hidden" id="form-sort-by" name="sort_by" value="fresh">
      </form>

      <!-- Feed filter row -->
      <div class="community-feed__filters">
        <div class="community-feed__filter-group" role="group" aria-label="Feed source">
          <button type="button" class="feed-toggle-btn active" id="feed-btn-all"
            aria-pressed="true" onclick="setFeedMode('all')">All Posts</button>
          <button type="button" class="feed-toggle-btn" id="feed-btn-following"
            aria-pressed="false" onclick="setFeedMode('following')">Following</button>
        </div>
        <div class="community-feed__filter-group" role="group" aria-label="Feed sort">
          <button type="button" class="feed-toggle-btn active" id="sort-btn-fresh"
            aria-pressed="true" onclick="setSortMode('fresh')">Fresh</button>
          <button type="button" class="feed-toggle-btn" id="sort-btn-hot"
            aria-pressed="false" onclick="setSortMode('hot')">Hot</button>
        </div>
      </div>

      <!-- Create Post composer -->
      <div class="ds-card community-composer" id="community-composer"
           data-drop-target="true"
           ondragover="event.preventDefault(); this.classList.add('community-composer--dragover');"
           ondragleave="this.classList.remove('community-composer--dragover');"
           ondrop="window.handleComposerDrop(event)">
        <!-- Author + post-type row -->
        <div class="community-composer__author">
          <div id="fb-compose-avatar" class="ds-avatar ds-avatar--md community-composer__avatar" aria-hidden="true">U</div>
          <div class="community-composer__author-meta">
            <span id="fb-compose-name" class="community-composer__author-name">User</span>
            <div class="community-composer__type-wrap">
              <label for="fb-post-type-select" class="ds-sr-only">Post type</label>
              <select id="fb-post-type-select" class="community-composer__type-select"
                onchange="document.getElementById('post-type-input').value = this.value;">
                <option value="general">🌍 General</option>
                <option value="market_insight">📈 Insight</option>
                <option value="review">⭐ Review</option>
              </select>
              <svg class="community-composer__type-caret" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </div>
            <input type="hidden" id="post-type-input" value="general">
          </div>
        </div>

        <!-- Composer textarea -->
        <label for="post-content-input" class="ds-sr-only">Write a post</label>
        <textarea id="post-content-input" rows="3" class="community-composer__textarea" placeholder="What's on your mind?"></textarea>
        <div class="ds-helper-text community-composer__disclaimer" id="post-disclaimer-warning" hidden>
          ⚠️ Your post appears to discuss investments. A disclaimer will be automatically added.
        </div>

        <!-- Image previews -->
        <div id="post-image-previews" class="community-composer__previews"></div>

        <!-- Poll creator (toggled) -->
        <div id="poll-creator" class="ds-card community-composer__poll" hidden>
          <div class="community-composer__poll-header">
            <h4 class="community-composer__poll-title">📊 Create a Poll</h4>
            <button type="button" class="ds-btn ds-btn--ghost ds-btn--icon ds-btn--sm" onclick="togglePollCreator()" aria-label="Close poll creator">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
          <label for="poll-question-input" class="ds-sr-only">Poll question</label>
          <input type="text" id="poll-question-input" class="ds-input community-composer__poll-input" placeholder="Ask a question...">
          <div class="poll-option-inputs community-composer__poll-options" id="poll-options-inputs">
            <input type="text" class="ds-input" aria-label="Poll option 1" placeholder="Option 1" oninput="updatePollOption(0, this.value)">
            <input type="text" class="ds-input" aria-label="Poll option 2" placeholder="Option 2" oninput="updatePollOption(1, this.value)">
          </div>
          <div class="community-composer__poll-footer">
            <button type="button" class="ds-btn ds-btn--ghost ds-btn--sm" onclick="addPollOption()">+ Add</button>
            <label for="poll-expiry-select" class="ds-sr-only">Poll duration</label>
            <select id="poll-expiry-select" class="ds-input community-composer__poll-expiry">
              <option value="">No expiry</option>
              <option value="24" selected>1 day</option>
              <option value="168">1 week</option>
            </select>
          </div>
        </div>

        <!-- Toolbar: add to your post -->
        <div class="community-composer__toolbar" role="toolbar" aria-label="Add to post">
          <span class="community-composer__toolbar-label">Add to your post</span>
          <div class="community-composer__toolbar-actions">
            <input type="file" id="post-image-file-input" class="ds-sr-only" accept="image/jpeg,image/png,image/webp" onchange="uploadPostImage(event)">
            <button type="button" class="ds-btn ds-btn--ghost ds-btn--icon ds-btn--sm" onclick="document.getElementById('post-image-file-input').click()" aria-label="Add photo">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline>
              </svg>
            </button>
            <button type="button" class="ds-btn ds-btn--ghost ds-btn--icon ds-btn--sm" onclick="triggerComposerTag('@')" aria-label="Tag people">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line>
              </svg>
            </button>
            <button type="button" class="ds-btn ds-btn--ghost ds-btn--icon ds-btn--sm" onclick="triggerComposerTag('$')" aria-label="Tag asset">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
              </svg>
            </button>
            <button type="button" class="ds-btn ds-btn--ghost ds-btn--icon ds-btn--sm" onclick="togglePollCreator()" aria-label="Create poll">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M18 20V10"></path><path d="M12 20V4"></path><path d="M6 20v-6"></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="ds-helper-text community-composer__upload-status" id="post-image-uploading" hidden>Uploading image...</div>

        <button type="button" class="ds-btn ds-btn--primary ds-btn--full" id="submit-post-btn" onclick="submitUserPost()">Post</button>
      </div>

      <div id="community-feed-container"
           hx-get="/community/partials/feed/list" 
           hx-include="#feed-filters"
           hx-trigger="load, reload-feed from:body">
          <div class="community-loading-state">Loading feed...</div>
      </div>
    </div> <!-- closing community-feed-container -->

    <!-- Right: Sidebar Panel -->
    <div class="community-right-panel">
      <!-- My Profile Card -->
      <div class="community-profile-card">
        <div class="profile-card-header">
          <div id="my-profile-avatar-circle" class="profile-card-avatar-circle" aria-hidden="true"></div>
          <div class="profile-card-info">
            <span id="my-profile-name" class="profile-card-name"></span>
            <div id="my-profile-bio" class="profile-card-bio"></div>
          </div>
        </div>
        <div class="profile-card-stats">
          <div class="profile-stat"><span id="my-profile-posts" class="profile-stat-value">0</span><span
              class="profile-stat-label">Posts</span></div>
          <div class="profile-stat"><span id="my-profile-followers" class="profile-stat-value">0</span><span
              class="profile-stat-label">Followers</span></div>
          <div class="profile-stat"><span id="my-profile-following" class="profile-stat-value">0</span><span
              class="profile-stat-label">Following</span></div>
        </div>
        <div class="profile-card-badges" id="my-profile-badges">
        </div>
        <button type="button" onclick="window.openProfileEditModal()" class="ds-btn ds-btn--secondary ds-btn--full community-profile-card__edit-btn">Edit Profile</button>
      </div>

      <!-- Trending Commodities -->
      <div class="community-trending-card" id="trending-assets-widget">
        <div class="trending-card-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
            <polyline points="16 7 22 7 22 13" />
          </svg>
          Trending This Week
        </div>
        <div id="trending-assets-container">
          <div class="community-loading-state community-loading-state--inline">Loading trending assets...</div>
        </div>
      </div>

      <!-- Trending Tags -->
      <div class="community-hashtags-card">
        <div class="hashtag-trending-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="9" x2="20" y2="9"></line>
            <line x1="4" y1="15" x2="20" y2="15"></line>
            <line x1="10" y1="3" x2="8" y2="21"></line>
            <line x1="16" y1="3" x2="14" y2="21"></line>
          </svg>
          Trending Tags
        </div>
        <div id="trending-hashtags-container">
          <div class="community-loading-state community-loading-state--inline">Loading trending tags...</div>
        </div>
      </div>

      <!-- Upcoming AMA -->
      <div class="community-ama-card" id="sidebar-ama-widget" style="display: none;">
        <div class="ama-card-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 6v6l4 2" />
          </svg>
          Upcoming AMA
        </div>
        <div class="ama-card-title" id="sidebar-ama-title"></div>
        <div class="ama-card-expert" id="sidebar-ama-expert"></div>
        <div class="ama-card-datetime">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          <span id="sidebar-ama-time"></span>
        </div>
        <div class="ama-card-actions">
          <button type="button" class="ama-btn ama-btn--primary"
            onclick="window.activateCommunityTab('ama')">View full AMA</button>
        </div>
      </div>

    </div>
  </div>
</div>
