<div id="community-announcements-tab" class="community-tab-panel" x-data="{ currentCategory: '' }">
  <div class="announcements-filter-bar" id="ann-category-filters" role="group" aria-label="Announcement category">
    <div class="ds-segmented announcements-filter-bar__group">
      <button type="button" class="ds-segmented__item" :class="{ 'active': currentCategory === '' }" :aria-pressed="currentCategory === ''" @click="currentCategory = ''"
        hx-get="/community/partials/announcements/list" hx-target="#community-announcements-container">All</button>
      <button type="button" class="ds-segmented__item" :class="{ 'active': currentCategory === 'new_commodity' }" :aria-pressed="currentCategory === 'new_commodity'" @click="currentCategory = 'new_commodity'"
        hx-get="/community/partials/announcements/list?category=new_commodity" hx-target="#community-announcements-container">New Commodities</button>
      <button type="button" class="ds-segmented__item" :class="{ 'active': currentCategory === 'dividend' }" :aria-pressed="currentCategory === 'dividend'" @click="currentCategory = 'dividend'"
        hx-get="/community/partials/announcements/list?category=dividend" hx-target="#community-announcements-container">Dividends</button>
      <button type="button" class="ds-segmented__item" :class="{ 'active': currentCategory === 'platform_update' }" :aria-pressed="currentCategory === 'platform_update'" @click="currentCategory = 'platform_update'"
        hx-get="/community/partials/announcements/list?category=platform_update" hx-target="#community-announcements-container">Platform Updates</button>
      <button type="button" class="ds-segmented__item" :class="{ 'active': currentCategory === 'market_news' }" :aria-pressed="currentCategory === 'market_news'" @click="currentCategory = 'market_news'"
        hx-get="/community/partials/announcements/list?category=market_news" hx-target="#community-announcements-container">Market News</button>
      <button type="button" class="ds-segmented__item" :class="{ 'active': currentCategory === 'farm_update' }" :aria-pressed="currentCategory === 'farm_update'" @click="currentCategory = 'farm_update'"
        hx-get="/community/partials/announcements/list?category=farm_update" hx-target="#community-announcements-container">Farm Updates</button>
    </div>
  </div>

  <div class="announcements-list" id="community-announcements-container"
       hx-get="/community/partials/announcements/list" hx-trigger="load">
    <div class="community-loading-state">Loading announcements...</div>
  </div>
</div>
