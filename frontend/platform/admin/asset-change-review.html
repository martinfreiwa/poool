<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/static/images/icons/logo-pool.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Change Request — Admin | POOOL</title>
    <link rel="stylesheet" href="/static/css/admin.css">
    <link rel="stylesheet" href="/static/css/fonts.css">
    <style>
        .review-layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; align-items: start; }
        @media (max-width: 1024px) { .review-layout { grid-template-columns: 1fr; } }
        .review-sidebar { position: sticky; top: 24px; }

        /* Diff Table */
        .diff-table { width: 100%; border-collapse: collapse; }
        .diff-table th { text-align: left; padding: 10px 16px; font-size: 12px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.05em; color: var(--admin-text-muted, #888);
            border-bottom: 1px solid var(--admin-border, #e5e7eb); }
        .diff-table td { padding: 12px 16px; border-bottom: 1px solid var(--admin-border, #e5e7eb);
            font-size: 14px; vertical-align: top; word-break: break-word; }
        .diff-row-changed { background: rgba(245, 158, 11, 0.06); }
        .diff-row-changed td:first-child { font-weight: 600; }
        .diff-field-label { color: var(--admin-text-secondary, #6b7280); font-size: 13px; }
        .diff-old { color: var(--admin-danger, #ef4444); text-decoration: line-through; opacity: 0.7; }
        .diff-new { color: var(--admin-success, #10b981); font-weight: 500; }

        /* Decision Card */
        .decision-card { background: var(--admin-bg-card, #fff); border-radius: 12px;
            border: 1px solid var(--admin-border, #e5e7eb); padding: 24px; }
        .decision-card h3 { margin: 0 0 16px; font-size: 16px; font-weight: 600; }
        .decision-textarea { width: 100%; min-height: 100px; resize: vertical;
            border: 1px solid var(--admin-border, #e5e7eb); border-radius: 8px;
            padding: 12px; font-size: 14px; font-family: inherit;
            background: var(--admin-input-bg, #fafafa); color: var(--admin-text, #111); margin-bottom: 16px; }
        .decision-textarea:focus { outline: none; border-color: var(--admin-primary, #3b82f6); }
        .decision-actions { display: flex; gap: 12px; }
        .decision-actions .admin-btn { flex: 1; justify-content: center; }

        /* Info header */
        .request-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
        .request-info-item { font-size: 13px; }
        .request-info-label { color: var(--admin-text-muted, #888); margin-bottom: 4px; }
        .request-info-value { font-weight: 600; color: var(--admin-text, #111); }
    </style>
</head>
<body class="admin-body dom-ready">
    <div class="admin-wrapper">
        <div id="admin-sidebar-placeholder"></div>

        <main class="admin-main">
            <!-- Header -->
            <header class="admin-topbar">
                <div class="admin-topbar-left">
                    <nav class="admin-breadcrumbs">
                        <a href="/admin/">Admin</a>
                        <span class="separator">›</span>
                        <a href="/admin/asset-change-requests.html">Asset Change Requests</a>
                        <span class="separator">›</span>
                        <span class="current">Review</span>
                    </nav>
                </div>
            </header>

            <div class="admin-content">
                <div class="admin-page-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h1 class="admin-page-title" id="page-title">Review Change Request</h1>
                        <p class="admin-page-subtitle">Review proposed changes to the asset before publishing</p>
                    </div>
                </div>

                <!-- Loading -->
                <div id="loading-state" style="text-align:center; padding:60px; color: var(--admin-text-muted, #888);">Loading...</div>

                <!-- Content (hidden until loaded) -->
                <div id="review-content" style="display:none;">
                    <!-- Request Info -->
                    <div class="admin-card" style="margin-bottom: 24px;">
                        <div class="admin-card-body">
                            <div class="request-info" id="request-info"></div>
                        </div>
                    </div>

                    <div class="review-layout">
                        <!-- Left: Diff Table -->
                        <div class="admin-card" style="padding: 0; overflow: hidden;">
                            <div style="padding: 16px 24px; border-bottom: 1px solid var(--admin-border, #e5e7eb);">
                                <h3 style="margin: 0; font-size: 16px; font-weight: 600;">Proposed Changes</h3>
                                <p style="margin: 4px 0 0; font-size: 13px; color: var(--admin-text-muted, #888);">
                                    Side-by-side comparison of current and proposed values
                                </p>
                            </div>
                            <table class="diff-table" id="diff-table">
                                <thead>
                                    <tr>
                                        <th style="width:25%;">Field</th>
                                        <th style="width:37.5%;">Current Value</th>
                                        <th style="width:37.5%;">Proposed Value</th>
                                    </tr>
                                </thead>
                                <tbody id="diff-body"></tbody>
                            </table>
                        </div>

                        <!-- Right: Decision Sidebar -->
                        <div class="review-sidebar" id="decision-sidebar">
                            <div class="decision-card">
                                <h3>Review Decision</h3>
                                <label style="display:block; font-size:13px; color: var(--admin-text-secondary, #6b7280); margin-bottom:8px;">
                                    Internal Notes (optional)
                                </label>
                                <textarea class="decision-textarea" id="admin-notes" placeholder="Add notes about your decision..."></textarea>
                                <div class="decision-actions" id="decision-actions">
                                    <button class="admin-btn admin-btn--success" id="btn-approve" onclick="approveRequest()">
                                        ✓ Approve & Apply
                                    </button>
                                    <button class="admin-btn admin-btn--danger" id="btn-reject" onclick="rejectRequest()">
                                        ✕ Reject
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/csrf.js"></script>
    <script src="/static/js/admin-sidebar-loader.js"></script>
    <script src="/static/js/admin-change-review.js"></script>
</body>
</html>
