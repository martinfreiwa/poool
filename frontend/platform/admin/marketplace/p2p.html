<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/static/images/logo-pool.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P2P Offers | Admin | POOOL</title>
  <meta name="description" content="POOOL Admin — Oversight of peer-to-peer marketplace offers." />
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/admin.css?v=1.0.1" />
  <link rel="stylesheet" href="/static/css/admin-marketplace.css" />
  <script src="/static/js/admin-theme.js"></script>
</head>

<body class="admin-body">
  <div class="admin-wrapper">
    <div id="admin-sidebar-placeholder"></div>
    <script src="/static/js/admin-sidebar-loader.js"></script>

    <main class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar-left">
          <nav class="admin-breadcrumbs">
            <a href="/admin/">Admin</a>
            <span class="separator">›</span>
            <a href="/admin/marketplace/">Marketplace</a>
            <span class="separator">›</span>
            <span class="current">P2P Offers</span>
          </nav>
        </div>
        <div class="admin-topbar-right"></div>
      </header>

      <div class="admin-content">
        <div class="admin-page-header">
          <h1 class="admin-page-title">P2P Offers Oversight</h1>
          <p class="admin-page-subtitle">Monitor private peer-to-peer token offers and flag pricing anomalies</p>
        </div>

        <div class="admin-card">
          <div class="admin-card-body admin-card-body--flush">
            <table class="admin-table" id="p2p-table">
              <thead>
                <tr>
                  <th>Offer ID</th>
                  <th>Seller</th>
                  <th>Asset</th>
                  <th style="text-align:right">Qty</th>
                  <th style="text-align:right">Offer Price</th>
                  <th style="text-align:right">Market Price</th>
                  <th>Deviation</th>
                  <th>Created</th>
                  <th style="text-align:center">Action</th>
                </tr>
              </thead>
              <tbody id="p2p-body">
                <!-- Filled by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/js/mp-toast.js"></script>
  <script src="/static/js/mp-p2p.js"></script>
</body>

</html>
