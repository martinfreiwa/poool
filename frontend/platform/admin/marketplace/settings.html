<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/static/images/logo-pool.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP Settings | Admin | POOOL</title>
  <meta name="description" content="POOOL Admin — Marketplace configuration and engine settings." />
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/admin.css?v=1.0.1" />
  <link rel="stylesheet" href="/static/css/admin-marketplace.css" />
  <script src="/static/js/admin-theme.js"></script>
</head>

<body class="admin-body">
  <div class="admin-wrapper">
    <div id="admin-sidebar-placeholder"></div>
    <script src="/static/js/admin-sidebar-loader.js"></script>

    <main class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar-left">
          <nav class="admin-breadcrumbs">
            <a href="/admin/">Admin</a>
            <span class="separator">›</span>
            <a href="/admin/marketplace/">Marketplace</a>
            <span class="separator">›</span>
            <span class="current">Settings</span>
          </nav>
        </div>
        <div class="admin-topbar-right"></div>
      </header>

      <div class="admin-content">
        <div class="admin-page-header">
          <h1 class="admin-page-title">Marketplace Settings</h1>
          <p class="admin-page-subtitle">Configure matching engine, settlement, and marketplace behavior</p>
        </div>

        <!-- Matching Engine -->
        <div class="admin-card" style="margin-bottom:20px;">
          <div class="admin-card-header">
            <h3 class="admin-card-title">Matching Engine</h3>
          </div>
          <div class="admin-card-body">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; max-width:700px;">
              <div class="admin-form-group">
                <label class="admin-form-label">Matching Algorithm</label>
                <select class="admin-select" id="setting-algo">
                  <option value="price-time" selected>Price-Time Priority (FIFO)</option>
                  <option value="pro-rata">Pro-Rata</option>
                </select>
                <div style="font-size:11px; color:var(--admin-text-muted); margin-top:4px;">Determines order priority in the matching engine</div>
              </div>
              <div class="admin-form-group">
                <label class="admin-form-label">Tick Size (USD)</label>
                <input type="number" class="admin-input" id="setting-tick" value="0.05" step="0.01" min="0.01">
                <div style="font-size:11px; color:var(--admin-text-muted); margin-top:4px;">Minimum price increment between orders</div>
              </div>
              <div class="admin-form-group">
                <label class="admin-form-label">Min Order Size (tokens)</label>
                <input type="number" class="admin-input" id="setting-min-order" value="1" step="1" min="1">
              </div>
              <div class="admin-form-group">
                <label class="admin-form-label">Max Order Size (tokens)</label>
                <input type="number" class="admin-input" id="setting-max-order" value="10000" step="100" min="1">
              </div>
            </div>
          </div>
        </div>

        <!-- Settlement -->
        <div class="admin-card" style="margin-bottom:20px;">
          <div class="admin-card-header">
            <h3 class="admin-card-title">Settlement Configuration</h3>
          </div>
          <div class="admin-card-body">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; max-width:700px;">
              <div class="admin-form-group">
                <label class="admin-form-label">Settlement Mode</label>
                <select class="admin-select" id="setting-settlement">
                  <option value="instant" selected>Instant (T+0)</option>
                  <option value="batched">Batched (T+1 daily)</option>
                  <option value="manual">Manual Approval</option>
                </select>
              </div>
              <div class="admin-form-group">
                <label class="admin-form-label">On-Chain Network</label>
                <select class="admin-select" id="setting-chain">
                  <option value="base" selected>Base L2 (Mainnet)</option>
                  <option value="base-sepolia">Base Sepolia (Testnet)</option>
                  <option value="ethereum">Ethereum Mainnet</option>
                </select>
              </div>
              <div class="admin-form-group">
                <label class="admin-form-label">Max Gas Price (Gwei)</label>
                <input type="number" class="admin-input" id="setting-gas" value="5" step="1" min="1">
              </div>
              <div class="admin-form-group">
                <label class="admin-form-label">Settlement Batch Size</label>
                <input type="number" class="admin-input" id="setting-batch" value="50" step="10" min="1">
              </div>
            </div>
          </div>
        </div>

        <!-- Trading Hours -->
        <div class="admin-card" style="margin-bottom:20px;">
          <div class="admin-card-header">
            <h3 class="admin-card-title">Trading Hours</h3>
          </div>
          <div class="admin-card-body">
            <div id="trading-hours-body">
              <!-- Filled by JS -->
            </div>
          </div>
        </div>

        <!-- Notification Preferences -->
        <div class="admin-card" style="margin-bottom:20px;">
          <div class="admin-card-header">
            <h3 class="admin-card-title">Admin Notification Preferences</h3>
          </div>
          <div class="admin-card-body" id="notif-prefs-body">
            <!-- Filled by JS -->
          </div>
        </div>

        <!-- Save Button -->
        <div style="display:flex; justify-content:flex-end; gap:12px;">
          <button class="admin-btn admin-btn--secondary" id="btn-reset-settings">Reset to Defaults</button>
          <button class="admin-btn admin-btn--primary" id="btn-save-settings" style="padding:12px 32px; font-size:14px; font-weight:600;">Save All Settings</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/js/mp-toast.js"></script>
  <script src="/static/js/mp-settings.js"></script>
</body>

</html>
