<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POOOL Admin — Syndicate Fraud Visualizer</title>
    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="stylesheet" href="/static/css/reset.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/admin.css">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
    <!-- Cytoscape or D3 placeholder for Visualizer -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>

    <style>
        .fraud-visualizer-container {
            width: 100%;
            height: 600px;
            background: rgba(10, 10, 15, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        #cy {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
        }
        .fraud-header {
            margin-bottom: 24px;
        }
        .fraud-header h1 {
            color: #fff;
            margin-bottom: 8px;
        }
        .fraud-header p {
            color: var(--text-tertiary);
        }
        .fraud-toolbar {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="ds-admin-layout dark-theme">

    {% include 'admin/components/sidebar.html' %}

    {% include 'admin/components/header.html' %}

    <main class="ds-admin-main">
        <div class="ds-admin-content-wrapper">
            <div class="fraud-header">
                <h1 class="ds-h3">Syndicate Fraud Visualizer</h1>
                <p>Detect Circular Referral Rings (A &rarr; B &rarr; A) and registration IP overlaps visually.</p>
            </div>

            <div class="fraud-visualizer-container">
                <div class="fraud-toolbar">
                    <button class="ds-btn ds-btn--outline ds-btn--sm" onclick="buildGraph('circular')">Scan Circular Rings</button>
                    <button class="ds-btn ds-btn--outline ds-btn--sm" onclick="buildGraph('ip_overlap')">Scan IP Overlaps</button>
                    <button class="ds-btn ds-btn--danger ds-btn--sm" style="margin-left:auto;">Freeze Node</button>
                </div>
                <div id="cy"></div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            window.cy = cytoscape({
                container: document.getElementById('cy'),
                elements: [],
                style: [
                    {
                        selector: 'node',
                        style: {
                            'background-color': '#1E58FB',
                            'label': 'data(label)',
                            'color': '#fff',
                            'text-valign': 'bottom',
                            'text-halign': 'center',
                            'text-margin-y': 8,
                            'font-size': '12px'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 2,
                            'line-color': 'rgba(255, 255, 255, 0.2)',
                            'target-arrow-color': 'rgba(255, 255, 255, 0.2)',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier',
                            'label': 'data(label)',
                            'color': '#A4A7AE',
                            'font-size': '10px',
                            'text-rotation': 'autorotate'
                        }
                    },
                    {
                        selector: 'edge[label*="RING"]',
                        style: {
                            'line-color': '#EF4444',
                            'target-arrow-color': '#EF4444'
                        }
                    },
                    {
                        selector: 'edge[label*="Overlap"]',
                        style: {
                            'line-color': '#F59E0B',
                            'target-arrow-color': '#F59E0B'
                        }
                    }
                ],
                layout: {
                    name: 'circle',
                    padding: 50
                }
            });
            buildGraph('circular');
        });

        window.buildGraph = async function(type) {
            try {
                const res = await fetch(`/api/admin/rewards/affiliates/fraud-scan?type=${type}`);
                if (!res.ok) throw new Error('API Error');
                const data = await res.json();
                
                window.cy.elements().remove();
                if (data.elements && data.elements.length > 0) {
                    window.cy.add(data.elements);
                    window.cy.layout({ name: 'circle', padding: 50 }).run();
                } else {
                    alert('No fraud patterns detected for this scan type!');
                }
            } catch (err) {
                console.error(err);
                alert('Could not fetch graph data.');
            }
        }
    </script>
</body>
</html>
