<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POOOL Admin — Syndicate Fraud Visualizer</title>
    <!-- CSS -->
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="stylesheet" href="/static/css/admin.css">

    <!-- Cytoscape or D3 placeholder for Visualizer -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>

    <style>
        .fraud-page {
            display: grid;
            gap: 20px;
        }

        .fraud-visualizer-container {
            width: 100%;
            height: 520px;
            background: var(--admin-surface, #fff);
            border: 1px solid var(--admin-border);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        #cy {
            width: 100%;
            height: calc(100% - 56px);
            position: absolute;
            top: 56px;
            left: 0;
            background:
                radial-gradient(circle at 50% 50%, rgba(0, 29, 202, 0.06), transparent 36%),
                var(--admin-bg-subtle, #f8fafc);
        }

        .fraud-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
        }

        .fraud-header h1 {
            color: var(--admin-text-primary);
            margin-bottom: 8px;
        }

        .fraud-header p {
            color: var(--admin-text-secondary);
            margin: 0;
        }

        .fraud-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 14px;
            background: var(--admin-surface, #fff);
            border-bottom: 1px solid var(--admin-border);
            position: relative;
            z-index: 10;
        }

        .fraud-status {
            margin-left: auto;
            align-self: center;
            color: var(--admin-text-muted);
            font-size: 13px;
            min-height: 18px;
        }

        .fraud-status.is-error {
            color: #EF4444;
        }

        .fraud-results {
            display: grid;
            gap: 8px;
        }

        .fraud-result {
            border: 1px solid var(--admin-border);
            border-radius: 8px;
            padding: 12px;
            color: var(--admin-text-secondary);
            background: var(--admin-surface, #fff);
        }

        .fraud-result strong {
            color: var(--admin-text-primary);
            display: block;
            margin-bottom: 4px;
        }

        @media (max-width: 720px) {
            .fraud-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .fraud-visualizer-container {
                height: 420px;
            }

            .fraud-status {
                width: 100%;
                margin-left: 0;
            }
        }
    </style>
</head>
<body class="admin-body dom-ready">
    <div class="admin-wrapper">
        {% include 'admin/components/sidebar.html' %}

        <main class="admin-main">
            <div class="admin-content">
                <div class="fraud-page">
                    <div class="fraud-header">
                        <div>
                            <h1 class="admin-page-title">Syndicate Fraud Visualizer</h1>
                            <p>Detect circular referral rings and registration IP overlaps visually.</p>
                        </div>
                    </div>

                    <div class="fraud-visualizer-container admin-card">
                        <div class="fraud-toolbar">
                            <button id="scan-circular" type="button" class="admin-btn admin-btn--secondary admin-btn--sm" data-scan-type="circular">
                                <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M17 2v5h-5" />
                                    <path d="M7 22v-5h5" />
                                    <path d="M20 12a8 8 0 0 0-13.5-5.8L2 10" />
                                    <path d="M4 12a8 8 0 0 0 13.5 5.8L22 14" />
                                </svg>
                                Scan Circular Rings
                            </button>
                            <button id="scan-ip-overlap" type="button" class="admin-btn admin-btn--secondary admin-btn--sm" data-scan-type="ip_overlap">
                                <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="3" />
                                    <path d="M12 2v4" />
                                    <path d="M12 18v4" />
                                    <path d="m4.93 4.93 2.83 2.83" />
                                    <path d="m16.24 16.24 2.83 2.83" />
                                    <path d="M2 12h4" />
                                    <path d="M18 12h4" />
                                </svg>
                                Scan IP Overlaps
                            </button>
                            <span id="fraud-status" class="fraud-status" role="status" aria-live="polite">Ready</span>
                        </div>
                        <div id="cy" aria-label="Affiliate fraud graph"></div>
                    </div>
                    <div id="fraud-results" class="fraud-results" aria-live="polite"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const statusEl = document.getElementById('fraud-status');
        const resultsEl = document.getElementById('fraud-results');
        const scanButtons = document.querySelectorAll('[data-scan-type]');

        function setStatus(message, isError = false) {
            statusEl.textContent = message;
            statusEl.classList.toggle('is-error', isError);
        }

        function renderFindings(flags) {
            resultsEl.replaceChildren();
            if (!flags.length) {
                const empty = document.createElement('div');
                empty.className = 'fraud-result';
                empty.textContent = 'No fraud patterns detected for this scan type.';
                resultsEl.appendChild(empty);
                return;
            }

            flags.forEach((flag) => {
                const item = document.createElement('div');
                item.className = 'fraud-result';
                const title = document.createElement('strong');
                title.textContent = flag.type === 'ip_overlap' ? 'IP overlap' : 'Circular referral ring';
                const description = document.createElement('span');
                const parties = flag.type === 'ip_overlap'
                    ? `${(flag.affiliate_emails || []).join(', ')} shared ${flag.ip_address || 'an IP address'}`
                    : `${flag.affiliate_a_email || 'Affiliate A'} and ${flag.affiliate_b_email || 'Affiliate B'}`;
                description.textContent = `${parties}. ${flag.description || ''}`;
                item.append(title, description);
                resultsEl.appendChild(item);
            });
        }

        function initGraph() {
            if (!window.cytoscape) return null;
            return cytoscape({
                    container: document.getElementById('cy'),
                    elements: [],
                    style: [
                        {
                            selector: 'node',
                            style: {
                                'background-color': '#1E58FB',
                                'label': 'data(label)',
                                'color': '#111827',
                                'text-valign': 'bottom',
                                'text-halign': 'center',
                                'text-margin-y': 8,
                                'font-size': '12px'
                            }
                        },
                        {
                            selector: 'edge',
                            style: {
                                'width': 2,
                                'line-color': 'rgba(255, 255, 255, 0.2)',
                                'target-arrow-color': 'rgba(255, 255, 255, 0.2)',
                                'target-arrow-shape': 'triangle',
                                'curve-style': 'bezier',
                                'label': 'data(label)',
                                'color': '#6B7280',
                                'font-size': '10px',
                                'text-rotation': 'autorotate'
                            }
                        },
                        {
                            selector: 'edge[label*="RING"]',
                            style: {
                                'line-color': '#EF4444',
                                'target-arrow-color': '#EF4444'
                            }
                        },
                        {
                            selector: 'edge[label*="Overlap"]',
                            style: {
                                'line-color': '#F59E0B',
                                'target-arrow-color': '#F59E0B'
                            }
                        }
                    ],
                    layout: {
                        name: 'circle',
                        padding: 50
                    }
                });
        }

        async function buildGraph(type) {
            scanButtons.forEach((button) => { button.disabled = true; });
            setStatus('Scanning...');
            try {
                const res = await fetch(`/api/admin/rewards/affiliates/fraud-scan?type=${type}`);
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.error || `Fraud scan failed (${res.status})`);
                
                const elements = Array.isArray(data.elements) ? data.elements : [];
                if (window.cy) {
                    window.cy.elements().remove();
                    window.cy.add(elements);
                    window.cy.layout({ name: 'circle', padding: 50 }).run();
                }
                renderFindings(Array.isArray(data.flags) ? data.flags : []);
                setStatus(`${data.count || 0} finding${data.count === 1 ? '' : 's'} found.`);
            } catch (err) {
                console.error(err);
                setStatus(err.message || 'Could not fetch graph data.', true);
            } finally {
                scanButtons.forEach((button) => { button.disabled = false; });
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            window.cy = initGraph();
            scanButtons.forEach((button) => {
                button.addEventListener('click', () => buildGraph(button.dataset.scanType));
            });
            buildGraph('circular');
        });
    </script>
</body>
</html>
