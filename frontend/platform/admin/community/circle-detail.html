<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/static/images/icons/logo-pool.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circle Detail | Admin | POOOL</title>
  
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/css/admin.css?v=1.0.1" />
  <script src="/static/js/user-data.js"></script>
  <script src="/static/js/admin-theme.js"></script>
  <script src="/static/js/admin-permission-guard.js"></script>
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/bundle.css" />
  <style>
    .grid-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .admin-status-message {
      border-radius: 8px;
      margin-bottom: 16px;
      padding: 12px 14px;
      font-size: 14px;
    }
    .admin-status-message[hidden] {
      display: none;
    }
    .admin-status-message--success {
      background: #ECFDF3;
      color: #027A48;
      border: 1px solid #ABEFC6;
    }
    .admin-status-message--error {
      background: #FEF3F2;
      color: #B42318;
      border: 1px solid #FECDCA;
    }
    .admin-status-message--info {
      background: #EFF8FF;
      color: #175CD3;
      border: 1px solid #B2DDFF;
    }
    @media (max-width: 1024px) {
      .grid-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body class="admin-body dom-ready">
  <div class="admin-wrapper">
    {% include 'admin/components/sidebar.html' %}

    <!-- ===== MAIN CONTENT ===== -->
    <main class="admin-main">
      <!-- Top Bar -->
      <header class="admin-topbar">
        <div class="admin-topbar-left">
          <nav class="admin-breadcrumbs">
            <a href="/admin/">Admin</a>
            <span class="separator">›</span>
            <a href="/admin/community/">Community</a>
            <span class="separator">›</span>
            <a href="/admin/community/circles.html">Circles</a>
            <span class="separator">›</span>
            <span class="current">Circle Detail</span>
          </nav>
        </div>
      </header>

      <!-- Page Content -->
      <div class="admin-content" id="circle-detail-container">
        <div role="status" aria-live="polite" style="text-align:center; padding: 40px;">Loading...</div>
      </div>
    </main>
  </div>

  <script>
    let currentCircle = null;

    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const circleId = urlParams.get('id');
        if (!circleId) {
            renderPageMessage('No circle ID specified.', 'error');
            return;
        }
        loadCircleDetail(circleId);
    });

    function csrfHeaders(extraHeaders = {}) {
        const token = typeof window.getCsrfToken === 'function' ? window.getCsrfToken() : '';
        return token ? { ...extraHeaders, 'X-CSRF-Token': token } : extraHeaders;
    }

    function renderPageMessage(message, type = 'info') {
        const container = document.getElementById('circle-detail-container');
        const role = type === 'error' ? 'alert' : 'status';
        container.innerHTML = `<div role="${role}" aria-live="${type === 'error' ? 'assertive' : 'polite'}" style="padding:40px; color:${type === 'error' ? '#B42318' : '#175CD3'};">${escapeHtml(message)}</div>`;
    }

    function setStatus(message, type = 'info') {
        const status = document.getElementById('circle-status');
        if (!status) return;
        status.textContent = message;
        status.hidden = false;
        status.className = `admin-status-message admin-status-message--${type}`;
        status.setAttribute('role', type === 'error' ? 'alert' : 'status');
        status.setAttribute('aria-live', type === 'error' ? 'assertive' : 'polite');
        status.focus();
    }

    function clearStatus() {
        const status = document.getElementById('circle-status');
        if (!status) return;
        status.hidden = true;
        status.textContent = '';
    }

    async function readErrorMessage(res, fallback) {
        try {
            const body = await res.json();
            return body.error || body.message || fallback;
        } catch (_) {
            return fallback;
        }
    }

    function setFormBusy(form, isBusy) {
        if (!form) return;
        form.querySelectorAll('button, input, select, textarea').forEach((el) => {
            el.disabled = isBusy;
        });
    }

    async function loadCircleDetail(circleId) {
        try {
            const res = await fetch(`/api/admin/community/circles/${circleId}`);
            if(res.ok) {
                const data = await res.json();
                currentCircle = data.circle;
                renderDetail(circleId, data);
            } else {
                renderPageMessage(await readErrorMessage(res, 'Circle not found or network error.'), 'error');
            }
        } catch(e) {
            console.error(e);
            renderPageMessage('Error connecting to server.', 'error');
        }
    }

    function renderDetail(circleId, data) {
        const c = data.circle || {};
        const members = data.members || [];

        let membersHtml = members.length === 0 ? '<p style="color:#667085; padding: 16px;">No members found.</p>' : `
            <table class="admin-table">
                <thead><tr><th>User ID</th><th>Role</th><th>Joined</th><th style="text-align:right;">Actions</th></tr></thead>
                <tbody>
                    ${members.map(m => `
                        <tr>
                            <td style="font-family:monospace; font-size:12px;">${m.user_id}</td>
                            <td><span class="admin-badge" style="background:${m.role === 'owner' ? '#FEF3F2;color:#B42318' : '#F9FAFB;color:#667085'}">${m.role}</span></td>
                            <td><small>${new Date(m.joined_at).toLocaleString()}</small></td>
                            <td style="text-align:right;">
                                ${m.role !== 'owner' ? `<button class="admin-btn admin-btn--sm admin-btn--ghost" style="color:#D92D20;" onclick="kickMember('${circleId}', '${m.user_id}')">Kick</button>` : ''}
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;

        document.getElementById('circle-detail-container').innerHTML = `
            <div id="circle-status" class="admin-status-message admin-status-message--info" tabindex="-1" hidden></div>
            <div class="admin-page-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                  <h1 class="admin-page-title">${escapeHtml(c.avatar_emoji || '🟢')} ${escapeHtml(c.name)}</h1>
                  <p class="admin-page-subtitle">ID: <span style="font-family:monospace;">${circleId}</span></p>
                </div>
                <div style="display:flex; gap:12px;">
                  <button class="admin-btn admin-btn--secondary" style="color:#b42318; border-color:#b42318;" onclick="deleteCircle('${circleId}')">
                    Disband Circle
                  </button>
                </div>
            </div>

            <div class="grid-layout">
                <!-- Left Column -->
                <div style="display:flex; flex-direction: column; gap: 24px;">
                    <!-- Details Card -->
                    <div class="admin-card">
                        <div class="admin-card-header">
                            <h2 class="admin-card-title">Circle Settings</h2>
                        </div>
                        <div class="admin-card-body">
                            <form onsubmit="updateCircle(event, '${circleId}')" style="display: flex; flex-direction: column; gap: 16px;">
                                <div>
                                    <label style="display:block;font-size:13px;font-weight:500;color:#344054;margin-bottom:6px;">Name</label>
                                    <input type="text" id="edit-name" class="admin-input" style="width:100%;" value="${escapeHtml(c.name)}">
                                </div>
                                <div style="display:grid; grid-template-columns: 80px 1fr; gap: 16px;">
                                    <div>
                                        <label style="display:block;font-size:13px;font-weight:500;color:#344054;margin-bottom:6px;">Emoji</label>
                                        <input type="text" id="edit-emoji" class="admin-input" style="width:100%; text-align:center;" value="${escapeHtml(c.avatar_emoji || '')}">
                                    </div>
                                    <div>
                                        <label style="display:block;font-size:13px;font-weight:500;color:#344054;margin-bottom:6px;">Visibility</label>
                                        <select id="edit-visibility" class="admin-input" style="width:100%; padding: 8px 12px;">
                                            <option value="true" ${c.is_public ? 'selected' : ''}>Public</option>
                                            <option value="false" ${!c.is_public ? 'selected' : ''}>Private</option>
                                        </select>
                                    </div>
                                </div>
                                <div>
                                    <label style="display:block;font-size:13px;font-weight:500;color:#344054;margin-bottom:6px;">Description</label>
                                    <textarea id="edit-desc" class="admin-input" rows="3" style="width:100%; resize:none;">${escapeHtml(c.description || '')}</textarea>
                                </div>
                                <div>
                                    <button type="submit" class="admin-btn admin-btn--primary" style="width:100%;">Save Changes</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Force Transfer Card -->
                    <div class="admin-card">
                        <div class="admin-card-header">
                            <h2 class="admin-card-title" style="color:#B42318;">Force Transfer Ownership</h2>
                        </div>
                        <div class="admin-card-body" style="background:#FFF0F0;">
                            <p style="font-size: 13px; color: #D92D20; margin-bottom: 12px;">
                                Transfer ownership of the circle to another user. If the user is not in the circle, they will be added. Current owner will be demoted to a regular member.
                            </p>
                            <form onsubmit="forceTransfer(event, '${circleId}')" style="display: flex; gap: 12px;">
                                <input type="text" id="transfer-user-id" class="admin-input" style="flex:1;" placeholder="New Owner User ID..." required />
                                <button type="submit" class="admin-btn admin-btn--primary" style="background:#D92D20; border-color:#D92D20;">Transfer</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Right Column -->
                <div style="display:flex; flex-direction: column; gap: 24px;">
                    <!-- Stats Card -->
                    <div class="admin-card">
                        <div class="admin-card-header">
                            <h2 class="admin-card-title">Stats</h2>
                        </div>
                        <div class="admin-card-body">
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                                <div style="border:1px solid var(--admin-border-color); padding:12px; border-radius:8px; text-align:center;">
                                    <div style="font-size:24px; font-weight:600; color:#101828;">${Number(c.member_count || 0)} / ${Number(c.max_members || 0)}</div>
                                    <div style="font-size:12px; color:#667085; text-transform:uppercase;">Members</div>
                                </div>
                                <div style="border:1px solid var(--admin-border-color); padding:12px; border-radius:8px; text-align:center;">
                                    <div style="font-size:24px; font-weight:600; color:#101828;">${Number(c.total_xp || 0).toLocaleString()}</div>
                                    <div style="font-size:12px; color:#667085; text-transform:uppercase;">Total XP</div>
                                </div>
                                <div style="border:1px solid var(--admin-border-color); padding:12px; border-radius:8px; text-align:center; grid-column:span 2;">
                                    <div style="font-size:24px; font-weight:600; color:#101828;">Level ${c.level}</div>
                                    <div style="font-size:12px; color:#667085; text-transform:uppercase;">${escapeHtml(c.level_name || '')}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Members List -->
                    <div class="admin-card">
                        <div class="admin-card-header">
                            <h2 class="admin-card-title">Members (${members.length})</h2>
                        </div>
                        <div class="admin-card-body admin-card-body--flush" style="max-height: 400px; overflow-y: auto;">
                            ${membersHtml}
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    async function updateCircle(e, circleId) {
        e.preventDefault();
        clearStatus();
        setFormBusy(e.currentTarget, true);
        
        const name = document.getElementById('edit-name').value.trim() || undefined;
        const emoji = document.getElementById('edit-emoji').value.trim() || undefined;
        const description = document.getElementById('edit-desc').value.trim() || undefined;
        const isPublic = document.getElementById('edit-visibility').value === 'true';

        try {
            const res = await fetch(`/api/admin/community/circles/${circleId}`, {
                method: 'PUT',
                headers: csrfHeaders({ 'Content-Type': 'application/json' }),
                body: JSON.stringify({ name, avatar_emoji: emoji, description, is_public: isPublic })
            });

            if (res.ok) {
                setStatus('Circle updated.', 'success');
                await loadCircleDetail(circleId); // Refresh
                setStatus('Circle updated.', 'success');
            } else {
                setStatus(await readErrorMessage(res, 'Failed to update circle.'), 'error');
            }
        } catch (err) {
            console.error(err);
            setStatus('Error updating circle.', 'error');
        } finally {
            setFormBusy(e.currentTarget, false);
        }
    }

    async function forceTransfer(e, circleId) {
        e.preventDefault();
        clearStatus();
        const input = document.getElementById('transfer-user-id');
        const newUserId = input.value.trim();
        
        if (!newUserId) return;
        if (!confirm('Are you ABSOLUTELY SURE you want to forcibly transfer leadership of this circle to this specific User ID?')) return;
        setFormBusy(e.currentTarget, true);

        try {
            const res = await fetch(`/api/admin/community/circles/${circleId}/transfer`, {
                method: 'POST',
                headers: csrfHeaders({ 'Content-Type': 'application/json' }),
                body: JSON.stringify({ new_owner_id: newUserId })
            });

            if (res.ok) {
                input.value = '';
                setStatus('Ownership transferred successfully.', 'success');
                await loadCircleDetail(circleId); // Refresh
                setStatus('Ownership transferred successfully.', 'success');
            } else {
                setStatus(await readErrorMessage(res, 'Transfer failed. Please check the User ID and try again.'), 'error');
            }
        } catch (err) {
            console.error(err);
            setStatus('Error transferring ownership.', 'error');
        } finally {
            setFormBusy(e.currentTarget, false);
        }
    }

    async function kickMember(circleId, targetUserId) {
        clearStatus();
        if (!confirm('Are you sure you want to kick this member?')) return;
        
        try {
            const res = await fetch(`/api/admin/community/circles/${circleId}/members/${targetUserId}`, {
                method: 'DELETE',
                headers: csrfHeaders()
            });

            if (res.ok) {
                await loadCircleDetail(circleId); // Refresh
                setStatus('Member removed from circle.', 'success');
            } else {
                setStatus(await readErrorMessage(res, 'Failed to kick member.'), 'error');
            }
        } catch (err) {
            console.error(err);
            setStatus('Error removing member.', 'error');
        }
    }

    async function deleteCircle(circleId) {
        clearStatus();
        if (!confirm('Are you sure you want to DESTROY this circle entirely? This action is irreversible.')) return;
        
        try {
            const res = await fetch(`/api/admin/community/circles/${circleId}`, {
                method: 'DELETE',
                headers: csrfHeaders()
            });

            if (res.ok) {
                window.location.href = '/admin/community/circles.html';
            } else {
                setStatus(await readErrorMessage(res, 'Failed to delete circle.'), 'error');
            }
        } catch (err) {
            console.error(err);
            setStatus('Error deleting circle.', 'error');
        }
    }

    function escapeHtml(unsafe) {
        if (unsafe == null) return '';
        return String(unsafe)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
  </script>
</body>

</html>
