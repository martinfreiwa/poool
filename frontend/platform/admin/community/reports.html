<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/static/images/icons/logo-pool.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moderation Queue | Community Admin | POOOL</title>
  
  <link rel="stylesheet" href="/static/css/admin.css?v=1.0.1" />
  <script src="/static/js/user-data.js"></script>
  <script src="/static/js/admin-theme.js"></script>
  <script src="/static/js/admin-permission-guard.js"></script>
  <script defer src="/static/js/admin-community-reports.js"></script>
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/bundle.css" />
</head>

<body class="admin-body dom-ready">
  <div class="admin-wrapper">
    {% include 'admin/components/sidebar.html' %}

    <!-- ===== MAIN CONTENT ===== -->
    <main class="admin-main">
      <!-- Top Bar -->
      <header class="admin-topbar">
        <div class="admin-topbar-left">
          <nav class="admin-breadcrumbs">
            <a href="/admin/">Admin</a>
            <span class="separator">›</span>
            <a href="/admin/community/">Community</a>
            <span class="separator">›</span>
            <span class="current">Moderation Queue</span>
          </nav>
        </div>
      </header>

      <!-- Page Content -->
      <div class="admin-content">
        <!-- Page Header -->
        <div class="admin-page-header admin-page-header--split">
          <div>
            <h1 class="admin-page-title">Moderation Queue</h1>
            <p class="admin-page-subtitle">Review and manage user-reported content.</p>
          </div>
          <div>
            <button class="admin-btn admin-btn--secondary" id="reports-refresh-btn" type="button">
              <svg class="admin-btn__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
              Refresh
            </button>
          </div>
        </div>

        <!-- Table Card -->
        <div class="admin-card">
          <div class="admin-card-body admin-card-body--flush">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Reporter</th>
                  <th>Reason</th>
                  <th>Post Content</th>
                  <th>Date</th>
                  <th class="admin-table__cell-actions">Actions</th>
                </tr>
              </thead>
              <tbody id="reports-table">
                <tr>
                  <td colspan="5" class="admin-table__message">
                    Loading reports...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Action Modal -->
  <div id="action-modal" class="admin-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-desc" aria-hidden="true">
    <div class="ds-modal__backdrop" data-reports-close-modal></div>
    <div class="admin-modal" tabindex="-1">
      <div class="admin-modal__header">
        <h3 class="admin-modal__title" id="modal-title">Take Action</h3>
        <button class="admin-modal__close" type="button" data-reports-close-modal aria-label="Close action modal">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="admin-modal__body">
        <input type="hidden" id="modal-report-id">
        <input type="hidden" id="modal-action-type">

        <p class="admin-modal__desc" id="modal-desc">
          Are you sure you want to proceed?
        </p>

        <div class="admin-modal__field">
          <label class="admin-modal__label" for="modal-notes">Admin Notes (Required)</label>
          <textarea id="modal-notes" class="admin-modal__textarea" rows="3" maxlength="1000" required placeholder="Reason for this action..."></textarea>
          <p id="modal-error" class="admin-modal__error" role="alert" hidden></p>
        </div>

        <div class="admin-modal__actions">
          <button class="admin-btn admin-btn--secondary" type="button" data-reports-close-modal>Cancel</button>
          <button id="modal-confirm-btn" class="admin-btn admin-btn--danger" type="button">Confirm Action</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
