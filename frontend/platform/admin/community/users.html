<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/static/images/icons/logo-pool.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Users | Admin | POOOL</title>
  
  <link rel="stylesheet" href="/static/css/admin.css?v=1.0.1" />
  <script src="/static/js/user-data.js"></script>
  <script src="/static/js/admin-theme.js"></script>
  <script src="/static/js/admin-permission-guard.js"></script>
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/bundle.css" />
</head>

<body class="admin-body dom-ready">
  <div class="admin-wrapper">
    {% include 'admin/components/sidebar.html' %}

    <!-- ===== MAIN CONTENT ===== -->
    <main class="admin-main">
      <!-- Top Bar -->
      <header class="admin-topbar">
        <div class="admin-topbar-left">
          <nav class="admin-breadcrumbs">
            <a href="/admin/">Admin</a>
            <span class="separator">›</span>
            <a href="/admin/community/">Community</a>
            <span class="separator">›</span>
            <span class="current">Users</span>
          </nav>
        </div>
      </header>

      <!-- Page Content -->
      <div class="admin-content">
        <!-- Page Header -->
        <div class="admin-page-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
          <div>
            <h1 class="admin-page-title">Community Users</h1>
            <p class="admin-page-subtitle">Manage platform users within the community layer.</p>
          </div>
          <div>
            <button class="admin-btn admin-btn--secondary" id="refresh-users-btn" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
              Refresh
            </button>
          </div>
        </div>

        <p id="community-users-status" role="status" aria-live="polite" style="min-height:20px;margin:0 0 12px;color:var(--admin-text-muted);font-size:14px;"></p>

        <!-- Table Card -->
        <div class="admin-card">
          <div class="admin-card-body admin-card-body--flush">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>User</th>
                  <th>Posts</th>
                  <th>Warnings</th>
                  <th>Status</th>
                  <th>Joined Community</th>
                  <th style="text-align: right;">Action</th>
                </tr>
              </thead>
              <tbody id="users-table">
                <tr>
                  <td colspan="6" style="text-align: center; padding: 40px; color: var(--admin-text-muted);">
                    Loading users...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <dialog id="community-user-ban-dialog" aria-labelledby="community-user-ban-title" style="border:0;border-radius:12px;padding:0;width:min(520px,calc(100vw - 32px));box-shadow:0 20px 40px rgba(16,24,40,.18);">
    <form id="community-user-ban-form" novalidate style="padding:24px;">
      <h2 id="community-user-ban-title" style="margin:0 0 8px;color:#101828;font-size:20px;line-height:1.3;">Moderation action</h2>
      <p id="community-user-ban-description" style="margin:0 0 20px;color:#667085;font-size:14px;line-height:1.5;"></p>
      <div id="community-user-ban-reason-field" style="display:grid;gap:8px;margin-bottom:18px;">
        <label for="community-user-ban-reason" style="color:#344054;font-size:14px;font-weight:600;">Reason</label>
        <textarea id="community-user-ban-reason" maxlength="1000" style="width:100%;min-height:120px;resize:vertical;border:1px solid #d0d5dd;border-radius:8px;padding:10px 12px;color:#101828;font:inherit;"></textarea>
      </div>
      <p id="community-user-ban-dialog-status" role="status" aria-live="polite" style="min-height:20px;margin:0 0 16px;color:#b42318;font-size:14px;"></p>
      <div style="display:flex;justify-content:flex-end;gap:12px;">
        <button class="admin-btn admin-btn--secondary" id="community-user-ban-cancel" type="button">Cancel</button>
        <button class="admin-btn admin-btn--primary" id="community-user-ban-submit" type="submit">Submit</button>
      </div>
    </form>
  </dialog>

  <script src="/static/js/admin-community-users.js"></script>
</body>
</html>
