<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/static/images/icons/logo-pool.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Users | Admin | POOOL</title>
  
  <link rel="stylesheet" href="/static/css/admin.css?v=1.0.1" />
  <script src="/static/js/user-data.js"></script>
  <script src="/static/js/admin-theme.js"></script>
  <script src="/static/js/admin-permission-guard.js"></script>
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/bundle.css" />
</head>

<body class="admin-body dom-ready">
  <div class="admin-wrapper">
    {% include 'admin/components/sidebar.html' %}

    <!-- ===== MAIN CONTENT ===== -->
    <main class="admin-main">
      <!-- Top Bar -->
      <header class="admin-topbar">
        <div class="admin-topbar-left">
          <nav class="admin-breadcrumbs">
            <a href="/admin/">Admin</a>
            <span class="separator">›</span>
            <a href="/admin/community/">Community</a>
            <span class="separator">›</span>
            <span class="current">Users</span>
          </nav>
        </div>
      </header>

      <!-- Page Content -->
      <div class="admin-content">
        <!-- Page Header -->
        <div class="admin-page-header admin-page-header--split">
          <div>
            <h1 class="admin-page-title">Community Users</h1>
            <p class="admin-page-subtitle">Manage platform users within the community layer.</p>
          </div>
          <div>
            <button class="admin-btn admin-btn--secondary" id="refresh-users-btn" type="button">
              <svg class="admin-btn__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
              Refresh
            </button>
          </div>
        </div>

        <p id="community-users-status" class="admin-page-status" role="status" aria-live="polite"></p>

        <!-- Table Card -->
        <div class="admin-card">
          <div class="admin-card-body admin-card-body--flush">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>User</th>
                  <th>Posts</th>
                  <th>Warnings</th>
                  <th>Status</th>
                  <th>Joined Community</th>
                  <th class="admin-table__cell-actions">Action</th>
                </tr>
              </thead>
              <tbody id="users-table">
                <tr>
                  <td colspan="6" class="admin-table__message">
                    Loading users...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <dialog id="community-user-ban-dialog" aria-labelledby="community-user-ban-title" class="admin-dialog">
    <form id="community-user-ban-form" class="admin-dialog__form" novalidate>
      <h2 id="community-user-ban-title" class="admin-dialog__title">Moderation action</h2>
      <p id="community-user-ban-description" class="admin-dialog__desc"></p>
      <div id="community-user-ban-reason-field" class="admin-dialog__field">
        <label for="community-user-ban-reason" class="admin-dialog__label">Reason</label>
        <textarea id="community-user-ban-reason" class="admin-dialog__textarea" maxlength="1000"></textarea>
      </div>
      <p id="community-user-ban-dialog-status" class="admin-dialog__status admin-dialog__status--error" role="status" aria-live="polite"></p>
      <div class="admin-dialog__actions">
        <button class="admin-btn admin-btn--secondary" id="community-user-ban-cancel" type="button">Cancel</button>
        <button class="admin-btn admin-btn--primary" id="community-user-ban-submit" type="submit">Submit</button>
      </div>
    </form>
  </dialog>

  <script src="/static/js/admin-community-users.js"></script>
</body>
</html>
