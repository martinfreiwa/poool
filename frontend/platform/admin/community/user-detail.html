<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/static/images/icons/logo-pool.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Detail | Admin | POOOL</title>

  <link rel="stylesheet" href="/static/css/admin.css?v=1.0.1" />
  <script src="/static/js/user-data.js"></script>
  <script src="/static/js/admin-theme.js"></script>
  <script src="/static/js/admin-permission-guard.js"></script>
  <script src="/static/js/csrf.js"></script>
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/bundle.css" />
  <style>
    .grid-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 32px;
      background: #eef4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #3538cd;
      font-size: 24px;
      flex: 0 0 auto;
    }

    .avatar-img {
      width: 64px;
      height: 64px;
      border-radius: 32px;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .admin-user-detail-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-end;
    }

    .admin-user-detail-actions-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 12px;
    }

    .admin-user-detail-muted,
    .admin-user-detail-ban,
    .admin-user-detail-notes {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
    }

    .admin-user-detail-muted,
    .admin-user-detail-ban {
      background: #fef3f2;
      border: 1px solid #fee4e2;
      color: #b42318;
    }

    .admin-user-detail-notes {
      background: #fffbeb;
      border: 1px solid #fef3c7;
      color: #92400e;
      white-space: pre-wrap;
    }

    .admin-user-detail-metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .admin-user-detail-metric {
      border: 1px solid var(--admin-border-color);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }

    .admin-user-detail-metric-value {
      font-size: 24px;
      font-weight: 600;
      color: #101828;
    }

    .admin-user-detail-metric-label {
      font-size: 12px;
      color: #667085;
      text-transform: uppercase;
    }

    .admin-user-detail-muted-label,
    .admin-user-detail-ban-label,
    .admin-user-detail-notes-label {
      font-weight: 600;
    }

    .admin-user-detail-modal {
      border: 0;
      border-radius: 12px;
      padding: 0;
      width: min(520px, calc(100vw - 32px));
      box-shadow: 0 20px 40px rgba(16, 24, 40, 0.18);
    }

    .admin-user-detail-modal::backdrop {
      background: rgba(16, 24, 40, 0.45);
    }

    .admin-user-detail-modal-form {
      padding: 24px;
    }

    .admin-user-detail-modal-title {
      margin: 0 0 8px;
      color: #101828;
      font-size: 20px;
      line-height: 1.3;
    }

    .admin-user-detail-modal-description {
      margin: 0 0 20px;
      color: #667085;
      font-size: 14px;
      line-height: 1.5;
    }

    .admin-user-detail-modal-field {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    .admin-user-detail-modal-field label {
      color: #344054;
      font-size: 14px;
      font-weight: 600;
    }

    .admin-user-detail-modal-field textarea,
    .admin-user-detail-modal-field input {
      width: 100%;
      border: 1px solid #d0d5dd;
      border-radius: 8px;
      padding: 10px 12px;
      color: #101828;
      font: inherit;
    }

    .admin-user-detail-modal-field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .admin-user-detail-modal-status {
      min-height: 20px;
      margin: 0 0 16px;
      color: #b42318;
      font-size: 14px;
    }

    .admin-user-detail-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    @media (max-width: 1024px) {
      .grid-layout {
        grid-template-columns: 1fr;
      }

      .admin-page-header {
        align-items: flex-start !important;
        flex-direction: column;
        gap: 16px;
      }

      .admin-user-detail-actions {
        align-items: stretch;
        width: 100%;
      }

      .admin-user-detail-actions-row {
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body class="admin-body dom-ready">
  <div class="admin-wrapper">
    {% include 'admin/components/sidebar.html' %}

    <main class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar-left">
          <nav class="admin-breadcrumbs">
            <a href="/admin/">Admin</a>
            <span class="separator">›</span>
            <a href="/admin/community/">Community</a>
            <span class="separator">›</span>
            <a href="/admin/community/users.html">Users</a>
            <span class="separator">›</span>
            <span class="current">User Detail</span>
          </nav>
        </div>
      </header>

      <div class="admin-content" id="user-detail-container">
        <div style="text-align:center; padding: 40px;">Loading...</div>
      </div>
    </main>
  </div>

  <dialog class="admin-user-detail-modal" id="moderation-dialog" aria-labelledby="moderation-dialog-title">
    <form class="admin-user-detail-modal-form" id="moderation-form" novalidate>
      <h2 class="admin-user-detail-modal-title" id="moderation-dialog-title">Moderation action</h2>
      <p class="admin-user-detail-modal-description" id="moderation-dialog-description"></p>

      <div class="admin-user-detail-modal-field" id="moderation-text-field" hidden>
        <label for="moderation-text-input" id="moderation-text-label">Reason</label>
        <textarea id="moderation-text-input"></textarea>
      </div>

      <div class="admin-user-detail-modal-field" id="moderation-number-field" hidden>
        <label for="moderation-number-input" id="moderation-number-label">Hours</label>
        <input id="moderation-number-input" type="number" min="1" max="8760" step="1" />
      </div>

      <p class="admin-user-detail-modal-status" id="moderation-dialog-status" role="status" aria-live="polite"></p>

      <div class="admin-user-detail-modal-actions">
        <button class="admin-btn admin-btn--secondary" type="button" id="moderation-cancel-btn">Cancel</button>
        <button class="admin-btn admin-btn--primary" type="submit" id="moderation-submit-btn">Submit</button>
      </div>
    </form>
  </dialog>

  <script>
    const detailContainer = document.getElementById('user-detail-container');
    const moderationDialog = document.getElementById('moderation-dialog');
    const moderationForm = document.getElementById('moderation-form');
    const moderationTitle = document.getElementById('moderation-dialog-title');
    const moderationDescription = document.getElementById('moderation-dialog-description');
    const moderationTextField = document.getElementById('moderation-text-field');
    const moderationTextLabel = document.getElementById('moderation-text-label');
    const moderationTextInput = document.getElementById('moderation-text-input');
    const moderationNumberField = document.getElementById('moderation-number-field');
    const moderationNumberLabel = document.getElementById('moderation-number-label');
    const moderationNumberInput = document.getElementById('moderation-number-input');
    const moderationStatus = document.getElementById('moderation-dialog-status');
    const moderationSubmitBtn = document.getElementById('moderation-submit-btn');
    const moderationCancelBtn = document.getElementById('moderation-cancel-btn');
    let currentAction = null;
    let currentUserId = null;

    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      currentUserId = urlParams.get('id');
      if (!currentUserId) {
        showMessage('No user ID specified.', true);
        return;
      }
      loadUserDetail(currentUserId);
    });

    moderationCancelBtn.addEventListener('click', () => {
      moderationDialog.close();
    });

    moderationDialog.addEventListener('close', () => {
      currentAction = null;
      moderationForm.reset();
      setModalBusy(false);
      moderationStatus.textContent = '';
    });

    moderationForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!currentAction) return;

      const payload = currentAction.getPayload();
      if (payload.error) {
        moderationStatus.textContent = payload.error;
        return;
      }

      setModalBusy(true);
      moderationStatus.textContent = '';
      try {
        const response = await fetch(currentAction.endpoint, {
          method: 'POST',
          headers: csrfHeaders({ 'Content-Type': 'application/json' }),
          credentials: 'same-origin',
          body: JSON.stringify(payload.body)
        });
        if (!response.ok) {
          moderationStatus.textContent = await getErrorMessage(response, currentAction.failureMessage);
          setModalBusy(false);
          return;
        }
        moderationDialog.close();
        await loadUserDetail(currentUserId);
      } catch (error) {
        console.error(error);
        moderationStatus.textContent = 'Error connecting to server.';
        setModalBusy(false);
      }
    });

    async function loadUserDetail(userId) {
      showLoading();
      try {
        const response = await fetch(`/api/admin/community/users/${encodeURIComponent(userId)}/detail`, {
          credentials: 'same-origin'
        });
        if (!response.ok) {
          showMessage(await getErrorMessage(response, 'User not found or network error.'), true);
          return;
        }
        renderDetail(userId, await response.json());
      } catch (error) {
        console.error(error);
        showMessage('Error connecting to server.', true);
      }
    }

    function renderDetail(userId, data) {
      const user = data.user || {};
      const profile = data.profile || {};
      const badges = Array.isArray(data.badges) ? data.badges : [];
      const recentPosts = Array.isArray(data.recent_posts) ? data.recent_posts : [];
      const xp = data.xp_summary || { total_xp: 0, current_level: 1, current_level_name: 'Newcomer' };
      const displayName = profile.display_name || user.first_name || 'Anonymous User';

      const fragment = document.createDocumentFragment();
      fragment.appendChild(buildHeader(userId, profile, displayName));

      if (profile.mod_notes) {
        fragment.appendChild(buildNotice('Mod Notes:', profile.mod_notes, 'admin-user-detail-notes'));
      }
      if (isFutureDate(profile.muted_until)) {
        fragment.appendChild(buildNotice('Muted Until:', formatDate(profile.muted_until), 'admin-user-detail-muted'));
      }
      if (profile.is_community_banned) {
        fragment.appendChild(buildNotice('User is Currently Banned:', profile.ban_reason || 'No reason provided', 'admin-user-detail-ban'));
      }

      const grid = createElement('div', { className: 'grid-layout', style: 'margin-top:24px;' });
      const leftColumn = createElement('div', { style: 'display:flex; flex-direction: column; gap: 24px;' });
      const rightColumn = createElement('div', { style: 'display:flex; flex-direction: column; gap: 24px;' });

      leftColumn.appendChild(buildProfileCard(user, profile, displayName, userId));
      leftColumn.appendChild(buildXpCard(xp));
      leftColumn.appendChild(buildBadgesCard(badges));
      rightColumn.appendChild(buildRecentPostsCard(recentPosts));
      rightColumn.appendChild(buildAuditLogCard(userId));
      grid.append(leftColumn, rightColumn);
      fragment.appendChild(grid);

      detailContainer.replaceChildren(fragment);
    }

    // Phase 2 task 17: per-user audit log card. Lazily fetches
    // /api/admin/community/audit-log?target_user_id=<id> and renders the
    // entries in a table. We keep the card collapsed by default to avoid
    // blowing up the detail page for users with long histories.
    function buildAuditLogCard(userId) {
      const card = buildCard('Moderation Audit Log');
      const body = createElement('div', { className: 'admin-card-body admin-card-body--flush' });
      const status = createElement('p', {
        style: 'padding:12px 16px; color:#667085; font-size:13px;'
      }, 'Click "Load audit log" to see admin actions taken on this user.');
      const tableHost = createElement('div', { style: 'overflow-x:auto;' });
      const toolbar = createElement('div', {
        style: 'padding:12px 16px; display:flex; gap:8px; align-items:center;'
      });
      const loadBtn = createElement('button', {
        className: 'admin-btn admin-btn--secondary admin-btn--sm',
        type: 'button'
      }, 'Load audit log');
      const refreshBtn = createElement('button', {
        className: 'admin-btn admin-btn--ghost admin-btn--sm',
        type: 'button',
        hidden: true
      }, 'Refresh');
      toolbar.append(loadBtn, refreshBtn);

      async function load() {
        loadBtn.disabled = true;
        refreshBtn.disabled = true;
        status.textContent = 'Loading audit entries…';
        try {
          const url = `/api/admin/community/audit-log?target_user_id=${encodeURIComponent(userId)}&limit=100`;
          const res = await fetch(url, { credentials: 'same-origin' });
          if (!res.ok) throw new Error(`Request failed (${res.status})`);
          const data = await res.json();
          const logs = Array.isArray(data.logs) ? data.logs : [];
          if (logs.length === 0) {
            status.textContent = 'No audit entries for this user yet.';
            tableHost.replaceChildren();
          } else {
            status.textContent = `${logs.length} entr${logs.length === 1 ? 'y' : 'ies'} (most recent first).`;
            tableHost.replaceChildren(buildAuditTable(logs));
          }
          refreshBtn.hidden = false;
          loadBtn.hidden = true;
        } catch (err) {
          console.error('Audit log fetch failed', err);
          status.textContent = 'Failed to load audit log.';
        } finally {
          loadBtn.disabled = false;
          refreshBtn.disabled = false;
        }
      }
      loadBtn.addEventListener('click', load);
      refreshBtn.addEventListener('click', load);

      body.append(toolbar, status, tableHost);
      card.appendChild(body);
      return card;
    }

    function buildAuditTable(logs) {
      const table = createElement('table', { className: 'admin-table' });
      const thead = createElement('thead');
      const headRow = createElement('tr');
      ['When', 'Action', 'Entity', 'Actor', 'Details'].forEach((label) =>
        headRow.appendChild(createElement('th', {}, label))
      );
      thead.appendChild(headRow);
      const tbody = createElement('tbody');
      logs.forEach((entry) => {
        const row = createElement('tr');
        row.appendChild(createElement('td', { style: 'font-size:12px; color:#667085;' }, formatDate(entry.created_at)));
        row.appendChild(createElement('td', { style: 'font-weight:500;' }, entry.action || '—'));
        const entityCell = createElement('td', { style: 'font-size:12px;' });
        entityCell.appendChild(document.createTextNode(entry.entity_type || '—'));
        if (entry.entity_id) {
          entityCell.appendChild(createElement('div', {
            style: 'font-family:monospace; color:#98A2B3; font-size:11px;'
          }, String(entry.entity_id).substring(0, 8) + '…'));
        }
        row.appendChild(entityCell);
        row.appendChild(createElement('td', {
          style: 'font-family:monospace; font-size:11px; color:#667085;'
        }, entry.actor_user_id ? String(entry.actor_user_id).substring(0, 8) + '…' : '—'));
        const detailsCell = createElement('td', {
          style: 'font-family:monospace; font-size:11px; color:#475467; max-width:280px; white-space:pre-wrap; word-break:break-word;'
        });
        const detailsText = entry.details && Object.keys(entry.details).length
          ? JSON.stringify(entry.details)
          : '';
        detailsCell.textContent = detailsText;
        row.appendChild(detailsCell);
        tbody.appendChild(row);
      });
      table.append(thead, tbody);
      return table;
    }

    function csrfHeaders(extraHeaders = {}) {
      const token = typeof window.getCsrfToken === 'function' ? window.getCsrfToken() : '';
      return token ? { ...extraHeaders, 'X-CSRF-Token': token } : extraHeaders;
    }

    function buildHeader(userId, profile, displayName) {
      const header = createElement('div', {
        className: 'admin-page-header',
        style: 'display: flex; justify-content: space-between; align-items: flex-end;'
      });

      const titleWrap = createElement('div', { style: 'flex:1;' });
      titleWrap.appendChild(createElement('h1', { className: 'admin-page-title' }, displayName));
      const subtitle = createElement('p', { className: 'admin-page-subtitle' }, 'ID: ');
      subtitle.appendChild(createElement('span', { style: 'font-family:monospace;' }, userId));
      titleWrap.appendChild(subtitle);

      const actions = createElement('div', { className: 'admin-user-detail-actions' });
      const actionRow = createElement('div', { className: 'admin-user-detail-actions-row' });
      actionRow.appendChild(buildActionButton('Send Warning', 'warning', () => openWarningDialog(userId)));
      actionRow.appendChild(isFutureDate(profile.muted_until)
        ? buildActionButton('Unmute', null, () => openUnmuteDialog(userId))
        : buildActionButton('Mute User', 'warning', () => openMuteDialog(userId)));
      actionRow.appendChild(buildActionButton(
        profile.is_shadowbanned ? 'Un-shadowban' : 'Shadowban',
        'neutral',
        () => openShadowbanDialog(userId, Boolean(profile.is_shadowbanned))
      ));
      actionRow.appendChild(buildActionButton(
        profile.is_community_banned ? 'Unban User' : 'Ban User',
        'danger',
        () => openBanDialog(userId, Boolean(profile.is_community_banned))
      ));

      actions.appendChild(actionRow);
      actions.appendChild(buildActionButton('Edit Mod Notes', null, () => openModNotesDialog(userId, profile.mod_notes || ''), true));
      header.append(titleWrap, actions);
      return header;
    }

    function buildProfileCard(user, profile, displayName, userId) {
      const card = buildCard();
      const body = createElement('div', { className: 'admin-card-body' });
      const profileHeader = createElement('div', { className: 'profile-header' });
      profileHeader.appendChild(buildAvatar(user.avatar_url, displayName));
      const identity = createElement('div');
      identity.appendChild(createElement('div', { style: 'font-size:18px; font-weight:600; color:#101828;' }, displayName));
      identity.appendChild(createElement('div', { style: 'font-size:14px; color:#667085;' }, user.email || 'No email associated'));
      identity.appendChild(createElement('div', {
        style: 'font-size:12px; color:#667085; font-family:monospace; margin-top:4px;'
      }, `Core ID: ${user.id || userId}`));
      profileHeader.appendChild(identity);
      body.appendChild(profileHeader);

      const bioBox = createElement('div', { style: 'background:#f9fafb; padding:16px; border-radius:8px; margin-bottom:16px;' });
      bioBox.appendChild(createElement('div', {
        style: 'font-size:12px; color:#667085; text-transform:uppercase; font-weight:600; margin-bottom:8px;'
      }, 'Bio'));
      const bioText = createElement('div', { style: 'font-size:14px; color:#344054;' });
      if (profile.bio) {
        bioText.textContent = profile.bio;
      } else {
        bioText.appendChild(createElement('i', {}, 'No bio provided'));
      }
      bioBox.appendChild(bioText);
      body.appendChild(bioBox);

      const metrics = createElement('div', { className: 'admin-user-detail-metric-grid' });
      metrics.append(
        buildMetric('Posts', profile.post_count || 0),
        buildMetric('Followers', profile.follower_count || 0),
        buildMetric('Warnings', profile.warning_count || 0),
        buildMetric('Login Streak', profile.login_streak || 0)
      );
      body.appendChild(metrics);
      card.appendChild(body);
      return card;
    }

    function buildXpCard(xp) {
      const card = buildCard('Level & XP');
      const body = createElement('div', { className: 'admin-card-body' });
      const wrap = createElement('div', { style: 'display:flex; align-items:center; gap:16px; margin-bottom:16px;' });
      wrap.appendChild(createElement('div', { style: 'font-size:32px; font-weight:700; color:#1570EF;' }, `Lvl ${xp.current_level || 1}`));
      const copy = createElement('div');
      copy.appendChild(createElement('div', { style: 'font-weight:600; color:#101828;' }, xp.current_level_name || 'Newcomer'));
      copy.appendChild(createElement('div', { style: 'font-size:14px; color:#667085;' }, `${xp.total_xp || 0} Total XP`));
      wrap.appendChild(copy);
      body.appendChild(wrap);
      card.appendChild(body);
      return card;
    }

    function buildBadgesCard(badges) {
      const card = buildCard(`Badges (${badges.length})`);
      const body = createElement('div', { className: 'admin-card-body' });
      if (badges.length === 0) {
        body.appendChild(createElement('p', { style: 'color:#667085;' }, 'No badges.'));
      } else {
        const list = createElement('div', { style: 'display:flex; flex-wrap:wrap; gap:8px;' });
        badges.forEach((badge) => {
          const item = createElement('span', { className: 'admin-badge', style: 'background:#f9fafb;' });
          if (badge.description) item.setAttribute('title', String(badge.description));
          item.textContent = [badge.icon, badge.name].filter(Boolean).join(' ');
          list.appendChild(item);
        });
        body.appendChild(list);
      }
      card.appendChild(body);
      return card;
    }

    function buildRecentPostsCard(posts) {
      const card = buildCard('Recent Posts');
      const body = createElement('div', { className: 'admin-card-body admin-card-body--flush' });
      if (posts.length === 0) {
        body.appendChild(createElement('p', { style: 'color:#667085;' }, 'No recent posts.'));
      } else {
        const table = createElement('table', { className: 'admin-table' });
        const thead = createElement('thead');
        const headRow = createElement('tr');
        ['Content', 'Type', 'Date'].forEach((label) => headRow.appendChild(createElement('th', {}, label)));
        thead.appendChild(headRow);
        const tbody = createElement('tbody');
        posts.forEach((post) => tbody.appendChild(buildPostRow(post)));
        table.append(thead, tbody);
        body.appendChild(table);
      }
      card.appendChild(body);
      return card;
    }

    function buildPostRow(post) {
      const row = createElement('tr');
      const contentCell = createElement('td', { style: 'max-width:200px; white-space:normal; font-size:13px;' });
      const link = createElement('a', { style: 'color:#3538cd; text-decoration:none;' });
      link.href = `/admin/community/post-detail.html?id=${encodeURIComponent(String(post.id || ''))}`;
      const content = String(post.content || '');
      link.textContent = content + (content.length === 200 ? '...' : '');
      contentCell.appendChild(link);
      if (post.is_hidden) {
        contentCell.appendChild(createElement('span', {
          className: 'admin-badge',
          style: 'background:#FEF3F2; color:#B42318; margin-left:8px;'
        }, 'Hidden'));
      }
      row.appendChild(contentCell);

      const typeCell = createElement('td');
      typeCell.appendChild(createElement('span', { className: 'admin-badge' }, post.post_type || 'post'));
      row.appendChild(typeCell);

      const dateCell = createElement('td');
      dateCell.appendChild(createElement('small', {}, formatDate(post.created_at)));
      row.appendChild(dateCell);
      return row;
    }

    function buildAvatar(avatarUrl, displayName) {
      const safeAvatarUrl = getSafeHttpUrl(avatarUrl);
      if (safeAvatarUrl) {
        const image = createElement('img', { className: 'avatar-img' });
        image.src = safeAvatarUrl;
        image.alt = `${displayName} avatar`;
        image.referrerPolicy = 'no-referrer';
        return image;
      }
      return createElement('div', { className: 'avatar', 'aria-hidden': 'true' }, displayName.substring(0, 2).toUpperCase());
    }

    function buildMetric(label, value) {
      const metric = createElement('div', { className: 'admin-user-detail-metric' });
      metric.appendChild(createElement('div', { className: 'admin-user-detail-metric-value' }, String(value)));
      metric.appendChild(createElement('div', { className: 'admin-user-detail-metric-label' }, label));
      return metric;
    }

    function buildNotice(label, value, className) {
      const notice = createElement('div', { className });
      notice.appendChild(createElement('span', { className: `${className}-label` }, label));
      notice.appendChild(document.createTextNode(' '));
      notice.appendChild(document.createTextNode(value));
      return notice;
    }

    function buildCard(title) {
      const card = createElement('div', { className: 'admin-card' });
      if (title) {
        const header = createElement('div', { className: 'admin-card-header' });
        header.appendChild(createElement('h2', { className: 'admin-card-title' }, title));
        card.appendChild(header);
      }
      return card;
    }

    function buildActionButton(label, tone, onClick, small = false) {
      const button = createElement('button', {
        className: `admin-btn admin-btn--secondary${small ? ' admin-btn--sm' : ''}`,
        type: 'button'
      }, label);
      if (tone === 'warning') {
        button.style.color = '#d97706';
        button.style.borderColor = '#d97706';
      } else if (tone === 'danger') {
        button.style.color = '#b42318';
        button.style.borderColor = '#b42318';
      } else if (tone === 'neutral') {
        button.style.color = '#667085';
        button.style.borderColor = '#667085';
      }
      button.addEventListener('click', onClick);
      return button;
    }

    function openWarningDialog(userId) {
      openModerationDialog({
        title: 'Send warning',
        description: 'The user will receive an in-app notification with this reason.',
        submitLabel: 'Send warning',
        endpoint: `/api/admin/community/users/${encodeURIComponent(userId)}/warn`,
        text: { label: 'Warning reason', required: true, maxLength: 1000 },
        failureMessage: 'Failed to send warning.',
        getPayload: () => {
          const reason = moderationTextInput.value.trim();
          if (!reason) return { error: 'Warning reason is required.' };
          if (reason.length > 1000) return { error: 'Warning reason must be 1000 characters or fewer.' };
          return { body: { reason } };
        }
      });
    }

    function openMuteDialog(userId) {
      openModerationDialog({
        title: 'Mute user',
        description: 'Set how long this user should be unable to participate in community actions.',
        submitLabel: 'Mute user',
        endpoint: `/api/admin/community/users/${encodeURIComponent(userId)}/mute`,
        number: { label: 'Mute duration in hours', required: true },
        failureMessage: 'Failed to update mute status.',
        getPayload: () => {
          const hours = Number.parseInt(moderationNumberInput.value, 10);
          if (!Number.isInteger(hours) || hours <= 0 || hours > 8760) {
            return { error: 'Mute duration must be between 1 and 8760 hours.' };
          }
          return { body: { hours } };
        }
      });
    }

    function openUnmuteDialog(userId) {
      openModerationDialog({
        title: 'Unmute user',
        description: 'Confirm that this user should be allowed to participate again.',
        submitLabel: 'Unmute user',
        endpoint: `/api/admin/community/users/${encodeURIComponent(userId)}/mute`,
        failureMessage: 'Failed to update mute status.',
        getPayload: () => ({ body: { hours: null } })
      });
    }

    function openBanDialog(userId, isBanned) {
      openModerationDialog({
        title: isBanned ? 'Unban user' : 'Ban user',
        description: isBanned
          ? 'Confirm that this user should regain access to the community.'
          : 'The user will be blocked from community participation until unbanned.',
        submitLabel: isBanned ? 'Unban user' : 'Ban user',
        endpoint: `/api/admin/community/users/${encodeURIComponent(userId)}/ban`,
        text: isBanned ? null : { label: 'Ban reason', required: true, maxLength: 1000 },
        failureMessage: isBanned ? 'Failed to unban user.' : 'Failed to ban user.',
        getPayload: () => {
          const reason = isBanned ? '' : moderationTextInput.value.trim();
          if (!isBanned && !reason) return { error: 'Ban reason is required.' };
          if (reason.length > 1000) return { error: 'Ban reason must be 1000 characters or fewer.' };
          return { body: { is_banned: !isBanned, reason } };
        }
      });
    }

    function openShadowbanDialog(userId, isShadowbanned) {
      openModerationDialog({
        title: isShadowbanned ? 'Remove shadowban' : 'Shadowban user',
        description: isShadowbanned
          ? 'Confirm that this user should no longer be shadowbanned.'
          : 'Confirm that this user should be hidden from other community members.',
        submitLabel: isShadowbanned ? 'Remove shadowban' : 'Shadowban user',
        endpoint: `/api/admin/community/users/${encodeURIComponent(userId)}/shadowban`,
        failureMessage: isShadowbanned ? 'Failed to remove shadowban.' : 'Failed to shadowban user.',
        getPayload: () => ({ body: { is_shadowbanned: !isShadowbanned } })
      });
    }

    function openModNotesDialog(userId, existingNotes) {
      openModerationDialog({
        title: 'Edit moderator notes',
        description: 'These notes are only visible to admins.',
        submitLabel: 'Save notes',
        endpoint: `/api/admin/community/users/${encodeURIComponent(userId)}/mod-notes`,
        text: { label: 'Moderator notes', required: false, maxLength: 5000, value: existingNotes },
        failureMessage: 'Failed to update notes.',
        getPayload: () => {
          const notes = moderationTextInput.value;
          if (notes.length > 5000) return { error: 'Moderator notes must be 5000 characters or fewer.' };
          return { body: { notes } };
        }
      });
    }

    function openModerationDialog(config) {
      currentAction = config;
      moderationTitle.textContent = config.title;
      moderationDescription.textContent = config.description;
      moderationSubmitBtn.textContent = config.submitLabel;
      moderationStatus.textContent = '';

      configureTextField(config.text);
      configureNumberField(config.number);

      if (moderationDialog.open) moderationDialog.close();
      moderationDialog.showModal();
      const firstField = config.text ? moderationTextInput : config.number ? moderationNumberInput : moderationSubmitBtn;
      firstField.focus();
    }

    function configureTextField(config) {
      moderationTextField.hidden = !config;
      moderationTextInput.required = Boolean(config && config.required);
      moderationTextInput.value = config && config.value ? config.value : '';
      moderationTextInput.maxLength = config && config.maxLength ? config.maxLength : -1;
      if (config) moderationTextLabel.textContent = config.label;
    }

    function configureNumberField(config) {
      moderationNumberField.hidden = !config;
      moderationNumberInput.required = Boolean(config && config.required);
      moderationNumberInput.value = '';
      if (config) moderationNumberLabel.textContent = config.label;
    }

    function setModalBusy(isBusy) {
      moderationSubmitBtn.disabled = isBusy;
      moderationCancelBtn.disabled = isBusy;
      moderationSubmitBtn.textContent = isBusy ? 'Saving...' : (currentAction ? currentAction.submitLabel : 'Submit');
    }

    async function getErrorMessage(response, fallback) {
      try {
        const payload = await response.json();
        return payload.error || payload.message || fallback;
      } catch (_) {
        return fallback;
      }
    }

    function showLoading() {
      detailContainer.replaceChildren(createElement('div', {
        style: 'text-align:center; padding: 40px;'
      }, 'Loading...'));
    }

    function showMessage(message, isError) {
      detailContainer.replaceChildren(createElement('div', {
        style: `padding:40px; color:${isError ? '#b42318' : '#667085'};`
      }, message));
    }

    function createElement(tag, options = {}, text) {
      const element = document.createElement(tag);
      Object.entries(options).forEach(([key, value]) => {
        if (key === 'className') {
          element.className = value;
        } else if (key === 'style') {
          element.style.cssText = value;
        } else {
          element.setAttribute(key, value);
        }
      });
      if (text !== undefined) element.textContent = text;
      return element;
    }

    function getSafeHttpUrl(value) {
      if (!value) return null;
      try {
        const url = new URL(String(value), window.location.origin);
        if (url.protocol === 'http:' || url.protocol === 'https:') return url.href;
      } catch (_) {
        return null;
      }
      return null;
    }

    function isFutureDate(value) {
      if (!value) return false;
      const date = new Date(value);
      return Number.isFinite(date.getTime()) && date > new Date();
    }

    function formatDate(value) {
      const date = new Date(value);
      return Number.isFinite(date.getTime()) ? date.toLocaleString() : 'Unknown';
    }
  </script>
</body>

</html>
