<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/static/images/icons/logo-pool.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ban Appeals | Community Admin | POOOL</title>

  <link rel="stylesheet" href="/static/css/admin.css?v=1.0.1" />
  <script src="/static/js/user-data.js"></script>
  <script src="/static/js/admin-theme.js"></script>
  <script src="/static/js/admin-permission-guard.js"></script>
  <script defer src="/static/js/admin-community-appeals.js"></script>
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/bundle.css" />
</head>

<body class="admin-body dom-ready">
  <div class="admin-wrapper">
    {% include 'admin/components/sidebar.html' %}

    <main class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar-left">
          <nav class="admin-breadcrumbs">
            <a href="/admin/">Admin</a>
            <span class="separator">›</span>
            <a href="/admin/community/">Community</a>
            <span class="separator">›</span>
            <span class="current">Ban Appeals</span>
          </nav>
        </div>
      </header>

      <div class="admin-content">
        <div class="admin-page-header admin-page-header--split">
          <div>
            <h1 class="admin-page-title">Ban Appeals</h1>
            <p class="admin-page-subtitle">Review appeals submitted by community-banned users.</p>
          </div>
          <div class="admin-page-header__actions">
            <label for="appeals-status-filter" class="ds-sr-only">Filter by status</label>
            <select id="appeals-status-filter" class="admin-input admin-input--compact">
              <option value="pending" selected>Pending</option>
              <option value="approved">Approved</option>
              <option value="rejected">Rejected</option>
              <option value="all">All</option>
            </select>
            <button class="admin-btn admin-btn--secondary" id="appeals-refresh-btn" type="button">Refresh</button>
          </div>
        </div>

        <div class="admin-card">
          <div class="admin-card-body admin-card-body--flush">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>User</th>
                  <th>Appeal</th>
                  <th>Status</th>
                  <th>Submitted</th>
                  <th class="admin-table__cell-actions">Actions</th>
                </tr>
              </thead>
              <tbody id="appeals-table">
                <tr>
                  <td colspan="5" class="admin-table__message">
                    Loading appeals...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Review modal -->
  <div id="appeal-review-modal" class="admin-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="appeal-modal-title" aria-hidden="true">
    <div class="ds-modal__backdrop" data-appeals-close-modal></div>
    <div class="admin-modal admin-modal--md" tabindex="-1">
      <div class="admin-modal__header">
        <h3 id="appeal-modal-title" class="admin-modal__title">Review Appeal</h3>
        <button type="button" class="admin-modal__close" data-appeals-close-modal aria-label="Close appeal review">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <input type="hidden" id="appeal-modal-id">
      <div class="admin-modal__row">
        <div class="admin-modal__row-label">Submitted by</div>
        <div id="appeal-modal-user" class="admin-modal__row-value">—</div>
      </div>
      <div class="admin-modal__row">
        <div class="admin-modal__row-label">Appeal text</div>
        <div id="appeal-modal-text" class="admin-modal__pre"></div>
      </div>
      <div class="admin-modal__field">
        <label class="admin-modal__label" for="appeal-modal-notes">Admin Notes</label>
        <textarea id="appeal-modal-notes" class="admin-modal__textarea" rows="3" maxlength="1000" placeholder="Optional notes shown to the user..."></textarea>
        <p id="appeal-modal-error" class="admin-modal__error" role="alert" hidden></p>
      </div>
      <div class="admin-modal__actions">
        <button type="button" class="admin-btn admin-btn--secondary" data-appeals-close-modal>Cancel</button>
        <button type="button" id="appeal-reject-btn" class="admin-btn admin-btn--danger">Reject</button>
        <button type="button" id="appeal-approve-btn" class="admin-btn admin-btn--primary">Approve</button>
      </div>
    </div>
  </div>
</body>
</html>
