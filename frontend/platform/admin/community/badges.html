<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/static/images/icons/logo-pool.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badge Management | Admin | POOOL</title>
  
  <link rel="stylesheet" href="/static/css/admin.css?v=1.0.1" />
  <script src="/static/js/user-data.js"></script>
  <script src="/static/js/admin-theme.js"></script>
  <script src="/static/js/admin-permission-guard.js"></script>
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/bundle.css" />
</head>

<body class="admin-body dom-ready">
  <div class="admin-wrapper">
    {% include 'admin/components/sidebar.html' %}

    <!-- ===== MAIN CONTENT ===== -->
    <main class="admin-main">
      <!-- Top Bar -->
      <header class="admin-topbar">
        <div class="admin-topbar-left">
          <nav class="admin-breadcrumbs">
            <a href="/admin/">Admin</a>
            <span class="separator">›</span>
            <a href="/admin/community/">Community</a>
            <span class="separator">›</span>
            <span class="current">Badges</span>
          </nav>
        </div>
      </header>

      <!-- Page Content -->
      <div class="admin-content">
        <!-- Page Header -->
        <div class="admin-page-header" style="display: flex; justify-content: space-between; align-items: flex-end;">
          <div>
            <h1 class="admin-page-title">Badge Management</h1>
            <p class="admin-page-subtitle">Define, edit, and assign community badges to users.</p>
          </div>
          <div>
            <button class="admin-btn admin-btn--primary" id="new-badge-btn" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              New Badge
            </button>
          </div>
        </div>

        <!-- Stats Row -->
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px;">
          <div class="admin-card" style="padding: 20px;">
            <div style="font-size: 12px; font-weight: 600; color: #667085; text-transform: uppercase; letter-spacing: 0.5px;">Total Badges</div>
            <div id="stat-total" style="font-size: 28px; font-weight: 700; color: #181D27; margin-top: 4px;">—</div>
          </div>
          <div class="admin-card" style="padding: 20px;">
            <div style="font-size: 12px; font-weight: 600; color: #667085; text-transform: uppercase; letter-spacing: 0.5px;">Total Awards</div>
            <div id="stat-awards" style="font-size: 28px; font-weight: 700; color: #181D27; margin-top: 4px;">—</div>
          </div>
          <div class="admin-card" style="padding: 20px;">
            <div style="font-size: 12px; font-weight: 600; color: #667085; text-transform: uppercase; letter-spacing: 0.5px;">Most Popular</div>
            <div id="stat-popular" style="font-size: 16px; font-weight: 700; color: #181D27; margin-top: 4px;">—</div>
          </div>
        </div>

        <!-- Badges Grid -->
        <div class="admin-card">
          <div class="admin-card-body">
            <div id="badges-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;">
              <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--admin-text-muted);">
                Loading badges...
              </div>
            </div>
          </div>
        </div>

        <!-- Grant Badge Section -->
        <div class="admin-card" style="margin-top: 24px;">
          <div class="admin-card-header">
            <h3 class="admin-card-title">Grant Badge to User</h3>
          </div>
          <div class="admin-card-body">
            <div style="display: flex; gap: 12px; align-items: flex-end;">
              <div style="flex: 1;">
                <label style="display: block; font-size: 13px; font-weight: 500; color: #344054; margin-bottom: 6px;">User ID</label>
                <input type="text" id="grant-user-id" class="admin-input" placeholder="UUID of the user" style="width: 100%;" />
              </div>
              <div style="flex: 1;">
                <label style="display: block; font-size: 13px; font-weight: 500; color: #344054; margin-bottom: 6px;">Badge Code</label>
                <select id="grant-badge-code" class="admin-input" style="width: 100%; padding: 8px 12px;">
                  <option value="">Select a badge...</option>
                </select>
              </div>
              <button class="admin-btn admin-btn--primary" id="grant-badge-btn" type="button" style="white-space: nowrap;">Grant Badge</button>
            </div>
            <div id="grant-badge-status" role="status" aria-live="polite" style="margin-top:12px;font-size:13px;color:#667085;"></div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Create/Edit Badge Modal -->
  <div id="badge-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:16px;padding:32px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.15);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
        <h3 id="modal-title" style="font-size:20px;font-weight:700;color:#181D27;margin:0;">Create Badge</h3>
        <button id="badge-modal-close" type="button" aria-label="Close badge dialog" style="background:none;border:none;font-size:20px;cursor:pointer;color:#667085;">✕</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label style="display:block;font-size:13px;font-weight:500;color:#344054;margin-bottom:6px;">Code (unique ID)</label>
          <input type="text" id="badge-code" class="admin-input" placeholder="e.g. early_adopter" style="width:100%;" />
        </div>
        <div>
          <label style="display:block;font-size:13px;font-weight:500;color:#344054;margin-bottom:6px;">Name</label>
          <input type="text" id="badge-name" class="admin-input" placeholder="e.g. Early Adopter" style="width:100%;" />
        </div>
        <div>
          <label style="display:block;font-size:13px;font-weight:500;color:#344054;margin-bottom:6px;">Description</label>
          <textarea id="badge-description" class="admin-input" placeholder="Description of how to earn this badge" rows="2" style="width:100%;resize:none;"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label style="display:block;font-size:13px;font-weight:500;color:#344054;margin-bottom:6px;">Icon (emoji)</label>
            <input type="text" id="badge-icon" class="admin-input" placeholder="🏅" style="width:100%;" />
          </div>
          <div>
            <label style="display:block;font-size:13px;font-weight:500;color:#344054;margin-bottom:6px;">Display Order</label>
            <input type="number" id="badge-order" class="admin-input" placeholder="0" value="0" style="width:100%;" />
          </div>
        </div>
        <div style="display:flex;gap:12px;margin-top:8px;">
          <button class="admin-btn admin-btn--secondary" id="badge-cancel-btn" type="button" style="flex:1;">Cancel</button>
          <button id="badge-save-btn" class="admin-btn admin-btn--primary" type="button" style="flex:1;">Create Badge</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let _badges = [];
    let _editBadgeId = null;
    let _lastFocusedBeforeModal = null;

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('new-badge-btn')?.addEventListener('click', openCreateModal);
      document.getElementById('badge-modal-close')?.addEventListener('click', closeBadgeModal);
      document.getElementById('badge-cancel-btn')?.addEventListener('click', closeBadgeModal);
      document.getElementById('badge-save-btn')?.addEventListener('click', saveBadge);
      document.getElementById('grant-badge-btn')?.addEventListener('click', grantBadge);
      document.getElementById('badge-modal')?.addEventListener('click', (event) => {
        if (event.target.id === 'badge-modal') closeBadgeModal();
      });
      document.addEventListener('keydown', handleDialogKeydown);
      loadBadges();
    });

    async function loadBadges() {
      try {
        const res = await fetch('/api/admin/community/badges');
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();
        _badges = data.badges || [];
        renderBadges();
        updateStats();
        updateBadgeSelect();
      } catch (e) {
        console.error(e);
        renderGridMessage('Failed to load badges', '#D92D20');
      }
    }

    function renderBadges() {
      const grid = document.getElementById('badges-grid');
      if (_badges.length === 0) {
        renderGridMessage('No badges defined yet.', 'var(--admin-text-muted)');
        return;
      }

      grid.textContent = '';
      for (const b of _badges) {
        const card = document.createElement('div');
        card.style.cssText = 'background:#fff;border:1px solid #EAECF0;border-radius:12px;padding:20px;transition:box-shadow 0.2s;';
        card.onmouseenter = () => card.style.boxShadow = '0 4px 12px rgba(0,0,0,0.06)';
        card.onmouseleave = () => card.style.boxShadow = 'none';

        const header = document.createElement('div');
        header.style.cssText = 'display:flex;align-items:center;gap:12px;margin-bottom:12px;';

        const icon = document.createElement('div');
        icon.style.cssText = 'font-size:28px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:#F9FAFB;border-radius:10px;';
        icon.textContent = b.icon || '';
        header.appendChild(icon);

        const titleWrap = document.createElement('div');
        titleWrap.style.flex = '1';
        const name = document.createElement('div');
        name.style.cssText = 'font-size:15px;font-weight:600;color:#181D27;';
        name.textContent = b.name || '';
        const code = document.createElement('div');
        code.style.cssText = 'font-size:11px;color:#98A2B3;font-family:monospace;';
        code.textContent = b.code || '';
        titleWrap.append(name, code);
        header.appendChild(titleWrap);
        card.appendChild(header);

        const description = document.createElement('p');
        description.style.cssText = 'font-size:13px;color:#667085;line-height:1.4;margin:0 0 12px;';
        description.textContent = b.description || '';
        card.appendChild(description);

        const footer = document.createElement('div');
        footer.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:8px;';
        const count = document.createElement('span');
        count.style.cssText = 'font-size:12px;color:#667085;';
        const usersCount = Number(b.users_count || 0);
        count.textContent = `${usersCount} user${usersCount === 1 ? '' : 's'}`;
        const edit = document.createElement('button');
        edit.className = 'admin-btn admin-btn--ghost admin-btn--sm';
        edit.type = 'button';
        edit.textContent = 'Edit';
        edit.addEventListener('click', () => editBadge(b.id));
        footer.append(count, edit);
        card.appendChild(footer);

        const awardedUsers = Array.isArray(b.awarded_users) ? b.awarded_users : [];
        if (awardedUsers.length > 0) {
          const awards = document.createElement('div');
          awards.style.cssText = 'border-top:1px solid #EAECF0;margin-top:12px;padding-top:12px;';
          const awardsTitle = document.createElement('div');
          awardsTitle.style.cssText = 'font-size:11px;font-weight:700;color:#667085;text-transform:uppercase;margin-bottom:8px;';
          awardsTitle.textContent = 'Recent awards';
          awards.appendChild(awardsTitle);
          awardedUsers.forEach((award) => {
            const row = document.createElement('div');
            row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px;';
            const user = document.createElement('span');
            user.style.cssText = 'font-size:11px;color:#667085;font-family:monospace;overflow:hidden;text-overflow:ellipsis;';
            user.textContent = award.user_id || '';
            const revoke = document.createElement('button');
            revoke.className = 'admin-btn admin-btn--ghost admin-btn--sm';
            revoke.type = 'button';
            revoke.textContent = 'Revoke';
            revoke.addEventListener('click', () => revokeBadge(award.user_id, b.id));
            row.append(user, revoke);
            awards.appendChild(row);
          });
          card.appendChild(awards);
        }

        grid.appendChild(card);
      }
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = _badges.length;
      const totalAwards = _badges.reduce((sum, b) => sum + b.users_count, 0);
      document.getElementById('stat-awards').textContent = totalAwards;
      if (_badges.length > 0) {
        const popular = [..._badges].sort((a, b) => b.users_count - a.users_count)[0];
        document.getElementById('stat-popular').textContent = popular.icon + ' ' + popular.name + ' (' + popular.users_count + ')';
      }
    }

    function updateBadgeSelect() {
      const select = document.getElementById('grant-badge-code');
      select.innerHTML = '<option value="">Select a badge...</option>';
      for (const b of _badges) {
        const opt = document.createElement('option');
        opt.value = b.code;
        opt.textContent = b.icon + ' ' + b.name;
        select.appendChild(opt);
      }
    }

    function openCreateModal() {
      _editBadgeId = null;
      document.getElementById('modal-title').textContent = 'Create Badge';
      document.getElementById('badge-save-btn').textContent = 'Create Badge';
      document.getElementById('badge-code').value = '';
      document.getElementById('badge-code').disabled = false;
      document.getElementById('badge-name').value = '';
      document.getElementById('badge-description').value = '';
      document.getElementById('badge-icon').value = '🏅';
      document.getElementById('badge-order').value = _badges.length;
      openBadgeModal();
    }

    function editBadge(badgeId) {
      const b = _badges.find(x => x.id === badgeId);
      if (!b) return;
      _editBadgeId = badgeId;
      document.getElementById('modal-title').textContent = 'Edit Badge';
      document.getElementById('badge-save-btn').textContent = 'Save Changes';
      document.getElementById('badge-code').value = b.code;
      document.getElementById('badge-code').disabled = true;
      document.getElementById('badge-name').value = b.name;
      document.getElementById('badge-description').value = b.description;
      document.getElementById('badge-icon').value = b.icon;
      document.getElementById('badge-order').value = b.display_order;
      openBadgeModal();
    }

    function openBadgeModal() {
      _lastFocusedBeforeModal = document.activeElement;
      const modal = document.getElementById('badge-modal');
      modal.style.display = 'flex';
      modal.setAttribute('aria-hidden', 'false');
      setTimeout(() => document.getElementById(_editBadgeId ? 'badge-name' : 'badge-code')?.focus(), 0);
    }

    function closeBadgeModal() {
      const modal = document.getElementById('badge-modal');
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden', 'true');
      if (_lastFocusedBeforeModal && typeof _lastFocusedBeforeModal.focus === 'function') {
        _lastFocusedBeforeModal.focus();
      }
    }

    async function saveBadge() {
      const btn = document.getElementById('badge-save-btn');
      btn.disabled = true;

      try {
        if (_editBadgeId) {
          // Update
          const res = await fetch('/api/admin/community/badges/' + _editBadgeId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: document.getElementById('badge-name').value,
              description: document.getElementById('badge-description').value,
              icon: document.getElementById('badge-icon').value,
              display_order: parseInt(document.getElementById('badge-order').value) || 0,
            })
          });
          if (!res.ok) throw new Error(await getErrorMessage(res));
        } else {
          // Create
          const code = document.getElementById('badge-code').value.trim();
          if (!code) return alert('Badge code is required');
          const res = await fetch('/api/admin/community/badges', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              code,
              name: document.getElementById('badge-name').value,
              description: document.getElementById('badge-description').value,
              icon: document.getElementById('badge-icon').value,
              display_order: parseInt(document.getElementById('badge-order').value) || 0,
            })
          });
          if (!res.ok) throw new Error(await getErrorMessage(res));
        }
        closeBadgeModal();
        loadBadges();
      } catch (e) {
        alert('Error: ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function grantBadge() {
      const userId = document.getElementById('grant-user-id').value.trim();
      const badgeCode = document.getElementById('grant-badge-code').value;
      const status = document.getElementById('grant-badge-status');
      if (!userId || !badgeCode) return alert('Please enter a User ID and select a badge.');

      try {
        status.textContent = 'Granting badge...';
        const res = await fetch('/api/admin/community/users/' + userId + '/badge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ badge_code: badgeCode })
        });
        if (!res.ok) throw new Error(await getErrorMessage(res));
        const result = await res.json();
        status.textContent = result.already_granted ? 'User already has this badge.' : 'Badge granted successfully.';
        await loadBadges();
      } catch (e) {
        status.textContent = 'Failed: ' + e.message;
      }
    }

    async function revokeBadge(userId, badgeId) {
      if (!userId || !badgeId) return;
      if (!window.confirm('Revoke this badge from the selected user?')) return;

      try {
        const res = await fetch('/api/admin/community/users/' + userId + '/badge/' + badgeId, {
          method: 'DELETE'
        });
        if (!res.ok) throw new Error(await getErrorMessage(res));
        await loadBadges();
      } catch (e) {
        alert('Failed to revoke badge: ' + e.message);
      }
    }

    function renderGridMessage(message, color) {
      const grid = document.getElementById('badges-grid');
      grid.textContent = '';
      const el = document.createElement('div');
      el.style.cssText = 'grid-column:1/-1;text-align:center;padding:40px;';
      el.style.color = color;
      el.textContent = message;
      grid.appendChild(el);
    }

    function handleDialogKeydown(event) {
      const modal = document.getElementById('badge-modal');
      if (!modal || modal.getAttribute('aria-hidden') === 'true') return;

      if (event.key === 'Escape') {
        event.preventDefault();
        closeBadgeModal();
        return;
      }

      if (event.key !== 'Tab') return;
      const focusable = Array.from(modal.querySelectorAll('button, input, textarea, select, [tabindex]:not([tabindex="-1"])'))
        .filter((el) => !el.disabled && el.offsetParent !== null);
      if (focusable.length === 0) return;
      const first = focusable[0];
      const last = focusable[focusable.length - 1];

      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault();
        last.focus();
      } else if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault();
        first.focus();
      }
    }

    async function getErrorMessage(res) {
      const text = await res.text();
      try {
        const json = JSON.parse(text);
        return json.error || json.message || text || 'Request failed';
      } catch (_e) {
        return text || 'Request failed';
      }
    }
  </script>
</body>

</html>
