<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/static/images/logo-pool.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management | Admin | POOOL</title>
  <meta name="description" content="POOOL Admin — User directory, profiles, KYC, and account management." />
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/css/admin.css?v=1.0.1" />
  <script src="/static/js/user-data.js"></script>
  <link rel="stylesheet" href="/static/css/poool-dropdown.css" />
  <script src="/static/js/poool-dropdown.js"></script>
  <script src="/static/js/poool-dropdown-init.js"></script>
  <script src="/static/js/admin-theme.js"></script>
  <script src="/static/js/admin-permission-guard.js"></script>
  <script src="/static/js/admin-global-search.js"></script>
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/bundle.css" />
</head>

<body class="admin-body dom-ready">
  <div class="admin-wrapper">
    <!-- Sidebar Placeholder -->
    <div id="admin-sidebar-placeholder"></div>
    <script src="/static/js/admin-sidebar-loader.js"></script>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar-left">
          <nav class="admin-breadcrumbs">
            <a href="/admin/">Admin</a>
            <span class="separator">›</span>
            <span class="current">Users</span>
          </nav>
        </div>
        <div class="admin-topbar-right">
          <div class="admin-search">
            <svg class="admin-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.66667"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="6" />
              <path d="M21 21l-4.35-4.35" />
            </svg>
            <input type="text" placeholder="Search users, assets, orders…" id="admin-global-search"
              aria-label="Global admin search" />
          </div>
          <button class="admin-notification-btn" title="Notifications" aria-label="View notifications">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9z" fill="currentColor" fill-opacity="0.1" />
              <path d="M13.73 21a2 2 0 01-3.46 0" />
            </svg>
            <span class="admin-notification-badge" style="display:none"></span>
          </button>
        </div>
      </header>

      <div class="admin-content">
        <!-- Page Header -->
        <div class="admin-page-header" style="
              display: flex;
              justify-content: space-between;
              align-items: center;
            ">
          <div>
            <h1 class="admin-page-title">Users</h1>
            <p class="admin-page-subtitle">
              Manage all platform users, profiles, and accounts
            </p>
          </div>
          <div style="display: flex; gap: 8px">
            <button class="admin-btn admin-btn--secondary" id="export-users-btn">
              <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 13v3a2 2 0 01-2 2H5a2 2 0 01-2-2v-3" />
                <path d="M7 8l3 3 3-3" />
                <path d="M10 2v9" />
              </svg>
              Export CSV
            </button>
          </div>
        </div>

        <!-- User Stats Summary -->
        <div class="admin-kpi-grid" style="grid-template-columns: repeat(5, 1fr); margin-bottom: 20px">
          <div class="admin-kpi-card" style="padding: 16px">
            <div class="admin-kpi-header" style="margin-bottom: 8px">
              <span class="admin-kpi-label">Total Users</span>
              <div class="admin-kpi-icon">
                <svg class="admin-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="4" y="4" width="16" height="16" rx="3" />
                  <path d="M8 12h8" />
                </svg>
              </div>
            </div>
            <div class="admin-kpi-value" style="font-size: 22px" id="stat-total">
              —
            </div>
          </div>
          <div class="admin-kpi-card" style="padding: 16px">
            <div class="admin-kpi-header" style="margin-bottom: 8px">
              <span class="admin-kpi-label">Investors</span>
              <div class="admin-kpi-icon">
                <svg class="admin-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="4" y="4" width="16" height="16" rx="3" />
                  <path d="M8 12h8" />
                </svg>
              </div>
            </div>
            <div class="admin-kpi-value" style="font-size: 22px" id="stat-investors">
              —
            </div>
          </div>
          <div class="admin-kpi-card" style="padding: 16px">
            <div class="admin-kpi-header" style="margin-bottom: 8px">
              <span class="admin-kpi-label">Developers</span>
              <div class="admin-kpi-icon">
                <svg class="admin-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="4" y="4" width="16" height="16" rx="3" />
                  <path d="M8 12h8" />
                </svg>
              </div>
            </div>
            <div class="admin-kpi-value" style="font-size: 22px" id="stat-developers">
              —
            </div>
          </div>
          <div class="admin-kpi-card" style="padding: 16px">
            <div class="admin-kpi-header" style="margin-bottom: 8px">
              <span class="admin-kpi-label">KYC Verified</span>
              <div class="admin-kpi-icon">
                <svg class="admin-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z" />
                  <path d="M8 12.5l3 3 5-6" />
                </svg>
              </div>
            </div>
            <div class="admin-kpi-value" style="font-size: 22px" id="stat-verified">
              —
            </div>
          </div>
          <div class="admin-kpi-card" style="padding: 16px">
            <div class="admin-kpi-header" style="margin-bottom: 8px">
              <span class="admin-kpi-label">Suspended</span>
              <div class="admin-kpi-icon">
                <svg class="admin-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="4" />
                  <path d="M9 9l6 6M15 9l-6 6" />
                </svg>
              </div>
            </div>
            <div class="admin-kpi-value" style="font-size: 22px; color: var(--admin-danger)" id="stat-suspended">
              —
            </div>
          </div>
        </div>

        <!-- Filters Bar -->
        <div class="admin-card" style="margin-bottom: 16px">
          <div style="
                padding: 14px 20px;
                display: flex;
                align-items: center;
                gap: 12px;
                flex-wrap: wrap;
              ">
            <!-- Search -->
            <div class="admin-search" style="width: 240px">
              <svg class="admin-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="6" />
                <path d="M21 21l-4.35-4.35" />
              </svg>
              <input type="text" placeholder="Search by name, email, ID…" id="user-search-input"
                aria-label="Search users by name, email, or ID" />
            </div>
            <!-- Role Filter -->
            <select id="filter-role" class="admin-select" aria-label="Filter by role">
              <option value="">All Roles</option>
              <option value="investor">Investor</option>
              <option value="developer">Developer</option>
              <option value="admin">Admin</option>
            </select>
            <!-- KYC Filter -->
            <select id="filter-kyc" class="admin-select" aria-label="Filter by KYC status">
              <option value="">All KYC</option>
              <option value="approved">Approved</option>
              <option value="pending">Pending</option>
              <option value="rejected">Rejected</option>
              <option value="none">No KYC</option>
            </select>
            <!-- Status Filter -->
            <select id="filter-status" class="admin-select" aria-label="Filter by account status">
              <option value="">All Status</option>
              <option value="active">Active</option>
              <option value="suspended">Suspended</option>
              <option value="pending">Pending</option>
            </select>
            <span style="
                  margin-left: auto;
                  font-size: 12px;
                  color: var(--admin-text-muted);
                " id="user-count-label">Showing 0 users</span>
          </div>
        </div>

        <!-- Users Table -->
        <div class="admin-card">
          <div class="admin-card-body admin-card-body--flush">
            <table class="admin-table" id="users-table">
              <thead>
                <tr>
                  <th style="width: 30px">
                    <input type="checkbox" id="select-all-users" style="accent-color: var(--admin-accent)" />
                  </th>
                  <th data-sort="name">User</th>
                  <th data-sort="roles">Roles</th>
                  <th data-sort="kyc_status">KYC Status</th>
                  <th data-sort="balance_cents">Balance</th>
                  <th data-sort="status">Status</th>
                  <th data-sort="created_at">Joined</th>
                  <th style="width: 60px">Actions</th>
                </tr>
              </thead>
              <tbody id="users-table-body">
                <tr>
                  <td colspan="8" style="
                        text-align: center;
                        padding: 40px;
                        color: var(--admin-text-muted);
                      ">
                    <div class="loading-spinner" style="
                          margin: 0 auto 12px;
                          width: 24px;
                          height: 24px;
                          border: 2px solid var(--admin-border);
                          border-top-color: var(--admin-accent);
                          border-radius: 50%;
                          animation: spin 0.8s linear infinite;
                        "></div>
                    Loading users…
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Pagination -->
        <div style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-top: 16px;
            ">
          <span style="font-size: 13px; color: var(--admin-text-muted)" id="pagination-info">Page 1 of 1</span>
          <div style="display: flex; gap: 6px">
            <button class="admin-btn admin-btn--secondary admin-btn--sm" id="prev-page" disabled>
              ← Previous
            </button>
            <button class="admin-btn admin-btn--secondary admin-btn--sm" id="next-page">
              Next →
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/js/admin-users.js"></script>
</body>

</html>
