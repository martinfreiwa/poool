<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/static/images/logo-pool.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Change Requests — Admin | POOOL</title>
    <link rel="stylesheet" href="/static/css/admin.css">
    <link rel="stylesheet" href="/static/css/fonts.css">
    <script src="/static/js/admin-theme.js"></script>
</head>
<body class="admin-body dom-ready">
    <div class="admin-wrapper">
        <div id="admin-sidebar-placeholder"></div>

        <main class="admin-main">
            <header class="admin-topbar">
                <div class="admin-topbar-left">
                    <nav class="admin-breadcrumbs">
                        <a href="/admin/">Admin</a>
                        <span class="separator">›</span>
                        <span class="current">Asset Change Requests</span>
                    </nav>
                </div>
            </header>

            <div class="admin-content">
                <!-- Header -->
                <div class="admin-page-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h1 class="admin-page-title">Asset Change Requests</h1>
                        <p class="admin-page-subtitle">Review and approve developer edits to approved assets</p>
                    </div>
                </div>

                <!-- KPI Cards -->
                <div class="admin-kpi-grid" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 20px" id="kpi-row">
                    <div class="admin-kpi-card" style="padding: 16px">
                        <div class="admin-kpi-label" style="margin-bottom: 8px">Pending</div>
                        <div class="admin-kpi-value" id="kpi-pending" style="font-size: 28px; color: var(--admin-warning, #f59e0b);">0</div>
                    </div>
                    <div class="admin-kpi-card" style="padding: 16px">
                        <div class="admin-kpi-label" style="margin-bottom: 8px">Approved</div>
                        <div class="admin-kpi-value" id="kpi-approved" style="font-size: 28px; color: var(--admin-success, #10b981);">0</div>
                    </div>
                    <div class="admin-kpi-card" style="padding: 16px">
                        <div class="admin-kpi-label" style="margin-bottom: 8px">Rejected</div>
                        <div class="admin-kpi-value" id="kpi-rejected" style="font-size: 28px; color: var(--admin-danger, #ef4444);">0</div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="admin-card" style="margin-bottom: 16px;">
                    <div style="padding: 14px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                        <div class="admin-search" style="width: 320px">
                            <svg class="admin-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            <input type="text" id="search-input" placeholder="Search by asset or developer...">
                        </div>
                        <select id="filter-status" class="admin-select" style="min-width:150px;">
                            <option value="all" selected>All Statuses</option>
                            <option value="pending">Pending</option>
                            <option value="approved">Approved</option>
                            <option value="rejected">Rejected</option>
                        </select>
                    </div>
                </div>

                <!-- Table -->
                <div class="admin-card">
                    <div class="admin-card-body admin-card-body--flush">
                        <table class="admin-table" id="change-requests-table">
                            <thead>
                                <tr>
                                    <th>Asset</th>
                                    <th>Developer</th>
                                    <th>Fields Changed</th>
                                    <th>Status</th>
                                    <th>Submitted</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                                <tr><td colspan="6" style="text-align:center; padding:40px; color: var(--admin-text-muted, #888);">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/admin-sidebar-loader.js"></script>
    <script src="/static/js/admin-change-requests.js"></script>
</body>
</html>
