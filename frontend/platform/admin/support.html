<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support | Admin | POOOL</title>
  <meta name="description" content="POOOL Admin — Manage support tickets, priorities, and resolution." />
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="/static/css/admin.css?v=1.0.1" />
  <script src="/static/js/user-data.js"></script>
  <link rel="stylesheet" href="/static/css/poool-dropdown.css" />
  <script src="/static/js/poool-dropdown.js"></script>
  <script src="/static/js/poool-dropdown-init.js"></script>
  <script src="/static/js/admin-theme.js"></script>
  <script src="/static/js/admin-permission-guard.js"></script>
  <script src="/static/js/admin-global-search.js"></script>
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/bundle.css" />
</head>

<body class="admin-body dom-ready">
  <div class="admin-wrapper">
    <!-- SIDEBAR -->
    <!-- Sidebar Placeholder -->
    <div id="admin-sidebar-placeholder"></div>
    <script src="/static/js/admin-sidebar-loader.js"></script>

    <main class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar-left">
          <nav class="admin-breadcrumbs">
            <a href="/admin/">Admin</a><span class="separator">›</span><span class="current">Support Tickets</span>
          </nav>
        </div>
        <div class="admin-topbar-right">
          <div class="admin-search">
            <svg class="admin-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.66667"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="6" />
              <path d="M21 21l-4.35-4.35" />
            </svg>
            <input type="text" placeholder="Search tickets…" id="admin-global-search" aria-label="Search" />
          </div>
        </div>
      </header>
      <div class="admin-content">
        <div class="admin-page-header">
          <h1 class="admin-page-title">Support Tickets</h1>
          <p class="admin-page-subtitle">
            Manage customer support requests, assign priority, and track
            resolution
          </p>
        </div>

        <!-- KPIs -->
        <div class="admin-kpi-grid" style="grid-template-columns: repeat(4, 1fr); margin-bottom: 20px">
          <div class="admin-kpi-card" style="padding: 16px">
            <div class="admin-kpi-header" style="margin-bottom: 8px">
              <span class="admin-kpi-label">Open</span>
              <div class="admin-kpi-icon" style="width: 28px; height: 28px">
                <svg class="admin-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10" />
                  <path d="M12 7v5l3 3" />
                </svg>
              </div>
            </div>
            <div class="admin-kpi-value" style="font-size: 28px" id="stat-open">
              —
            </div>
          </div>
          <div class="admin-kpi-card" style="padding: 16px">
            <div class="admin-kpi-header" style="margin-bottom: 8px">
              <span class="admin-kpi-label">In Progress</span>
              <div class="admin-kpi-icon" style="width: 28px; height: 28px">
                <svg class="admin-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="4" y="4" width="16" height="16" rx="3" />
                  <path d="M8 12h8" />
                </svg>
              </div>
            </div>
            <div class="admin-kpi-value" style="font-size: 28px" id="stat-progress">
              —
            </div>
          </div>
          <div class="admin-kpi-card" style="padding: 16px">
            <div class="admin-kpi-header" style="margin-bottom: 8px">
              <span class="admin-kpi-label">Resolved</span>
              <div class="admin-kpi-icon" style="width: 28px; height: 28px">
                <svg class="admin-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z" />
                  <path d="M8 12.5l3 3 5-6" />
                </svg>
              </div>
            </div>
            <div class="admin-kpi-value" style="font-size: 28px" id="stat-resolved">
              —
            </div>
          </div>
          <div class="admin-kpi-card" style="padding: 16px">
            <div class="admin-kpi-header" style="margin-bottom: 8px">
              <span class="admin-kpi-label">Urgent</span>
              <div class="admin-kpi-icon" style="width: 28px; height: 28px">
                <svg class="admin-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="4" />
                  <path d="M9 9l6 6M15 9l-6 6" />
                </svg>
              </div>
            </div>
            <div class="admin-kpi-value" style="font-size: 28px" id="stat-urgent">
              —
            </div>
          </div>
        </div>

        <!-- Filters -->
        <div class="admin-card" style="margin-bottom: 16px">
          <div style="
                padding: 14px 20px;
                display: flex;
                align-items: center;
                gap: 12px;
                flex-wrap: wrap;
              ">
            <div class="admin-search" style="width: 220px">
              <svg class="admin-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="6" />
                <path d="M21 21l-4.35-4.35" />
              </svg><input type="text" placeholder="Search tickets…" id="ticket-search" />
            </div>
            <select id="filter-status" class="admin-select">
              <option value="">All Status</option>
              <option value="open">Open</option>
              <option value="in_progress">In Progress</option>
              <option value="resolved">Resolved</option>
              <option value="closed">Closed</option>
            </select>
            <select id="filter-priority" class="admin-select">
              <option value="">All Priority</option>
              <option value="urgent">Urgent</option>
              <option value="high">High</option>
              <option value="normal">Normal</option>
              <option value="low">Low</option>
            </select>
            <select id="filter-date" class="admin-select">
              <option value="">All Time</option>
              <option value="7d">Last 7 Days</option>
              <option value="30d">Last 30 Days</option>
            </select>
            <span style="
                  margin-left: auto;
                  font-size: 12px;
                  color: var(--admin-text-muted);
                " id="ticket-count-label">0 tickets</span>
          </div>
        </div>

        <!-- Bulk Actions -->
        <div id="bulk-actions-container" class="admin-card" style="
              display: none;
              margin-bottom: 16px;
              background-color: var(--admin-hover-overlay);
              border: 1px solid var(--admin-accent);
            ">
          <div style="
                padding: 10px 20px;
                display: flex;
                align-items: center;
                gap: 12px;
              ">
            <span style="
                  font-size: 13px;
                  font-weight: 600;
                  color: var(--admin-accent);
                " id="bulk-count-label">0 selected</span>

            <div style="
                  width: 1px;
                  height: 20px;
                  background-color: var(--admin-border);
                  margin: 0 8px;
                "></div>

            <select id="bulk-status" class="admin-select admin-select--sm" style="height: 32px">
              <option value="">Set Status...</option>
              <option value="open">Open</option>
              <option value="in_progress">In Progress</option>
              <option value="resolved">Resolved</option>
              <option value="closed">Closed</option>
            </select>
            <select id="bulk-priority" class="admin-select admin-select--sm" style="height: 32px">
              <option value="">Set Priority...</option>
              <option value="urgent">Urgent</option>
              <option value="high">High</option>
              <option value="normal">Normal</option>
              <option value="low">Low</option>
            </select>

            <button class="admin-btn admin-btn--primary admin-btn--sm" id="btn-apply-bulk">
              Apply to Selected
            </button>
          </div>
        </div>

        <!-- Tickets Table -->
        <div class="admin-card">
          <div class="admin-card-body admin-card-body--flush">
            <table class="admin-table">
              <thead>
                <tr>
                  <th style="width: 40px">
                    <input type="checkbox" id="select-all-tickets" style="accent-color: var(--admin-accent)" />
                  </th>
                  <th data-sort="subject">Subject</th>
                  <th data-sort="user_name">User</th>
                  <th data-sort="priority">Priority</th>
                  <th data-sort="status">Status</th>
                  <th data-sort="created_at">Created</th>
                  <th data-sort="updated_at">Updated</th>
                  <th style="width: 140px">Actions</th>
                </tr>
              </thead>
              <tbody id="tickets-table-body">
                <tr>
                  <td colspan="8" style="padding: 20px">
                    <div style="display: flex; flex-direction: column; gap: 12px">
                      <div class="admin-skeleton admin-skeleton--text"></div>
                      <div class="admin-skeleton admin-skeleton--text" style="width: 80%"></div>
                      <div class="admin-skeleton admin-skeleton--text" style="width: 90%"></div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Pagination -->
        <div style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-top: 16px;
            ">
          <span style="font-size: 13px; color: var(--admin-text-muted)" id="support-pagination-info">Page 1 of 1</span>
          <div style="display: flex; gap: 6px">
            <button class="admin-btn admin-btn--secondary admin-btn--sm" id="support-prev-page" disabled>
              ← Previous
            </button>
            <button class="admin-btn admin-btn--secondary admin-btn--sm" id="support-next-page">
              Next →
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Ticket Detail Modal -->
  <div id="ticket-modal" style="
        display: none;
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
        align-items: center;
        justify-content: center;
      ">
    <div style="
          background: var(--admin-bg-card);
          border: 1px solid var(--admin-border);
          border-radius: var(--admin-radius-xl);
          padding: 28px;
          max-width: 600px;
          width: 90%;
          max-height: 80vh;
          overflow-y: auto;
          animation: admin-fadeIn 0.2s ease-out;
        ">
      <div style="
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
          ">
        <h3 style="
              font-size: 18px;
              font-weight: 700;
              color: var(--admin-text-primary);
              margin: 0;
            " id="ticket-modal-subject">
          Ticket
        </h3>
        <button class="admin-btn admin-btn--secondary admin-btn--sm" id="ticket-modal-close">
          ✕
        </button>
      </div>
      <div id="ticket-modal-meta" style="margin-bottom: 16px"></div>
      <div class="admin-card" style="
            padding: 16px;
            margin-bottom: 16px;
            background: var(--admin-bg);
          ">
        <div style="
              font-size: 12px;
              font-weight: 600;
              color: var(--admin-text-muted);
              margin-bottom: 6px;
            ">
          Message
        </div>
        <div id="ticket-modal-message" style="
              font-size: 13px;
              color: var(--admin-text-secondary);
              white-space: pre-wrap;
            "></div>
      </div>
      <div style="display: flex; gap: 8px; align-items: center">
        <select id="ticket-status-update" class="admin-select" style="width: auto">
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="resolved">Resolved</option>
          <option value="closed">Closed</option>
        </select>
        <select id="ticket-priority-update" class="admin-select" style="width: auto">
          <option value="low">Low</option>
          <option value="normal">Normal</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
        </select>
        <button class="admin-btn admin-btn--primary admin-btn--sm" id="ticket-update-btn">
          Update Ticket
        </button>
      </div>
    </div>
  </div>

  <script src="/static/js/admin-support.js"></script>
</body>

</html>
