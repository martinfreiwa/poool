<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/static/images/logo-pool.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <style>@view-transition { navigation: auto; }</style>
  <title>Support | Admin | POOOL</title>
  <meta name="description" content="POOOL Admin — Manage support tickets, priorities, and resolution." />
  <link rel="stylesheet" href="/static/css/admin.css?v=1.0.2" />
  <link rel="stylesheet" href="/static/css/poool-dropdown.css" />
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/bundle.css" />
  <!-- Theme must load sync to prevent FOUC -->
  <script src="/static/js/admin-theme.js"></script>
  <script defer src="/static/js/view-transitions.js"></script>
  <script defer src="/static/js/user-data.js"></script>
  <script defer src="/static/js/poool-dropdown.js"></script>
  <script defer src="/static/js/poool-dropdown-init.js"></script>
  <script defer src="/static/js/admin-permission-guard.js"></script>
  <script defer src="/static/js/admin-global-search.js"></script>
</head>

<body class="admin-body dom-ready">
  <div class="admin-wrapper">
    <!-- SIDEBAR -->
    <!-- Sidebar Placeholder -->
    <div id="admin-sidebar-placeholder"></div>
    <script src="/static/js/admin-sidebar-loader.js"></script>

    <main class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar-left">
          <nav class="admin-breadcrumbs" aria-label="Breadcrumb">
            <a href="/admin/">Admin</a><span class="separator" aria-hidden="true">›</span><span class="current">Support Tickets</span>
          </nav>
        </div>
        <div class="admin-topbar-right">
          <div class="admin-search">
            <svg class="admin-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.66667"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="6" />
              <path d="M21 21l-4.35-4.35" />
            </svg>
            <input type="text" placeholder="Search tickets…" id="admin-global-search" aria-label="Global search" />
          </div>
        </div>
      </header>
      <div class="admin-content">
        <div class="admin-page-header" style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <h1 class="admin-page-title">Support Tickets</h1>
            <p class="admin-page-subtitle">
              Manage customer support requests, assign priority, and track
              resolution
            </p>
          </div>
          <button class="admin-btn admin-btn--secondary admin-btn--sm" id="btn-export-csv" aria-label="Export tickets to CSV">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export CSV
          </button>
        </div>

        <!-- KPIs -->
        <div class="admin-kpi-grid support-kpi-grid" role="region" aria-label="Ticket statistics">
          <div class="admin-kpi-card support-kpi-card">
            <div class="admin-kpi-header support-kpi-header">
              <span class="admin-kpi-label">Open</span>
              <div class="admin-kpi-icon support-kpi-icon">
                <svg class="admin-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="12" cy="12" r="10" />
                  <path d="M12 7v5l3 3" />
                </svg>
              </div>
            </div>
            <div class="admin-kpi-value support-kpi-value" id="stat-open">
              —
            </div>
          </div>
          <div class="admin-kpi-card support-kpi-card">
            <div class="admin-kpi-header support-kpi-header">
              <span class="admin-kpi-label">In Progress</span>
              <div class="admin-kpi-icon support-kpi-icon">
                <svg class="admin-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="4" y="4" width="16" height="16" rx="3" />
                  <path d="M8 12h8" />
                </svg>
              </div>
            </div>
            <div class="admin-kpi-value support-kpi-value" id="stat-progress">
              —
            </div>
          </div>
          <div class="admin-kpi-card support-kpi-card">
            <div class="admin-kpi-header support-kpi-header">
              <span class="admin-kpi-label">Resolved</span>
              <div class="admin-kpi-icon support-kpi-icon">
                <svg class="admin-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z" />
                  <path d="M8 12.5l3 3 5-6" />
                </svg>
              </div>
            </div>
            <div class="admin-kpi-value support-kpi-value" id="stat-resolved">
              —
            </div>
          </div>
          <div class="admin-kpi-card support-kpi-card">
            <div class="admin-kpi-header support-kpi-header">
              <span class="admin-kpi-label">Urgent</span>
              <div class="admin-kpi-icon support-kpi-icon">
                <svg class="admin-nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="3" y="3" width="18" height="18" rx="4" />
                  <path d="M9 9l6 6M15 9l-6 6" />
                </svg>
              </div>
            </div>
            <div class="admin-kpi-value support-kpi-value" id="stat-urgent">
              —
            </div>
          </div>
        </div>

        <!-- Filters -->
        <div class="admin-card support-filter-card">
          <div class="support-filter-bar">
            <div class="admin-search support-filter-search">
              <svg class="admin-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="6" />
                <path d="M21 21l-4.35-4.35" />
              </svg><input type="text" placeholder="Search tickets…" id="ticket-search" aria-label="Search tickets" />
            </div>
            <select id="filter-status" class="admin-select" aria-label="Filter by status">
              <option value="">All Status</option>
              <option value="open">Open</option>
              <option value="in_progress">In Progress</option>
              <option value="resolved">Resolved</option>
              <option value="closed">Closed</option>
            </select>
            <select id="filter-priority" class="admin-select" aria-label="Filter by priority">
              <option value="">All Priority</option>
              <option value="urgent">Urgent</option>
              <option value="high">High</option>
              <option value="normal">Normal</option>
              <option value="low">Low</option>
            </select>
            <select id="filter-date" class="admin-select" aria-label="Filter by date range">
              <option value="">All Time</option>
              <option value="7d">Last 7 Days</option>
              <option value="30d">Last 30 Days</option>
            </select>
            <span class="support-ticket-count" id="ticket-count-label">0 tickets</span>
          </div>
        </div>

        <!-- Bulk Actions -->
        <div id="bulk-actions-container" class="admin-card support-bulk-container" role="region" aria-live="polite"
          aria-label="Bulk actions for selected tickets">
          <div class="support-bulk-bar">
            <span class="support-bulk-count" id="bulk-count-label">0 selected</span>

            <div class="support-bulk-divider" aria-hidden="true"></div>

            <select id="bulk-status" class="admin-select admin-select--sm support-bulk-select" aria-label="Set bulk status">
              <option value="">Set Status...</option>
              <option value="open">Open</option>
              <option value="in_progress">In Progress</option>
              <option value="resolved">Resolved</option>
              <option value="closed">Closed</option>
            </select>
            <select id="bulk-priority" class="admin-select admin-select--sm support-bulk-select" aria-label="Set bulk priority">
              <option value="">Set Priority...</option>
              <option value="urgent">Urgent</option>
              <option value="high">High</option>
              <option value="normal">Normal</option>
              <option value="low">Low</option>
            </select>

            <button class="admin-btn admin-btn--primary admin-btn--sm" id="btn-apply-bulk">
              Apply to Selected
            </button>
          </div>
        </div>

        <!-- Tickets Table -->
        <div class="admin-card">
          <div class="admin-card-body admin-card-body--flush">
            <table class="admin-table" aria-label="Support tickets">
              <thead>
                <tr>
                  <th scope="col" class="support-th-checkbox">
                    <input type="checkbox" id="select-all-tickets" aria-label="Select all tickets" />
                  </th>
                  <th scope="col" data-sort="subject" aria-sort="none" tabindex="0">Subject</th>
                  <th scope="col" data-sort="user_name" aria-sort="none" tabindex="0">User</th>
                  <th scope="col" data-sort="priority" aria-sort="none" tabindex="0">Priority</th>
                  <th scope="col" data-sort="status" aria-sort="none" tabindex="0">Status</th>
                  <th scope="col" data-sort="created_at" aria-sort="descending" tabindex="0">Created</th>
                  <th scope="col" data-sort="updated_at" aria-sort="none" tabindex="0">Updated</th>
                  <th scope="col" class="support-th-actions">Actions</th>
                </tr>
              </thead>
              <tbody id="tickets-table-body">
                <tr>
                  <td colspan="8" class="support-loading-cell">
                    <div class="support-skeleton-group">
                      <div class="admin-skeleton admin-skeleton--text"></div>
                      <div class="admin-skeleton admin-skeleton--text" style="width: 80%"></div>
                      <div class="admin-skeleton admin-skeleton--text" style="width: 90%"></div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Pagination -->
        <nav class="support-pagination" aria-label="Ticket pagination">
          <span class="support-pagination-info" id="support-pagination-info">Page 1 of 1</span>
          <div class="support-pagination-buttons">
            <button class="admin-btn admin-btn--secondary admin-btn--sm" id="support-prev-page" disabled aria-label="Previous page">
              <span aria-hidden="true">←</span> Previous
            </button>
            <button class="admin-btn admin-btn--secondary admin-btn--sm" id="support-next-page" aria-label="Next page">
              Next <span aria-hidden="true">→</span>
            </button>
          </div>
        </nav>
      </div>
    </main>
  </div>

  <!-- Ticket Detail Modal -->
  <div id="ticket-modal" class="support-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="ticket-modal-subject">
    <div class="support-modal-content">
      <div class="support-modal-header">
        <h3 class="support-modal-title" id="ticket-modal-subject">
          Ticket
        </h3>
        <button class="admin-btn admin-btn--secondary admin-btn--sm" id="ticket-modal-close" aria-label="Close dialog">
          ✕
        </button>
      </div>
      <div id="ticket-modal-meta" class="support-modal-meta"></div>
      <div class="admin-card support-modal-message-card">
        <div class="support-modal-message-label">
          Message
        </div>
        <div id="ticket-modal-message" class="support-modal-message-body"></div>
      </div>
      <div class="support-modal-actions">
        <select id="ticket-status-update" class="admin-select support-modal-select" aria-label="Update ticket status">
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="resolved">Resolved</option>
          <option value="closed">Closed</option>
        </select>
        <select id="ticket-priority-update" class="admin-select support-modal-select" aria-label="Update ticket priority">
          <option value="low">Low</option>
          <option value="normal">Normal</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
        </select>
        <button class="admin-btn admin-btn--primary admin-btn--sm" id="ticket-update-btn">
          Update Ticket
        </button>
      </div>
    </div>
  </div>

  <!-- Toast notification container -->
  <div id="admin-toast-container" class="admin-toast-container" aria-live="polite"></div>

  <script defer src="/static/js/admin-support.js?v=1.0.1"></script>
</body>

</html>
