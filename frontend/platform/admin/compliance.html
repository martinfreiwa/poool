<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/static/images/icons/logo-pool.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compliance Queue | Admin | POOOL</title>
  <meta name="description"
    content="POOOL Admin — Triage compliance alerts (sanctions hits, transaction-monitoring findings, manual reviews) and trigger sanctions re-screening / monitoring sweeps." />
  <link rel="stylesheet" href="/static/css/admin.css?v=1.0.1" />
  <script src="/static/js/user-data.js"></script>
  <script src="/static/js/admin-theme.js"></script>
  <script src="/static/js/admin-permission-guard.js"></script>
  <script src="/static/js/admin-global-search.js"></script>
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/bundle.css" />
  <style>
    .compliance-toolbar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom: 16px; }
    .compliance-toolbar select { padding:6px 10px; border:1px solid var(--admin-border); border-radius:6px; font-size:13px; background:#fff; }
    .compliance-badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:0.02em; }
    .compliance-badge--critical { color:#7f1d1d; background:#fee2e2; }
    .compliance-badge--high     { color:#9a3412; background:#ffedd5; }
    .compliance-badge--medium   { color:#854d0e; background:#fef3c7; }
    .compliance-badge--low      { color:#1e3a8a; background:#dbeafe; }
    .compliance-row__user-email { font-size: 11px; color: var(--admin-text-muted); margin-top: 2px; }
    .compliance-details { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size:11px; color:var(--admin-text-muted); white-space:pre-wrap; max-width:380px; }
  </style>
</head>

<body class="admin-body dom-ready">
  <div class="admin-wrapper">
    {% include 'admin/components/sidebar.html' %}

    <main class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar-left">
          <nav class="admin-breadcrumbs">
            <a href="/admin/">Admin</a>
            <span class="separator">›</span>
            <span class="current">Compliance Queue</span>
          </nav>
        </div>
      </header>

      <div class="admin-content">
        <div class="admin-page-header" style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <h1 class="admin-page-title">Compliance Queue</h1>
            <p class="admin-page-subtitle">
              Sanctions hits, transaction-monitoring findings, and manual reviews.
              Triage by closing with a reason — the audit trail records who and why.
            </p>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="admin-btn admin-btn--secondary admin-btn--sm" id="btn-run-monitoring">Run monitoring sweep</button>
          </div>
        </div>

        <div class="admin-card">
          <div class="admin-card-body">
            <div class="compliance-toolbar">
              <label>
                Status
                <select id="filter-status">
                  <option value="open" selected>Open</option>
                  <option value="closed">Closed</option>
                  <option value="all">All</option>
                </select>
              </label>
              <label>
                Severity
                <select id="filter-severity">
                  <option value="">Any</option>
                  <option value="critical">Critical</option>
                  <option value="high">High</option>
                  <option value="medium">Medium</option>
                  <option value="low">Low</option>
                </select>
              </label>
              <button class="admin-btn admin-btn--secondary admin-btn--sm" id="btn-refresh">Refresh</button>
              <span style="margin-left:auto;font-size:12px;color:var(--admin-text-muted);" id="result-count">0 alerts</span>
            </div>
          </div>

          <div class="admin-card-body admin-card-body--flush">
            <table class="admin-table" id="compliance-table">
              <thead>
                <tr>
                  <th>Created</th>
                  <th>User</th>
                  <th>Kind</th>
                  <th>Severity</th>
                  <th>Summary</th>
                  <th>Details</th>
                  <th style="width:160px">Actions</th>
                </tr>
              </thead>
              <tbody id="compliance-body">
                <tr>
                  <td colspan="7" style="text-align:center;padding:36px;color:var(--admin-text-muted)">
                    Loading…
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    (function () {
      "use strict";
      const tbody = document.getElementById("compliance-body");
      const countEl = document.getElementById("result-count");
      const statusEl = document.getElementById("filter-status");
      const sevEl = document.getElementById("filter-severity");

      function esc(s) {
        if (s == null) return "";
        const div = document.createElement("div");
        div.appendChild(document.createTextNode(String(s)));
        return div.innerHTML;
      }
      function fmtDate(iso) {
        if (!iso) return "—";
        try { return new Date(iso).toLocaleString(); } catch { return iso; }
      }

      async function load() {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:36px;color:var(--admin-text-muted)">Loading…</td></tr>`;
        const params = new URLSearchParams({ status: statusEl.value });
        if (sevEl.value) params.set("severity", sevEl.value);
        try {
          const r = await fetch("/api/admin/compliance/alerts?" + params, { credentials: "same-origin" });
          if (!r.ok) {
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:36px;color:var(--admin-danger)">Failed to load (${r.status}).</td></tr>`;
            return;
          }
          const data = await r.json();
          render(data.alerts || []);
        } catch (e) {
          tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:36px;color:var(--admin-danger)">Network error.</td></tr>`;
        }
      }

      function render(alerts) {
        countEl.textContent = `${alerts.length} alert${alerts.length === 1 ? "" : "s"}`;
        if (alerts.length === 0) {
          tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:36px;color:var(--admin-text-muted)">No matching alerts.</td></tr>`;
          return;
        }
        tbody.innerHTML = alerts.map(a => `
          <tr data-id="${esc(a.id)}">
            <td style="font-size:12px;color:var(--admin-text-muted);white-space:nowrap;">${esc(fmtDate(a.created_at))}</td>
            <td>
              <div>${esc(a.user_email)}</div>
              <div class="compliance-row__user-email">${esc(a.user_id)}</div>
            </td>
            <td><span class="admin-badge admin-badge--info">${esc(a.kind)}</span></td>
            <td><span class="compliance-badge compliance-badge--${esc(a.severity)}">${esc(a.severity).toUpperCase()}</span></td>
            <td style="font-size:13px;max-width:340px;">${esc(a.summary)}</td>
            <td>
              <details class="compliance-details">
                <summary style="cursor:pointer;color:var(--admin-text-muted);font-size:11px;">Show</summary>
                <pre style="margin:6px 0 0;">${esc(JSON.stringify(a.details || {}, null, 2))}</pre>
              </details>
            </td>
            <td>
              ${a.closed_at
                ? `<span style="font-size:11px;color:var(--admin-text-muted);">Closed ${esc(fmtDate(a.closed_at))}</span>`
                : `<div style="display:flex;gap:6px;">
                     <button class="admin-btn admin-btn--secondary admin-btn--sm" data-rescreen="${esc(a.user_id)}" title="Re-run sanctions screening">Rescreen</button>
                     <button class="admin-btn admin-btn--primary admin-btn--sm" data-close="${esc(a.id)}">Close</button>
                   </div>`}
            </td>
          </tr>
        `).join("");
      }

      tbody.addEventListener("click", async (e) => {
        const closeBtn = e.target.closest("[data-close]");
        if (closeBtn) {
          const reason = window.prompt("Close reason (required):");
          if (!reason || !reason.trim()) return;
          closeBtn.disabled = true;
          try {
            const r = await fetch(`/api/admin/compliance/alerts/${closeBtn.dataset.close}/close`, {
              method: "POST",
              credentials: "same-origin",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ close_reason: reason.trim() }),
            });
            if (!r.ok) {
              const err = await r.json().catch(() => ({}));
              alert(err.error || "Failed to close.");
              closeBtn.disabled = false;
              return;
            }
            await load();
          } catch {
            alert("Network error.");
            closeBtn.disabled = false;
          }
          return;
        }
        const rescreenBtn = e.target.closest("[data-rescreen]");
        if (rescreenBtn) {
          rescreenBtn.disabled = true;
          const orig = rescreenBtn.textContent;
          rescreenBtn.textContent = "Running…";
          try {
            const r = await fetch(`/api/admin/compliance/users/${rescreenBtn.dataset.rescreen}/rescreen`, {
              method: "POST",
              credentials: "same-origin",
            });
            const data = await r.json();
            alert(`Rescreen result: ${data.status}${data.summary ? " — " + data.summary : ""}`);
          } catch {
            alert("Network error.");
          }
          rescreenBtn.disabled = false;
          rescreenBtn.textContent = orig;
          await load();
        }
      });

      document.getElementById("btn-refresh")?.addEventListener("click", load);
      document.getElementById("btn-run-monitoring")?.addEventListener("click", async (e) => {
        const btn = e.currentTarget;
        btn.disabled = true; const orig = btn.textContent; btn.textContent = "Running…";
        try {
          const r = await fetch("/api/admin/compliance/monitoring/run", {
            method: "POST", credentials: "same-origin",
          });
          const data = await r.json();
          alert(`Monitoring sweep: ${data.new_findings} new finding(s).`);
          await load();
        } catch {
          alert("Network error.");
        }
        btn.disabled = false; btn.textContent = orig;
      });

      statusEl.addEventListener("change", load);
      sevEl.addEventListener("change", load);

      load();
    })();
  </script>
</body>

</html>
