<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/static/images/icons/logo-pool.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications | Admin | POOOL</title>
  <meta name="description" content="POOOL Admin — Platform notifications management and broadcast." />
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <link rel="stylesheet" href="/static/css/admin.css?v=1.0.1" />
  <script src="/static/js/user-data.js"></script>
  <link rel="stylesheet" href="/static/css/poool-dropdown.css" />
  <script src="/static/js/poool-dropdown.js"></script>
  <script src="/static/js/poool-dropdown-init.js"></script>
  <script src="/static/js/admin-theme.js"></script>
  <script src="/static/js/admin-permission-guard.js"></script>
  <script src="/static/js/admin-global-search.js"></script>
  <link rel="stylesheet" href="/static/css/fonts.css" />
  <link rel="stylesheet" href="/static/css/bundle.css" />
</head>

<body class="admin-body dom-ready">
  <div class="admin-wrapper">
    {% include 'admin/components/sidebar.html' %}

    <main class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar-left">
          <nav class="admin-breadcrumbs">
            <a href="/admin/">Admin</a><span class="separator">›</span><span class="current">Notifications</span>
          </nav>
        </div>
      </header>
      <div class="admin-content">
        <div class="admin-page-header">
          <h1 class="admin-page-title">Notifications Center</h1>
          <p class="admin-page-subtitle">
            View platform notifications and send broadcast messages to users
          </p>
        </div>

        <!-- KPIs -->
        <div class="admin-kpi-grid" style="grid-template-columns: repeat(4, 1fr); margin-bottom: 20px">
          <div class="admin-kpi-card" style="padding: 16px">
            <div class="admin-kpi-label" style="margin-bottom: 6px">
              Total Sent
            </div>
            <div class="admin-kpi-value" style="font-size: 28px" id="stat-total">
              —
            </div>
          </div>
          <div class="admin-kpi-card" style="padding: 16px">
            <div class="admin-kpi-label" style="margin-bottom: 6px">
              Unread
            </div>
            <div class="admin-kpi-value" style="font-size: 28px; color: var(--admin-text-primary)" id="stat-unread">
              —
            </div>
          </div>
          <div class="admin-kpi-card" style="padding: 16px">
            <div class="admin-kpi-label" style="margin-bottom: 6px">
              Read Rate
            </div>
            <div class="admin-kpi-value" style="font-size: 28px; color: var(--admin-text-primary)" id="stat-read-rate">
              —
            </div>
          </div>
          <div class="admin-kpi-card" style="padding: 16px">
            <div class="admin-kpi-label" style="margin-bottom: 6px">
              Today
            </div>
            <div class="admin-kpi-value" style="font-size: 28px; color: var(--admin-text-primary)" id="stat-today">
              —
            </div>
          </div>
        </div>

        <!-- Broadcast -->
        <div class="admin-card" style="margin-bottom: 20px; padding: 20px">
          <h3 style="
                font-size: 14px;
                font-weight: 600;
                color: var(--admin-text-primary);
                margin: 0 0 14px;
              ">
            Send Broadcast Notification
          </h3>
          <div style="
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                align-items: end;
              ">
            <div style="flex: 0 0 auto">
              <label style="
                    font-size: 11px;
                    font-weight: 600;
                    color: var(--admin-text-muted);
                    display: block;
                    margin-bottom: 4px;
                  ">Type</label>
              <select id="broadcast-type" class="admin-select">
                <option value="system">System</option>
                <option value="promo">Promo</option>
                <option value="investment">Investment</option>
                <option value="payout">Payout</option>
              </select>
            </div>
            <div style="flex: 1; min-width: 200px">
              <label style="
                    font-size: 11px;
                    font-weight: 600;
                    color: var(--admin-text-muted);
                    display: block;
                    margin-bottom: 4px;
                  ">Title</label>
              <input type="text" id="broadcast-title" placeholder="Notification title…" class="admin-input"
                style="width: 100%" />
            </div>
            <div style="flex: 2; min-width: 250px">
              <label style="
                    font-size: 11px;
                    font-weight: 600;
                    color: var(--admin-text-muted);
                    display: block;
                    margin-bottom: 4px;
                  ">Message</label>
              <input type="text" id="broadcast-message" placeholder="Notification message…" class="admin-input"
                style="width: 100%" />
            </div>
            <button class="admin-btn admin-btn--primary" id="broadcast-send-btn">
              <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 2L9 11M18 2l-5 15-3-7-7-3 15-5z" />
              </svg>
              Send to All
            </button>
          </div>
        </div>

        <!-- Filters & Table -->
        <div class="admin-card" style="margin-bottom: 16px">
          <div style="
                padding: 14px 20px;
                display: flex;
                align-items: center;
                gap: 12px;
                flex-wrap: wrap;
              ">
            <div class="admin-search" style="width: 200px">
              <svg class="admin-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="6" />
                <path d="M21 21l-4.35-4.35" />
              </svg><input type="text" placeholder="Search…" id="notif-search" />
            </div>
            <select id="filter-type" class="admin-select">
              <option value="">All Types</option>
              <option value="system">System</option>
              <option value="kyc">KYC</option>
              <option value="investment">Investment</option>
              <option value="payout">Payout</option>
              <option value="promo">Promo</option>
            </select>
            <select id="filter-read" class="admin-select">
              <option value="">All</option>
              <option value="false">Unread</option>
              <option value="true">Read</option>
            </select>
            <span style="
                  margin-left: auto;
                  font-size: 12px;
                  color: var(--admin-text-muted);
                " id="notif-count-label">0 notifications</span>
          </div>
        </div>
        <div class="admin-card">
          <div class="admin-card-body admin-card-body--flush">
            <table class="admin-table">
              <thead>
                <tr>
                  <th data-sort="user_name">User</th>
                  <th data-sort="type">Type</th>
                  <th>Title</th>
                  <th data-sort="is_read">Read</th>
                  <th data-sort="created_at">Date</th>
                </tr>
              </thead>
              <tbody id="notif-table-body">
                <tr>
                  <td colspan="5" style="
                        text-align: center;
                        padding: 40px;
                        color: var(--admin-text-muted);
                      ">
                    Loading…
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <!-- Pagination for Notifications -->
        <div style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-top: 16px;
            ">
          <span style="font-size: 13px; color: var(--admin-text-muted)" id="pagination-info">Page 1 of 1</span>
          <div style="display: flex; gap: 6px">
            <button class="admin-btn admin-btn--secondary admin-btn--sm" id="prev-page" disabled>
              ← Previous
            </button>
            <button class="admin-btn admin-btn--secondary admin-btn--sm" id="next-page">
              Next →
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="/static/js/admin-notifications.js"></script>
</body>

</html>
