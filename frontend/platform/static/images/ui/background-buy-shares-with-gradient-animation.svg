<svg viewBox="0 0 1800 1800"
  xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- White blurred radial gradient -->
    <radialGradient id="blurWhiteGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1" />
      <stop offset="50%" stop-color="white" stop-opacity="0.75" />
      <stop offset="75%" stop-color="white" stop-opacity="0.25" />
      <stop offset="100%" stop-color="white" stop-opacity="0.1" />
    </radialGradient>

    <radialGradient id="lightGreenGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#98FB96" stop-opacity="0.2" />
      <stop offset="33%" stop-color="#98FB96" stop-opacity="0.14" />
      <stop offset="70%" stop-color="white" stop-opacity="0.11" />
      <stop offset="85%" stop-color="white" stop-opacity="0.05" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="lightBlueGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2B32F9" stop-opacity="0.2" />
      <stop offset="33%" stop-color="#2B32F9" stop-opacity="0.14" />
      <stop offset="70%" stop-color="white" stop-opacity="0.11" />
      <stop offset="85%" stop-color="white" stop-opacity="0.05" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Horizontal lines -->
  <line x1="0" y1="100" x2="1800" y2="100" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="200" x2="1800" y2="200" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="300" x2="1800" y2="300" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="400" x2="1800" y2="400" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="500" x2="1800" y2="500" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="600" x2="1800" y2="600" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="700" x2="1800" y2="700" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="800" x2="1800" y2="800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="900" x2="1800" y2="900" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="1000" x2="1800" y2="1000" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="1100" x2="1800" y2="1100" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="1200" x2="1800" y2="1200" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="1300" x2="1800" y2="1300" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="1400" x2="1800" y2="1400" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="1500" x2="1800" y2="1500" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="1600" x2="1800" y2="1600" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="0" y1="1700" x2="1800" y2="1700" stroke="#98FB96" stroke-opacity="0.4" />

  <!-- Vertical lines -->
  <line x1="100" y1="0" x2="100" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="200" y1="0" x2="200" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="300" y1="0" x2="300" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="400" y1="0" x2="400" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="500" y1="0" x2="500" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="600" y1="0" x2="600" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="700" y1="0" x2="700" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="800" y1="0" x2="800" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="900" y1="0" x2="900" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="1000" y1="0" x2="1000" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="1100" y1="0" x2="1100" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="1200" y1="0" x2="1200" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="1300" y1="0" x2="1300" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="1400" y1="0" x2="1400" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="1500" y1="0" x2="1500" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="1600" y1="0" x2="1600" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />
  <line x1="1700" y1="0" x2="1700" y2="1800" stroke="#98FB96" stroke-opacity="0.4" />

  <!-- Radial blur in the center -->
  <circle cx="900" cy="900" r="900" fill="url(#blurWhiteGradient)" />

  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 900 900" to="360 900 900" dur="22s" repeatCount="indefinite" />
    <!-- The rotating circle (initially placed to the right of center) -->
    <circle cx="1800" cy="900" r="1800" fill="url(#lightGreenGradient)" />
  </g>

  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 900 900" to="360 900 900" dur="22s" repeatCount="indefinite" />
    <!-- The rotating circle (initially placed to the right of center) -->
    <circle cx="0" cy="900" r="1800" fill="url(#lightBlueGradient)" />
  </g>
</svg>
