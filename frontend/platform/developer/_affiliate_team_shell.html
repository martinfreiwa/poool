<!-- Shared shell-marker for /developer/affiliate-team/* sub-pages.
     The visible page-header (team name + Invite button) was removed:
     the topbar now carries the page title (consistent with the dashboard
     pattern) and each sub-section's intro carries its own action button.
     This partial only holds dev-team metadata that JS reads.

     dat-team-name + dat-team-meta still exist as hidden mount points so
     `developer-affiliate-team-shell.js` can populate them; they may be
     surfaced into the topbar later via a context-var injection. -->

<!-- FA3 fix: skip-to-content link. WCAG 2.4.1 (Bypass Blocks). Keyboard
     users currently must tab through the ~12-item sidebar on every page
     reload before reaching the actual content. This link is the first
     focusable element on the page; pressing Tab once focuses it, and
     pressing Enter jumps focus to the main content region. Visually
     hidden until focused (.skip-link:focus reveals it). -->
<a class="skip-link" href="#dat-page-content">Skip to main content</a>

<!-- FA1 fix: insert an SR-only <h2> so the heading hierarchy is
     <h1> (topbar page-title) → <h2> (this page-scope) → <h3> (each card).
     Without this every page jumped from h1 directly to h3, breaking
     screen-reader landmark navigation (WCAG 2.2 SC 1.3.1 Info & Relationships).
     The class `sr-only` hides it visually while preserving the semantic. -->
<h2 class="sr-only" id="dat-page-content">Affiliate Team — page content</h2>

<div id="dat-team-meta-mount" hidden
     data-team-name=""
     data-team-meta=""
     aria-hidden="true">
  <span id="dat-team-name"></span>
  <span id="dat-team-meta"></span>
</div>
