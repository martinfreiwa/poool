<!-- Image Gallery Section -->
{% set gallery_ids = ['gallery-main-image', 'gallery-image-top-left', 'gallery-image-top-right', 'gallery-image-bottom-left', 'gallery-image-bottom-right'] %}
{% for img_url in asset.image_urls %}
{% if loop.index0 < 5 %}
<div id="{{ gallery_ids[loop.index0] }}" class="gallery-image" onclick="openLightbox({{ loop.index0 }})">
  <img src="{{ img_url }}" alt="{{ asset.title }}" class="gallery-img" loading="{% if loop.index0 == 0 %}eager{% else %}lazy{% endif %}"
    onload="this.classList.add('loaded'); this.parentElement.classList.add('image-loaded');" />
</div>
{% endif %}
{% endfor %}
<!-- Gallery View All Button -->
<button id="gallery-view-all-button" onclick="openLightbox(0)">
  <div class="gallery-btn-content">
    <div class="gallery-btn-group">
      <img  src="/static/images/prop-details/Iconimage.webp" alt="Photos" class="gallery-btn-icon" width="20" height="20" />
      <span class="gallery-btn-text">{{ (asset.image_urls | default([])) | length }} photos</span>
    </div>
    <div class="gallery-btn-divider"></div>
    <div class="gallery-btn-group">
      <img  src="/static/images/prop-details/Iconcube.webp" alt="Virtual tour" class="gallery-btn-icon" width="20" height="20" />
      <span class="gallery-btn-text">Virtual tour</span>
    </div>
  </div>
</button>
