<!-- Image Gallery Section -->
{% set gallery_ids = ['gallery-main-image', 'gallery-image-top-left', 'gallery-image-top-right', 'gallery-image-bottom-left', 'gallery-image-bottom-right'] %}
{% for img_url in asset.image_urls %}
{% if loop.index0 < 5 %}
<div id="{{ gallery_ids[loop.index0] }}" class="gallery-image" onclick="openLightbox({{ loop.index0 }})">
  <img src="{{ img_url }}" alt="{{ asset.title }}" class="gallery-img" loading="{% if loop.index0 == 0 %}eager{% else %}lazy{% endif %}"
    onload="this.classList.add('loaded'); this.parentElement.classList.add('image-loaded');"
    onerror="window.applyPooolImageFallback && window.applyPooolImageFallback(this)" />
</div>
{% endif %}
{% endfor %}
<!-- Gallery View All Button -->
<button id="gallery-view-all-button" onclick="openLightbox(0)">
  <div class="gallery-btn-content">
    <div class="gallery-btn-group">
      <svg class="gallery-btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="5" width="15" height="14" rx="2.5" stroke="#2563eb" stroke-width="1.8"/>
        <path d="M7 3h11a3 3 0 0 1 3 3v11" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="9" cy="10.5" r="1.75" stroke="#2563eb" stroke-width="1.5"/>
        <path d="M3 16l3.75-4.5a1.5 1.5 0 0 1 2.3 0L12 15l1.75-2.1a1.5 1.5 0 0 1 2.3 0L18 15.5" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="gallery-btn-text">{{ (asset.image_urls | default([])) | length }} photos</span>
    </div>
    {% if asset.youtube_video_id %}
      <div class="gallery-btn-divider"></div>
      <div class="gallery-btn-group" onclick="event.stopPropagation(); openVirtualTour();">
        <svg class="gallery-btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L3 7v10l9 5l9-5V7l-9-5Z" stroke="#2563eb" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M12 22V12" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M21 7l-9 5l-9-5" stroke="#2563eb" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M3 17l9-5l9 5" stroke="#2563eb" stroke-width="1.5" stroke-linejoin="round" opacity="0.35"/>
        </svg>
        <span class="gallery-btn-text">Virtual tour</span>
      </div>
    {% endif %}
  </div>
</button>
