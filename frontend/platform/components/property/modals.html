<!-- All image URLs for lightbox (server-rendered as hidden elements to avoid HTML escaping) -->
<div id="gallery-all-images" style="display:none">
  {% for img_url in asset.image_urls %}
  <img data-src="{{ img_url }}" data-caption="{{ asset.title }} — Photo {{ loop.index }}" />
  {% endfor %}
</div>
<!-- Lightbox Modal - Moved outside app-wrapper to avoid stacking context issues -->
<div id="lightbox-modal" class="lightbox-modal" style="display: none">
  <!-- Top bar: counter + close -->
  <div class="lightbox-top-bar">
    <span class="lightbox-counter" id="lightbox-counter">1 / 1</span>
    <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close gallery">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </button>
  </div>
  <!-- Main image area -->
  <div class="lightbox-image-wrapper" id="lightbox-image-wrapper">
    <img class="lightbox-content" id="lightbox-img" />
  </div>
  <!-- Navigation arrows -->
  <button class="lightbox-prev" onclick="changeImage(-1)" aria-label="Previous image">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
  </button>
  <button class="lightbox-next" onclick="changeImage(1)" aria-label="Next image">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
  </button>
  <!-- Thumbnail strip -->
  <div class="lightbox-thumbnails" id="lightbox-thumbnails"></div>
</div>
<!-- YouTube Video Modal -->
<div id="youtube-modal-overlay" class="youtube-modal-overlay">
  <div class="youtube-modal">
    <div class="youtube-modal-header">
      <button class="youtube-modal-close" id="close-youtube-modal">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
      </button>
    </div>
    <div class="youtube-modal-content">
      <div class="youtube-video-wrapper">
        <iframe loading="lazy" id="youtube-iframe" width="100%" height="100%" src="" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture;"
          allowfullscreen></iframe>
      </div>
    </div>
  </div>
</div>
