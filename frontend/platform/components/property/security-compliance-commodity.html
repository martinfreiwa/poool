<!-- Security & Compliance Section -->
<div id="security-compliance-section" class="holo-card">
  <div class="holo-card-vector-1"></div>
  <div style="position: relative; z-index: 1;">
    <!-- Section Heading with Icon -->
    <div class="section-header">
      <img src="/static/images/commodities/shield-02.svg" alt="Security & Compliance" class="section-icon" width="24" height="24" />
      <h2>Security &amp; Compliance</h2>
    </div>
    <div class="security-compliance-grid">
      <!-- Card 1: SPV Structure -->
      <div class="security-compliance-card">
        <div class="card-blur-vector-1"></div>
        <div class="card-blur-vector-2"></div>
        <div class="security-compliance-card-icon">
          <img src="/static/images/commodities/shield-02-green1.svg" alt="Security" width="18" height="18" />
        </div>
        <span class="security-compliance-label">SPV Structure</span>
        <span class="security-compliance-value">Indonesia + Singapore Holding</span>
      </div>
      <!-- Card 2: Escrow Wallet -->
      <div class="security-compliance-card">
        <div class="card-blur-vector-1"></div>
        <div class="card-blur-vector-2"></div>
        <div class="security-compliance-card-icon">
          <img src="/static/images/commodities/lock-02-green.svg" alt="Escrow" width="18" height="18" />
        </div>
        <span class="security-compliance-label">Escrow Wallet</span>
        <span class="security-compliance-value">Payments only against invoices</span>
      </div>
      <!-- Card 3: Tokenized Shares -->
      <div class="security-compliance-card">
        <div class="card-blur-vector-1"></div>
        <div class="card-blur-vector-2"></div>
        <div class="security-compliance-card-icon">
          <img src="/static/images/commodities/file-shield-02-green.svg" alt="Tokenized" width="18" height="18" />
        </div>
        <span class="security-compliance-label">Tokenized Shares</span>
        <span class="security-compliance-value">ERC-1155 NFT based ownership</span>
      </div>
      <!-- Card 4: Insurance -->
      <div class="security-compliance-card">
        <div class="card-blur-vector-1"></div>
        <div class="card-blur-vector-2"></div>
        <div class="security-compliance-card-icon">
          <img src="/static/images/commodities/file-lock-02-green.svg" alt="Insurance" width="18" height="18" />
        </div>
        <span class="security-compliance-label">Insurance</span>
        <span class="security-compliance-value">Crops insured against weather &amp; pests</span>
      </div>
    </div>
  </div>
</div>
