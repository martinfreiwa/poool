<!-- Contact Section -->
<div class="contact-section">
  <div class="contact-card">
    <div class="contact-avatar">
      <img loading="lazy" src="/static/images/jonasvideo.webp" alt="Real Estate Expert" class="avatar-image" />
      <div class="avatar-contrast-border"></div>
    </div>
    <div class="contact-info">
      <div class="contact-title-wrapper">
        <h3 class="contact-heading">Have more questions about this property?</h3>
      </div>
      <div class="contact-bottom">
        <p class="contact-subtitle">Contact our real estate experts</p>
        <div class="contact-buttons">
          <button class="contact-button chat-button">
            <svg class="contact-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">

          </button>

            <svg class="contact-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">

            </svg>
            <div class="button-text-padding"><span class="button-text">Book a call</span></div>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
