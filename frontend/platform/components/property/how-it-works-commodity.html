<!-- How it Works Section -->
<div id="how-it-works-section">
  <div id="how-it-works-heading">
    <h2>How it works</h2>
  </div>
  <div id="property-info-cards">
    <div class="info-card">
      <!-- Step 1 Icon: Package / Commodity -->
      <div class="card-image hiw-icon-wrapper">
        <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="60" height="60" rx="12" fill="#0000FF"/>
          <path d="M40 26a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 22 26v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 40 34Z" stroke="#03FF88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="m22.3 25 8.7 5 8.7-5" stroke="#03FF88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M31 40V30" stroke="#03FF88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="card-step">Step 1</div>
      <div class="card-title">Buy a fraction<br />of premium<br />commodity</div>
      <div class="card-action">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0000D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="action-icon">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <path d="M9 15l2 2 4-4"/>
        </svg>
        <span class="action-text">Check transparency through legal docs</span>
        <svg class="arrow-icon" width="6" height="12" viewBox="0 0 6 12" fill="none">
          <path d="M1 1L5 6L1 11" stroke="#0000D4" stroke-width="2" stroke-linecap="round"></path>
        </svg>
      </div>
    </div>
    <div class="info-card">
      <!-- Step 2 Icon: Coins / Payouts -->
      <div class="card-image hiw-icon-wrapper">
        <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="60" height="60" rx="12" fill="#0000FF"/>
          <ellipse cx="26" cy="24" rx="8" ry="4" stroke="#03FF88" stroke-width="2.5"/>
          <path d="M18 24V30C18 32.2091 21.5817 34 26 34C30.4183 34 34 32.2091 34 30V24" stroke="#03FF88" stroke-width="2.5"/>
          <path d="M26 30V36C26 38.2091 29.5817 40 34 40C38.4183 40 42 38.2091 42 36V30" stroke="#03FF88" stroke-width="2.5"/>
          <ellipse cx="34" cy="30" rx="8" ry="4" stroke="#03FF88" stroke-width="2.5"/>
        </svg>
      </div>
      <div class="card-step">Step 2</div>
      <div class="card-title">Receive steady<br />yield<br />payouts</div>
      <div class="card-action">
        <img loading="lazy" src="/static/images/portfolio_asset_details/shield-tick.svg" alt="" class="action-icon" width="24" height="24" />
        <span class="action-text">We handle all operations</span>
        <svg class="arrow-icon" width="6" height="12" viewBox="0 0 6 12" fill="none">
          <path d="M1 1L5 6L1 11" stroke="#0000D4" stroke-width="2" stroke-linecap="round"></path>
        </svg>
      </div>
    </div>
    <div class="info-card">
      <!-- Step 3 Icon: Growth Chart -->
      <div class="card-image hiw-icon-wrapper">
        <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="60" height="60" rx="12" fill="#0000FF"/>
          <path d="M18 40L26 30L32 34L42 20" stroke="#03FF88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M36 20H42V26" stroke="#03FF88" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="18" y="34" width="4" height="8" rx="1" fill="#03FF88" opacity="0.5"/>
          <rect x="24" y="30" width="4" height="12" rx="1" fill="#03FF88" opacity="0.6"/>
          <rect x="30" y="28" width="4" height="14" rx="1" fill="#03FF88" opacity="0.7"/>
          <rect x="36" y="24" width="4" height="18" rx="1" fill="#03FF88" opacity="0.8"/>
        </svg>
      </div>
      <div class="card-step">Step 3</div>
      <div class="card-title">Grow your<br />wealth as<br />commodity value rises</div>
      <div class="card-action">
        <img src="/static/images/portfolio_asset_details/coins-stacked-01.svg" alt="" class="action-icon" width="24" height="24" />
        <span class="action-text">Earn from yield and value appreciation</span>
        <svg class="arrow-icon" width="6" height="12" viewBox="0 0 6 12" fill="none">
          <path d="M1 1L5 6L1 11" stroke="#0000D4" stroke-width="2" stroke-linecap="round"></path>
        </svg>
      </div>
    </div>
  </div>
</div>
