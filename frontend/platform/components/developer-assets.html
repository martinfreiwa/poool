<div id="developer-assets-wrapper" class="table__wrapper developer-assets-table">
  <div id="developer-assets-container" class="table__container developer-assets-table__container">
    <div id="developer-assets-header-row" class="table__header-row developer-assets-table__row">
      <div id="developer-assets-th-asset" class="table__header-cell table__header-cell--asset developer-assets-table__asset">
        <button type="button" class="developer-assets-table__sort" data-dev-sort="asset">
          <span class="table__header-text">Asset</span>
        </button>
      </div>
      <div id="developer-assets-th-sales" class="table__header-cell table__header-cell--sales developer-assets-table__sales">
        <button type="button" class="developer-assets-table__sort developer-assets-table__sort--active" data-dev-sort="sales" data-direction="desc">
          <span class="table__header-text">Sales</span>
        </button>
      </div>
      <div id="developer-assets-th-views" class="table__header-cell table__header-cell--views developer-assets-table__views">
        <button type="button" class="developer-assets-table__sort" data-dev-sort="views">
          <span class="table__header-text">Views</span>
        </button>
      </div>
      <div id="developer-assets-th-conversion" class="table__header-cell table__header-cell--conversion developer-assets-table__conversion">
        <button type="button" class="developer-assets-table__sort" data-dev-sort="conversion">
          <span class="table__header-text">Conv. Rate</span>
        </button>
      </div>
      <div id="developer-assets-th-funding" class="table__header-cell table__header-cell--funding developer-assets-table__funding">
        <button type="button" class="developer-assets-table__sort" data-dev-sort="funding">
          <span class="table__header-text">Funding</span>
        </button>
      </div>
      <div id="developer-assets-th-actions" class="table__header-cell table__header-cell--actions developer-assets-table__actions">
        <div class="table__header-content">
          <span class="table__header-text">Actions</span>
        </div>
      </div>
    </div>

    <div id="developer-assets-body" class="table__body developer-assets-table__body">
      {% for asset in developer_assets %}
      <div id="developer-assets-row-{{ loop.index }}" class="table__row developer-assets-table__row"
        data-asset="{{ asset.title | lower }}"
        data-sales="{{ asset.total_sales_cents }}"
        data-views="{{ asset.views }}"
        data-conversion="{{ asset.conversion_rate }}"
        data-funding="{{ asset.funding_pct }}">
        <div id="developer-assets-cell-asset-{{ loop.index }}" class="table__cell table__cell--asset developer-assets-table__asset">
          <a href="/developer/asset-detail?id={{ asset.id }}" class="developer-assets-table__asset-link">
            <img loading="lazy" src="{{ asset.cover_image_url }}" alt="{{ asset.title }}" class="table__cell-image" />
            <span class="table__cell-text">
              <span class="table__cell-primary">{{ asset.title }}</span>
            </span>
          </a>
        </div>

        <div id="developer-assets-cell-sales-{{ loop.index }}" class="table__cell table__cell--sales developer-assets-table__sales">
          <span class="table__cell-value">{{ asset.total_sales_display }}</span>
        </div>

        <div id="developer-assets-cell-views-{{ loop.index }}" class="table__cell table__cell--views developer-assets-table__views">
          <span class="table__cell-text-value">{{ asset.views }}</span>
        </div>

        <div id="developer-assets-cell-conversion-{{ loop.index }}" class="table__cell table__cell--conversion developer-assets-table__conversion">
          <span class="table__cell-text-value">{{ asset.conversion_display }}</span>
        </div>

        <div id="developer-assets-cell-funding-{{ loop.index }}" class="table__cell table__cell--funding developer-assets-table__funding">
          <span class="table__cell-text-value">{{ asset.funding_display }}</span>
        </div>

        <div id="developer-assets-cell-actions-{{ loop.index }}" class="table__cell table__cell--actions developer-assets-table__actions">
          <div class="developer-assets-table__action-group">
            <a href="/marketplace/property/{{ asset.id }}" class="developer-assets-table__icon-btn" aria-label="View {{ asset.title }}" title="View asset">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </a>
            <a href="/developer/asset-detail?id={{ asset.id }}" class="developer-assets-table__icon-btn" aria-label="Edit {{ asset.title }}" title="Edit asset">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 20h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
      {% else %}
      <div class="table__row table__row--empty">
        <div class="ds-table-empty">
          <p class="ds-table-empty__title">No live asset performance yet.</p>
          <p class="ds-table-empty__description">Approved or live assets will appear here once they receive activity.</p>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
