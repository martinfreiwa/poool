<!-- Mobile KYC Banner (only visible on mobile) -->
<div class="mobile-kyc-banner" id="mobile-kyc-banner-component" style="display: none;">
    <!-- Text + Icon Container -->
    <div class="mobile-kyc-banner__content">
        <!-- Featured Icon -->
        <div class="mobile-kyc-banner__icon-container">
            <div class="mobile-kyc-banner__icon-bg"></div>
            <div class="mobile-kyc-banner__icon-wrapper">
                <!-- File Shield Icon --><svg class="mobile-kyc-banner__icon" width="20" height="20" viewBox="0 0 20 20"
                    fill="none">
                    <path
                        d="M10.4168 2.04175L15.4168 3.79175C15.6835 3.89175 15.8335 4.15008 15.8335 4.43341V9.16675C15.8335 12.3501 13.5001 15.4917 10.4168 16.7917C10.1501 16.9001 9.85846 16.9001 9.59179 16.7917C6.50846 15.4917 4.16679 12.3501 4.16679 9.16675V4.43341C4.16679 4.15008 4.31679 3.89175 4.58346 3.79175L9.58346 2.04175C9.85013 1.94175 10.1501 1.94175 10.4168 2.04175Z"
                        stroke="white" stroke-width="1.336" stroke-linecap="round" stroke-linejoin="round"></path>
                    <path d="M7.5 9.16667L9.16667 10.8333L12.5 7.5" stroke="white" stroke-width="1.336"
                        stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </div>
        </div>
        <!-- Text Content -->
        <div class="mobile-kyc-banner__text">
            <h4 class="mobile-kyc-banner__heading">
                Passport and address proof required
            </h4>
            <p class="mobile-kyc-banner__description">
                Local regulations require us to verify your passport and address
                before you can invest.
            </p>
        </div>
    </div>
    <!-- Upload Documents Action --><button class="mobile-kyc-banner__action" onclick="handleKYCAction()">
        <span class="mobile-kyc-banner__action-text">Upload passport</span>
        <svg class="mobile-kyc-banner__arrow" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M7.5 15L12.5 10L7.5 5" stroke="#B54708" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round"></path>
        </svg>
    </button>
</div>
