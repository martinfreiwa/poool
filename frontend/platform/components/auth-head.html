<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/static/images/icons/logo-pool.svg" />

    <!-- PWA manifest + theme. Mirrors components/head.html so auth flows
         remain installable; install button itself is hidden on /auth/*. -->
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <meta name="theme-color" content="#001DCA" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0b2e" media="(prefers-color-scheme: dark)" />
    <meta name="application-name" content="POOOL" />
    <link rel="apple-touch-icon" href="/static/images/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/static/images/icons/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/static/images/icons/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/images/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="POOOL" />

    <title>{{ title | default('POOOL') }}</title>
    {% if meta_description %}
    <meta name="description" content="{{ meta_description }}" />{% endif %}

    <!-- Sentry Error Tracking (Auth Pages) -->
    <script src="https://browser.sentry-cdn.com/9.7.0/bundle.min.js" crossorigin="anonymous"></script>
    <script>
        Sentry.init({
            dsn: "https://afa08aaf5243c4068a9cda6547df30e1@o4511010305277952.ingest.de.sentry.io/4511013959762000",
            environment: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'development' : 'production',
            release: "poool-frontend@1.0.0",
            tracesSampleRate: 0,
            beforeSend: function (event) {
                if (event.request && event.request.url) {
                    event.request.url = event.request.url.replace(/token=[^&]+/, 'token=[REDACTED]');
                }
                return event;
            },
        });

        window.addEventListener('unhandledrejection', function (event) {
            Sentry.captureException(event.reason || new Error('Unhandled Promise rejection'));
        });
    </script>

    <!-- CSRF Token injection for HTMX requests -->
    <script>
        (function () {
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            }
            const token = getCookie('csrf_token');
            if (token) {
                document.addEventListener('htmx:configRequest', function (evt) {
                    if (['post', 'put', 'patch', 'delete'].includes(evt.detail.verb)) {
                        evt.detail.headers['X-CSRF-Token'] = decodeURIComponent(token);
                    }
                });
            }
        })();
    </script>
    <script src="/static/js/vendor/htmx.min.js?v={{ asset_version }}"></script>
    <script src="/static/js/toast.js?v={{ asset_version }}"></script>
    <script defer src="/static/js/auth-customer-carousel.js?v={{ asset_version }}"></script>
    <script defer src="/static/js/pwa-install.js?v={{ asset_version }}"></script>

    <!-- Design tokens only (no dashboard CSS) -->
    <link rel="stylesheet" href="/static/css/dashboard-tokens.css?v={{ asset_version }}" />

    <!-- Auth page CSS -->
    <link rel="stylesheet" href="/static/css/login.css?v={{ asset_version }}" />

    <!-- Reveal body once CSS is ready (required by dashboard-tokens.css anti-flicker rule) -->
    <script>
        (function () {
            if (document.readyState !== 'loading') {
                document.body && document.body.classList.add('dom-ready');
            }
            document.addEventListener('DOMContentLoaded', function () {
                document.body.classList.add('dom-ready');
            });
            setTimeout(function () {
                document.body && document.body.classList.add('dom-ready');
            }, 500);
        })();
    </script>
</head>
