<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Enable cross-document View Transitions (SPA-like navigation) -->
    <meta name="view-transition" content="same-origin" />
    <title>{{ title | default('POOOL') }} - POOOL</title>
    {% if meta_description %}
    <meta name="description" content="{{ meta_description }}" />{% endif %}
    {% if no_index %}
    <meta name="robots" content="noindex, nofollow" />{% endif %}

    <!-- Sentry Error Tracking -->
    <script src="https://browser.sentry-cdn.com/9.7.0/bundle.tracing.replay.min.js" crossorigin="anonymous"></script>
    <script>
        Sentry.init({
            dsn: "https://afa08aaf5243c4068a9cda6547df30e1@o4511010305277952.ingest.de.sentry.io/4511013959762000",
            environment: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'development' : 'production',
            release: "poool-frontend@1.0.0",
            integrations: [
                Sentry.browserTracingIntegration(),
                Sentry.replayIntegration(),
            ],
            tracesSampleRate: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 1.0 : 0.2,
            tracePropagationTargets: ["localhost", /^https:\/\/([a-z0-9-]+\.)*poool\.finance/],
            replaysSessionSampleRate: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 1.0 : 0.1,
            replaysOnErrorSampleRate: 1.0,
            beforeSend: function (event) {
                // Strip PII from URLs if needed
                if (event.request && event.request.url) {
                    event.request.url = event.request.url.replace(/token=[^&]+/, 'token=[REDACTED]');
                }
                return event;
            },
        });

        // Attach logged-in user context to Sentry events
        fetch('/api/me', { credentials: 'same-origin' })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (u) { if (u && u.id) Sentry.setUser({ id: String(u.id), email: u.email }); })
            .catch(function () { /* not logged in — ignore */ });

        // Global error handlers
        window.addEventListener('unhandledrejection', function (event) {
            console.error('Unhandled Promise Rejection:', event.reason);
            Sentry.captureException(event.reason || new Error('Unhandled Promise rejection'));
        });

        // HTMX-specific error tracking
        document.addEventListener('htmx:responseError', function (evt) {
            const status = evt.detail.xhr ? evt.detail.xhr.status : 'UnknownStatus';
            const path = evt.detail.pathInfo ? evt.detail.pathInfo.requestPath : 'UnknownPath';
            const response = evt.detail.xhr ? (evt.detail.xhr.responseText || '').substring(0, 500) : 'NoResponse';

            console.error(`HTMX Response Error [${status}]: ${path}`, response);

            Sentry.captureMessage(`HTMX Response Error: ${status} ${path}`, {
                level: (typeof status === 'number' && status >= 500) ? 'error' : 'warning',
                tags: {
                    status: status,
                    path: path,
                    method: evt.detail.requestConfig ? evt.detail.requestConfig.method : 'UNKNOWN'
                },
                extra: {
                    status: status,
                    path: path,
                    response: response,
                    target: evt.detail.target ? evt.detail.target.id || evt.detail.target.tagName : 'NoTarget'
                },
            });
        });

        document.addEventListener('htmx:sendError', function (evt) {
            const path = evt.detail.pathInfo ? evt.detail.pathInfo.requestPath : 'UnknownPath';
            console.error(`HTMX Network Error: ${path}`);

            Sentry.captureMessage(`HTMX Network Error: ${path}`, {
                level: 'error',
                tags: { path: path },
                extra: { path: path },
            });
        });
    </script>

    <!-- HTMX and Global CSRF Token Injection -->
    <script>
        (function () {
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            }

            // Always install the fetch interceptor — read the token fresh at each request time
            // so it works even if the cookie was set after page load by the CSRF middleware.
            const originalFetch = window.fetch;
            window.fetch = function () {
                let args = arguments;
                if (args[1] && args[1].method && ['POST', 'PUT', 'PATCH', 'DELETE'].includes(args[1].method.toUpperCase())) {
                    const token = getCookie('csrf_token');
                    if (token) {
                        args[1].headers = args[1].headers || {};
                        let hasToken = false;
                        if (args[1].headers instanceof Headers) {
                            hasToken = args[1].headers.has('X-CSRF-Token') || args[1].headers.has('x-csrf-token');
                            if (!hasToken) {
                                args[1].headers.append('X-CSRF-Token', decodeURIComponent(token));
                            }
                        } else {
                            for (let key in args[1].headers) {
                                if (key.toLowerCase() === 'x-csrf-token') {
                                    hasToken = true;
                                    break;
                                }
                            }
                            if (!hasToken) {
                                args[1].headers['X-CSRF-Token'] = decodeURIComponent(token);
                            }
                        }
                    }
                }
                return originalFetch.apply(this, args);
            };

            // HTMX injection — also read token fresh
            document.addEventListener('htmx:configRequest', function (evt) {
                if (['post', 'put', 'patch', 'delete'].includes(evt.detail.verb)) {
                    const token = getCookie('csrf_token');
                    if (token) {
                        evt.detail.headers['X-CSRF-Token'] = decodeURIComponent(token);
                    }
                }
            });

            // Standard HTML forms injection
            document.addEventListener('submit', function (e) {
                if (e.target && e.target.tagName === 'FORM') {
                    const method = (e.target.getAttribute('method') || 'GET').toUpperCase();
                    if (['POST', 'PUT', 'PATCH', 'DELETE'].includes(method)) {
                        const token = getCookie('csrf_token');
                        if (token) {
                            let action = e.target.getAttribute('action') || '';
                            if (!action.includes('csrf_token=')) {
                                let separator = action.includes('?') ? '&' : '?';
                                e.target.setAttribute('action', action + separator + 'csrf_token=' + encodeURIComponent(token));
                            }
                        }
                    }
                }
            });
        })();
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>

    <!-- External Scripts -->
    {% if external_scripts %}
    {% for script in external_scripts %}
    <script src="{{ script }}"></script>
    {% endfor %}
    {% endif %}

    <!-- CSS Bundle (design system + common styles, built by build-bundle.sh) -->
    <link rel="stylesheet" href="/static/css/bundle.css?v=1.1.0" />
    <link rel="stylesheet" href="/static/css/poool-dropdown.css?v={{ asset_version }}" />
    <script src="/static/js/user-data.js?v={{ asset_version }}"></script>
    <script src="/static/js/poool-dropdown.js?v={{ asset_version }}"></script>
    <script src="/static/js/poool-dropdown-init.js?v={{ asset_version }}"></script>
    <script src="/static/js/sidebar-community.js?v={{ asset_version }}"></script>

    <!-- Page Specific CSS and Scripts -->
    {% if extra_css %}
    {% for css in extra_css %}
    <link rel="stylesheet" href="/static/css/{{ css }}.css?v={{ asset_version }}" />
    {% endfor %}
    {% endif %}
    {% if extra_js %}
    {% for js in extra_js %}
    <script src="/static/js/{{ js }}.js?v={{ asset_version }}"></script>
    {% endfor %}
    {% endif %}

    <!-- Anti-Flicker: reveal body once DOM + CSS are fully loaded -->
    <script>
        (function () {
            // If DOM is already loaded (e.g. back/forward cache), reveal immediately
            if (document.readyState !== 'loading') {
                document.body && document.body.classList.add('dom-ready');
            }
            // Otherwise wait for DOMContentLoaded
            document.addEventListener('DOMContentLoaded', function () {
                document.body.classList.add('dom-ready');
                document.body.classList.remove('loading');
            });
            // Fallback: ensure page is always visible after 2s max
            setTimeout(function () {
                document.body && document.body.classList.add('dom-ready');
            }, 2000);
        })();
    </script>
</head>
