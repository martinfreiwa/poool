<!doctype html>
<html lang="en">

<head>

    <link rel="icon" type="image/svg+xml" href="/static/images/icons/logo-pool.svg" />
    <title>Login – POOOL</title>
    
    <meta name="description" content="Log in to your POOOL account to access the marketplace, manage your portfolio, and track your investments in real world assets." />

    <!-- Sentry Error Tracking (Auth Pages) -->
    <script src="https://browser.sentry-cdn.com/9.7.0/bundle.min.js" crossorigin="anonymous"></script>
    <script>
        Sentry.init({
            dsn: "https://afa08aaf5243c4068a9cda6547df30e1@o4511010305277952.ingest.de.sentry.io/4511013959762000",
            environment: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'development' : 'production',
            release: "poool-frontend@1.0.0",
            tracesSampleRate: 0,
            beforeSend: function (event) {
                if (event.request && event.request.url) {
                    event.request.url = event.request.url.replace(/token=[^&]+/, 'token=[REDACTED]');
                }
                return event;
            },
        });

        window.addEventListener('unhandledrejection', function (event) {
            Sentry.captureException(event.reason || new Error('Unhandled Promise rejection'));
        });
    </script>

    <!-- CSRF Token injection for HTMX requests -->
    <script>
        (function () {
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            }
            const token = getCookie('csrf_token');
            if (token) {
                document.addEventListener('htmx:configRequest', function (evt) {
                    if (['post', 'put', 'patch', 'delete'].includes(evt.detail.verb)) {
                        evt.detail.headers['X-CSRF-Token'] = decodeURIComponent(token);
                    }
                });
            }
        })();
    </script>
    <script src="/static/js/vendor/htmx.min.js?v=1777363420"></script>
    <script src="/static/js/toast.js?v=1777363420"></script>

    <!-- Design tokens only (no dashboard CSS) -->
    <link rel="stylesheet" href="/static/css/dashboard-tokens.css?v=1777363420" />

    <!-- Auth page CSS -->
    <link rel="stylesheet" href="/static/css/login.css?v=1777363420" />

    <!-- Reveal body once CSS is ready (required by dashboard-tokens.css anti-flicker rule) -->
    <script>
        (function () {
            if (document.readyState !== 'loading') {
                document.body && document.body.classList.add('dom-ready');
            }
            document.addEventListener('DOMContentLoaded', function () {
                document.body.classList.add('dom-ready');
            });
            setTimeout(function () {
                document.body && document.body.classList.add('dom-ready');
            }, 500);
        })();
    </script>
</head>

<body>
  <a id="back-link" href="/">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    Back
  </a>
  <div id="login-container">
    <section id="left-section">
      <div id="container">
        <div id="content">
          <!-- Header -->
          <div id="header">
            <div id="logo-pool">
              <img src="/static/images/icons/logo-pool.svg" alt="Pool Logo" width="184" height="48">
            </div>
            <div id="text-and-supporting-text">
              <h1 id="text">Welcome back</h1>
              <p id="supporting-text">Please enter your details</p>
            </div>
          </div>

          <!-- Error area -->
          <div id="auth-error" aria-live="polite">
            
          </div>

          <!-- Social login buttons -->
          <div id="social-buttons">
            <button id="google-button" class="social-button" onclick="window.location.href='/auth/google'">
              <div class="social-icon">
                <img  src="/static/images/icons/social-google.svg" alt="Google" width="24" height="24">
              </div>
              <span class="social-text">Log in with Google</span>
            </button>
          </div>

          <!-- Divider -->
          <div id="content-divider">
            <div id="divider-left"></div>
            <span id="or-text">OR</span>
            <div id="divider-right"></div>
          </div>

          <!-- Login form -->
          <form id="login-form" method="post" action="/auth/login" hx-post="/auth/login" hx-target="#auth-error" hx-swap="innerHTML">
            <input type="hidden" id="csrf-token-input" name="csrf_token" value="2203e735-aee5-4988-bc86-7d5f805a61fe">
            <div class="input-field">
              <div class="input-with-label">
                <label for="email-input" class="input-label">Email</label>
                <div class="input-wrapper">
                  <input type="email" id="email-input" name="email" placeholder="Enter your email" required autocomplete="email">
                </div>
              </div>
            </div>

            <div class="input-field">
              <div class="input-with-label">
                <label for="password-input" class="input-label">Password</label>
                <div class="input-wrapper">
                  <input type="password" id="password-input" name="password" placeholder="Enter your password" required autocomplete="current-password">
                  <button type="button" id="toggle-password" onclick="var i=document.getElementById('password-input');i.type=i.type==='password'?'text':'password';this.querySelector('.eye-off').style.display=i.type==='password'?'none':'block';this.querySelector('.eye-on').style.display=i.type==='password'?'block':'none';">
                    <svg class="eye-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#667085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg class="eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#667085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                  </button>
                </div>
              </div>
            </div>

            <div id="remember-forgot-row">
              <div id="remember-me">
                <input type="checkbox" id="remember-checkbox" name="remember">
                <label for="remember-checkbox">Remember me</label>
              </div>
              <a href="/auth/forgot-password" id="forgot-password-link">
                <span id="forgot-password-text">Forgot password?</span>
              </a>
            </div>

            <button type="submit" id="login-button">
              <span id="button-text">Log in</span>
            </button>
          </form>

          <!-- Sign up link -->
          <div id="signup-row">
            <span id="signup-text">Don't have an account?</span>
            <a href="/auth/signup" id="signup-link">
              <span id="signup-link-text">Sign up</span>
            </a>
          </div>
        </div>
      </div>
    </section>

    <section id="right-section">
      <div id="testimonial-container">
        <img
          id="testimonial-image"
          src="/static/images/auth/indonesian-login-portrait.webp"
          alt="Portrait of a POOOL investor"
          width="1536"
          height="1024"
          fetchpriority="high"
        >
        <div id="quote-panel">
          <div id="attribution-card">
            <h2 id="testimonial-quote">"POOOL made my first real estate investment feel clear, local, and within reach."</h2>
            <div id="name-and-stars">
              <div id="text-and-supporting">
                <span id="author-name">POOOL Investor</span>
                <span id="author-company">Indonesia</span>

              <div id="stars-container">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#22c55e"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#22c55e"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#22c55e"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#22c55e"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#22c55e"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              </div>
            </div>
          </div>
          <div id="arrows-container">
            <button class="carousel-arrow" id="prev-arrow">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            </button>
            <button class="carousel-arrow" id="next-arrow">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
            </button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      function getCookie(name) {
        var value = '; ' + document.cookie;
        var parts = value.split('; ' + name + '=');
        if (parts.length === 2) {
          return parts.pop().split(';').shift();
        }
        return '';
      }
      var csrfInput = document.getElementById('csrf-token-input');
      if (csrfInput) {
        csrfInput.value = decodeURIComponent(getCookie('csrf_token') || '');
      }
    })();

    var team = [
      { img: '/static/images/auth/indonesian-login-portrait.webp', quote: 'POOOL made my first real estate investment feel clear, local, and within reach.', name: 'POOOL Investor', role: 'Indonesia' },
      { img: '/webp/team/Jonas Freiwald.webp',       quote: 'All my real estate experience was building up to this moment — launching <span class="highlight-green">POOOL</span>.', name: 'Jonas Freiwald',       role: 'Co-CEO, Founder' },
      { img: '/webp/team/Dmitry Sikorski.webp',       quote: 'I know what it\'s like to build from zero. <span class="highlight-green">POOOL</span> gives that chance to anyone.', name: 'Dmitry Sikorski',       role: 'Co-CEO, Founder' },
      { img: '/webp/team/Nikita Kokhanevych.webp',    quote: 'Before it was a rich man\'s game. <span class="highlight-green">POOOL</span> hacked the rules for everyone.', name: 'Nikita Kokhanevych',    role: 'CTO, Blockchain' },
      { img: '/webp/team/Mykyta Hlukhuvskyi.webp',   quote: 'Investing in real estate is now simpler than ordering a taxi. That\'s <span class="highlight-green">POOOL</span>.', name: 'Mykyta Hlukhuvskyi',   role: 'CTO, Back-end' },
      { img: '/webp/team/Nataly Vovque.webp',         quote: 'Old money owned the buildings. <span class="highlight-green">POOOL</span> lets new money own the future.', name: 'Nataly Vovque',         role: 'Branding' },
      { img: '/png/Jonathan Rizky.webp',              quote: 'For me, <span class="highlight-green">POOOL</span> is where compliance meets innovation — trust built on regulation.', name: 'Jonathan Rizky',         role: 'Compliance Officer' },
      { img: '/png/Khai.webp',                        quote: 'For me, <span class="highlight-green">POOOL</span> is where ideas turn into action, and teamwork creates real change.', name: 'Khairatul Raudah',       role: 'Corporate Assistant' },
      { img: '/webp/team/Sean Reno.webp',             quote: 'Seen so many platforms promise trust — <span class="highlight-green">POOOL</span> actually backs it up with law.', name: 'Sean Reno',              role: 'Government Relations' },
      { img: '/webp/team/Patrick Werner.webp',        quote: '<span class="highlight-green">POOOL</span> is a fantastic tool to help people from around the world invest money.', name: 'Patrick Werner',         role: 'Local Director' },
      { img: '/webp/team/Daniel Todorov.webp',        quote: 'Everyone sells dreams. We built <span class="highlight-green">POOOL</span> to fractionalize what\'s real.', name: 'Daniel Todorov',         role: 'Head of Design' },
      { img: '/webp/team/Jonas Freiwald.webp',       quote: 'Through <span class="highlight-green">POOOL</span>, I invested in a Bali villa. Real estate felt complex, but now I can invest in minutes from my phone.', name: 'Dewi Lestari',           role: 'Real Estate Investor' },
      { img: '/webp/team/Patrick Werner.webp',        quote: '<span class="highlight-green">POOOL</span> gave me access to properties I never thought I could afford. My first investment was €500 in a Lisbon apartment.', name: 'Marco Fernandes',        role: 'Software Engineer' },
      { img: '/webp/team/Sean Reno.webp',             quote: 'I\'ve tried stocks, crypto, and now real estate via <span class="highlight-green">POOOL</span>. This is the most transparent platform I\'ve used.', name: 'Aiko Tanaka',             role: 'Portfolio Investor' },
      { img: '/webp/team/Nikita Kokhanevych.webp',    quote: 'Finally a platform where a teacher\'s salary can buy into real estate. <span class="highlight-green">POOOL</span> changed what I thought was possible.', name: 'Fatima Al-Rashid',        role: 'Educator & Investor' },

    ];
    var current = 0;
    var container = document.getElementById('testimonial-container');
    var imageEl   = document.getElementById('testimonial-image');
    var quoteEl   = document.getElementById('testimonial-quote');
    var nameEl    = document.getElementById('author-name');
    var roleEl    = document.getElementById('author-company');

    function show(idx) {
      var t = team[idx];
      if (imageEl) {
        imageEl.src = t.img;
      } else {
        container.style.backgroundImage = 'url("' + t.img + '")';
      }
      quoteEl.innerHTML = '\u201c' + t.quote + '\u201d';
      nameEl.textContent = t.name;
      roleEl.textContent = t.role;
    }

    document.getElementById('prev-arrow').addEventListener('click', function () {
      current = (current - 1 + team.length) % team.length;
      show(current);
    });
    document.getElementById('next-arrow').addEventListener('click', function () {
      current = (current + 1) % team.length;
      show(current);
    });
  </script>

  <script>
    document.body.addEventListener('htmx:beforeSwap', function (evt) {
      if (evt.detail.xhr.status >= 400) {
        evt.detail.shouldSwap = true;
        evt.detail.isError = false;
      }
    });

    document.body.addEventListener('htmx:beforeRequest', function (evt) {
      var btn = document.getElementById('login-button');
      if (btn) {
        btn.disabled = true;
        btn.querySelector('#button-text').textContent = 'Logging in...';
      }
    });

    document.body.addEventListener('htmx:afterRequest', function (evt) {
      var btn = document.getElementById('login-button');
      if (btn) {
        btn.disabled = false;
        btn.querySelector('#button-text').textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
