<!doctype html>
<html lang="en">

<head>

    <meta name="theme-color" content="#0a0b2e" media="(prefers-color-scheme: dark)" />

    <link rel="apple-touch-icon" sizes="152x152" href="/static/images/icons/apple-touch-icon-152.png" />

    <title>Login – POOOL</title>
    
    <meta name="description" content="Log in to your POOOL account to access the marketplace, manage your portfolio, and track your investments in real world assets." />

    <!-- Sentry Error Tracking (Auth Pages) -->
    <script src="https://browser.sentry-cdn.com/9.7.0/bundle.min.js" crossorigin="anonymous"></script>
    <script>
        Sentry.init({
            dsn: "https://afa08aaf5243c4068a9cda6547df30e1@o4511010305277952.ingest.de.sentry.io/4511013959762000",
            environment: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'development' : 'production',
            release: "poool-frontend@1.0.0",
            tracesSampleRate: 0,
            beforeSend: function (event) {
                if (event.request && event.request.url) {
                    event.request.url = event.request.url.replace(/token=[^&]+/, 'token=[REDACTED]');
                }
                return event;
            },
        });

        window.addEventListener('unhandledrejection', function (event) {
            Sentry.captureException(event.reason || new Error('Unhandled Promise rejection'));
        });
    </script>

    <!-- CSRF Token injection for HTMX requests -->
    <script>
        (function () {
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            }
            const token = getCookie('csrf_token');
            if (token) {
                document.addEventListener('htmx:configRequest', function (evt) {
                    if (['post', 'put', 'patch', 'delete'].includes(evt.detail.verb)) {
                        evt.detail.headers['X-CSRF-Token'] = decodeURIComponent(token);
                    }
                });
            }
        })();
    </script>
    <script src="/static/js/vendor/htmx.min.js?v=1780078439"></script>
    <script src="/static/js/toast.js?v=1780078439"></script>
    <script defer src="/static/js/auth-customer-carousel.js?v=1780078439"></script>
    <script defer src="/static/js/pwa-install.js?v=1780078439"></script>

    <!-- Design tokens only (no dashboard CSS) -->
    <link rel="stylesheet" href="/static/css/dashboard-tokens.css?v=1780078439" />

    <!-- Auth page CSS -->
    <link rel="stylesheet" href="/static/css/login.css?v=1780078439" />

    <!-- Reveal body once CSS is ready (required by dashboard-tokens.css anti-flicker rule) -->
    <script>
        (function () {
            if (document.readyState !== 'loading') {
                document.body && document.body.classList.add('dom-ready');
            }
            document.addEventListener('DOMContentLoaded', function () {
                document.body.classList.add('dom-ready');
            });
            setTimeout(function () {
                document.body && document.body.classList.add('dom-ready');
            }, 500);
        })();
    </script>
</head>

<body>
  
  <a id="back-link" href="https://poool.app">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    Back
  </a>
  
  <div id="login-container">
    <section id="left-section">
      <div id="container">
        <div id="content">
          <!-- Header -->
          <div id="header">
            <div id="logo-pool">
              <img src="/static/images/icons/logo-pool.svg" alt="Pool Logo" width="184" height="48">
            </div>
            <div id="text-and-supporting-text">
              <h1 id="text">Welcome back</h1>
              <p id="supporting-text">Access your portfolio, wallet, and active ownership account.</p>
            </div>
          </div>

          <!-- Error area -->
          <div id="auth-error" aria-live="polite">
            
          </div>

          
          <!-- Social login buttons -->
          <div id="social-buttons">
            <button id="google-button" class="social-button" onclick="window.location.href='/auth/google'">
              <div class="social-icon">
                <img  src="/static/images/icons/social-google.svg" alt="Google" width="24" height="24">
              </div>
              <span class="social-text">Continue with Google</span>
            </button>
          </div>

          <!-- Divider -->
          <div id="content-divider">
            <div id="divider-left"></div>
            <span id="or-text">or log in with email</span>
            <div id="divider-right"></div>
          </div>
          

          <!-- Login form -->
          <form id="login-form" method="post" action="/auth/login" hx-post="/auth/login" hx-target="#auth-error" hx-swap="innerHTML" aria-busy="false">
            <input type="hidden" id="csrf-token-input" name="csrf_token" value="47ef2fd5-5515-4225-9ebb-6b1b9881902f">
            <div class="input-field">
              <div class="input-with-label">
                <label for="email-input" class="input-label">Email</label>
                <div class="input-wrapper">
                  <input type="email" id="email-input" name="email" placeholder="Enter your email" required autocomplete="email">
                </div>
              </div>
            </div>

            <div class="input-field">
              <div class="input-with-label">
                <label for="password-input" class="input-label">Password</label>
                <div class="input-wrapper">
                  <input type="password" id="password-input" name="password" placeholder="Enter your password" required autocomplete="current-password">
                  <button type="button" id="toggle-password" aria-label="Show password" aria-pressed="false" onclick="var i=document.getElementById('password-input');var isHidden=i.type==='password';i.type=isHidden?'text':'password';this.setAttribute('aria-pressed', isHidden ? 'true' : 'false');this.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');this.querySelector('.eye-off').style.display=isHidden?'block':'none';this.querySelector('.eye-on').style.display=isHidden?'none':'block';">
                    <svg class="eye-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#667085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg class="eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#667085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                  </button>
                </div>
              </div>
            </div>

            <div id="remember-forgot-row">
              <div id="remember-me">
                <input type="checkbox" id="remember-checkbox" name="remember">
                <label for="remember-checkbox">Remember me</label>
              </div>
              <a href="/auth/forgot-password" id="forgot-password-link">
                <span id="forgot-password-text">Forgot password?</span>
              </a>
            </div>

            <button type="submit" id="login-button" aria-busy="false">
              <span id="button-text">Log in</span>
            </button>
          </form>

          <!-- Sign up link -->
          <div id="signup-row">
            <span id="signup-text">Don't have an account?</span>
            
            <a href="/auth/signup" id="signup-link">
            
              <span id="signup-link-text">Sign up</span>
            </a>
          </div>
        </div>
      </div>
    </section>

    <section id="right-section">
      
      <div class="auth-customer-carousel" data-auth-carousel aria-label="Customer stories">
  <img
    class="auth-customer-carousel__image"
    data-auth-carousel-image
    src="/static/images/auth/generated/customer-ardi.webp"
    alt="POOOL customer portrait"
    width="1536"
    height="1024"
    fetchpriority="high"
  >
  <div class="auth-customer-carousel__quote" aria-live="polite">
    <div class="auth-customer-carousel__copy">
      <div class="auth-customer-carousel__kicker">Customer story</div>
      <blockquote data-auth-carousel-quote>"I always know what I am signing into: my wallet, my assets, and the next step."</blockquote>
    </div>
    <div class="auth-customer-carousel__person">
      <strong data-auth-carousel-name>Ardi Pratama</strong>
      <span>POOOL customer</span>
    </div>
  </div>
  <div class="auth-customer-carousel__controls">
    <button type="button" class="auth-customer-carousel__arrow" data-auth-carousel-prev aria-label="Previous customer story">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="auth-customer-carousel__dots" aria-label="Customer story pagination">
      <button type="button" class="auth-customer-carousel__dot is-active" data-auth-carousel-dot aria-label="Show customer story 1"></button>
      <button type="button" class="auth-customer-carousel__dot" data-auth-carousel-dot aria-label="Show customer story 2"></button>
      <button type="button" class="auth-customer-carousel__dot" data-auth-carousel-dot aria-label="Show customer story 3"></button>
    </div>
    <button type="button" class="auth-customer-carousel__arrow" data-auth-carousel-next aria-label="Next customer story">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
</div>
      
    </section>
  </div>

  <script>
    (function () {
      function getCookie(name) {
        var value = '; ' + document.cookie;
        var parts = value.split('; ' + name + '=');
        if (parts.length === 2) {
          return parts.pop().split(';').shift();
        }
        return '';
      }
      var csrfInput = document.getElementById('csrf-token-input');
      if (csrfInput) {
        var cookieToken = getCookie('csrf_token');
        if (cookieToken) {
          csrfInput.value = decodeURIComponent(cookieToken);
        }
      }
    })();

  </script>

  <script>
    document.body.addEventListener('htmx:beforeSwap', function (evt) {
      if (evt.detail.xhr.status >= 400) {
        evt.detail.shouldSwap = true;
        evt.detail.isError = false;
      }
    });

    document.body.addEventListener('htmx:beforeRequest', function (evt) {
      var csrfInput = document.getElementById('csrf-token-input');
      if (csrfInput) {
        var match = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]+)/);
        if (match) { csrfInput.value = decodeURIComponent(match[1]); }
      }
      var btn = document.getElementById('login-button');
      var form = document.getElementById('login-form');
      if (form) {
        form.setAttribute('aria-busy', 'true');
      }
      if (btn) {
        btn.disabled = true;
        btn.setAttribute('aria-busy', 'true');
        btn.querySelector('#button-text').textContent = 'Logging in...';
      }
    });

    document.body.addEventListener('htmx:afterRequest', function (evt) {
      var btn = document.getElementById('login-button');
      var form = document.getElementById('login-form');
      if (form) {
        form.setAttribute('aria-busy', 'false');
      }
      if (btn) {
        btn.disabled = false;
        btn.setAttribute('aria-busy', 'false');
        btn.querySelector('#button-text').textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
