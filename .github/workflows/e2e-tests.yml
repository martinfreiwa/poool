# ═══════════════════════════════════════════════════════════════
# POOOL — GitHub Actions CI: E2E Tests
# ═══════════════════════════════════════════════════════════════
# Runs Playwright E2E tests on every push and PR.
# Uses the official Playwright GitHub Action for browser setup.
# Uploads test reports, screenshots, and traces as artifacts.

name: E2E Tests

on:
  pull_request:
    branches: [main, staging]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      test_markers:
        description: "pytest markers to run (e.g. 'smoke', 'admin', '-m not slow')"
        required: false
        default: ""
      base_url:
        description: "Base URL to test against"
        required: false
        default: "http://localhost:8888"

# Cancel previous runs on the same branch (save CI minutes)
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:8888' }}
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/poool_test
  ADMIN_EMAIL: admin@poool.app
  ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
  POOOL_ENV: development
  RUST_LOG: warn

jobs:
  e2e-tests:
    name: "🧪 E2E Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # PostgreSQL service container for test database
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: poool_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        # Run smoke tests first, then full suite
        shard: [1, 2]

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Rust Backend Setup ────────────────────────────────────
      - name: 🦀 Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 📦 Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 🔨 Build backend
        working-directory: backend
        run: cargo build --release
        env:
          SQLX_OFFLINE: true

      # ── Database Setup ────────────────────────────────────────
      - name: 🗄️ Apply database migrations
        run: |
          for f in database/*.sql; do
            echo "Applying $f..."
            PGPASSWORD=postgres psql -h localhost -U postgres -d poool_test -f "$f" || true
          done

      # ── Start Backend ─────────────────────────────────────────
      - name: 🚀 Start backend server
        working-directory: backend
        run: |
          ./target/release/poool-backend &
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            curl -s http://localhost:8888/health && break || sleep 1
          done
          echo "Server is ready!"
        env:
          SERVER_PORT: "8888"
          BASE_URL: "http://localhost:8888"

      # ── Python & Playwright Setup ─────────────────────────────
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/e2e/requirements.txt

      - name: 🎭 Install Playwright browsers
        run: playwright install --with-deps chromium

      # ── Run E2E Tests ─────────────────────────────────────────
      - name: 🧪 Run E2E Tests (Shard ${{ matrix.shard }}/2)
        run: |
          MARKERS="${{ github.event.inputs.test_markers }}"
          MARKER_ARG=""
          if [ -n "$MARKERS" ]; then
            MARKER_ARG="-m $MARKERS"
          fi
          pytest tests/e2e/ \
            -v \
            --tb=short \
            --timeout=90 \
            --html=tests/e2e/reports/report_shard${{ matrix.shard }}.html \
            --self-contained-html \
            --numprocesses=auto \
            --dist=loadscope \
            $MARKER_ARG \
            || true  # Don't fail the step — we want artifacts

      # ── Upload Test Artifacts ─────────────────────────────────
      - name: 📸 Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-shard-${{ matrix.shard }}
          path: tests/e2e/screenshots/
          retention-days: 14
          if-no-files-found: ignore

      - name: 📊 Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-shard-${{ matrix.shard }}
          path: tests/e2e/reports/
          retention-days: 30
          if-no-files-found: ignore

      - name: 🔍 Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-traces-shard-${{ matrix.shard }}
          path: tests/e2e/traces/
          retention-days: 7
          if-no-files-found: ignore

      - name: 📋 Upload quality reports (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-quality-reports-shard-${{ matrix.shard }}
          path: tests/e2e/reports/*.json
          retention-days: 14
          if-no-files-found: ignore

  # ── Summary Job ───────────────────────────────────────────────
  e2e-summary:
    name: "📋 Test Summary"
    needs: e2e-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-report-*
          merge-multiple: true

      - name: 📋 Generate summary
        run: |
          echo "## 🧪 E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Shard | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Shard 1 | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Shard 2 | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📸 Screenshots and 🔍 Traces are available as artifacts above." >> $GITHUB_STEP_SUMMARY
