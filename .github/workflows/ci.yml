name: CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'database/**'
      - 'scripts/**'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'database/**'
      - 'scripts/**'
      - 'Dockerfile'
      - '.github/workflows/ci.yml'
  workflow_call:

# Cancel superseded runs on the same branch — saves minutes when you push twice in quick succession
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # ── 1. Rust Checks ───────────────────────────────────────────
  rust-check:
    name: Rust — Format, Lint & Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint with Clippy (warnings as errors)
        run: cargo clippy -- -D warnings

      - name: Build check
        run: cargo check --locked

      - name: Run unit tests
        run: cargo test --locked

  # ── 1b. Affiliate Integration Tests (live Postgres) ──────────
  # Phase-2 P0: money-state-machine + integration tests previously sat
  # behind `#[ignore]` and were therefore invisible to CI. This job spins
  # up a throwaway Postgres, applies every migration in `database/*.sql`,
  # then runs the affiliate-tagged ignored tests so commission counter
  # drift, partial-unique races, and multi-currency regressions all fail
  # the build instead of shipping silently.
  affiliate-integration:
    name: Rust — Affiliate Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-check]
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: poool
          POSTGRES_PASSWORD: poool
          POSTGRES_DB: poool
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://poool:poool@localhost:5432/poool
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Apply migrations
        # Backend's `run_migrations` walks `database/*.sql` in name order;
        # we replicate that here with `psql -f` so the test DB matches prod
        # schema before any test row is inserted.
        run: |
          for f in $(ls ../database/*.sql | sort); do
            echo "applying $(basename $f)"
            PGPASSWORD=poool psql -h localhost -U poool -d poool -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run affiliate integration tests (live DB)
        run: |
          cargo test --locked --test affiliate_state_machine
          cargo test --locked --test affiliate_money_invariants -- --ignored

  # ── 2. Security Audit ────────────────────────────────────────
  security-audit:
    name: Security — Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit --ignore RUSTSEC-2023-0071

  # ── 3. Frontend Validation ───────────────────────────────────
  frontend-check:
    name: Frontend — HTML Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for broken internal links
        run: python3 scripts/check_links_ci.py

  # ── 4. Docker Build Check ────────────────────────────────────
  docker-build:
    name: Docker — Build Image
    runs-on: ubuntu-latest
    needs: [rust-check]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: poool-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
