name: Deploy to Cloud Run (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  SERVICE_NAME: poool-backend
  IMAGE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/poool-backend

jobs:
  # ── 1. Run CI checks first ───────────────────────────────────
  pre-deploy-checks:
    name: Pre-deploy CI Checks
    uses: ./.github/workflows/ci.yml

  # ── 2. Deploy ────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks]
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Europe West 1 Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }},${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "APP_ENV=production" \
            --set-env-vars "SERVER_HOST=0.0.0.0" \
            --set-env-vars "SERVER_PORT=8080" \
            --set-env-vars "RUST_LOG=warn" \
            --set-secrets "DATABASE_URL=poool-database-url:latest" \
            --set-secrets "JWT_SECRET=poool-jwt-secret:latest" \
            --set-secrets "ENCRYPTION_KEY=poool-encryption-key:latest" \
            --set-secrets "RESEND_API_KEY=poool-resend-api-key:latest" \
            --set-secrets "GOOGLE_CLIENT_ID=poool-google-client-id:latest" \
            --set-secrets "GOOGLE_CLIENT_SECRET=poool-google-client-secret:latest"

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "Service deployed at: $SERVICE_URL"
          
          # Health check
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health" || echo "000")
          echo "Health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "WARNING: Health check did not return 200 (got $HTTP_STATUS)"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment FAILED for ${{ env.SERVICE_NAME }} @ ${{ github.sha }}"
