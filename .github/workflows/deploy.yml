name: Deploy to Cloud Run (Production)

on:
  # Auto-deploy on push disabled — deploys done manually from laptop for now.
  # Re-enable by adding `push: { branches: [main] }`.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  SERVICE_NAME: poool-backend
  IMAGE: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/poool-backend

jobs:
  # ── 1. Run CI checks first ───────────────────────────────────
  pre-deploy-checks:
    name: Pre-deploy CI Checks
    uses: ./.github/workflows/ci.yml

  pre-deploy-e2e:
    name: Pre-deploy E2E Checks
    uses: ./.github/workflows/e2e-tests.yml
    secrets: inherit

  # ── 2. Deploy ────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, pre-deploy-e2e]
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/745757325286/locations/global/workloadIdentityPools/github-actions/providers/github-actions-provider'
          service_account: 'github-actions-deployment@my-project-35266-489713.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Europe West 1 Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure chain settlement secret exists
        run: |
          set -e
          SECRET=chain-settlement-private-key
          if ! gcloud secrets describe "$SECRET" >/dev/null 2>&1; then
            echo "Secret $SECRET missing — creating placeholder. Populate it via Secret Manager before settlement will work."
            gcloud secrets create "$SECRET" --replication-policy=automatic
            printf 'PLACEHOLDER_NOT_CONFIGURED' | gcloud secrets versions add "$SECRET" --data-file=-
          fi
          # Idempotent accessor grant for the Cloud Run runtime SA (default compute SA)
          PROJECT_NUMBER=$(gcloud projects describe "$PROJECT_ID" --format='value(projectNumber)')
          RUNTIME_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          gcloud secrets add-iam-policy-binding "$SECRET" \
            --member="serviceAccount:${RUNTIME_SA}" \
            --role="roles/secretmanager.secretAccessor" \
            --condition=None >/dev/null
          echo "CHAIN_SECRET_ARG=--set-secrets=CHAIN_SETTLEMENT_PRIVATE_KEY=${SECRET}:latest" >> "$GITHUB_ENV"

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }},${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "APP_ENV=production" \
            --set-env-vars "BASE_URL=https://platform.poool.app" \
            --set-env-vars "CORS_ALLOWED_ORIGINS=https://platform.poool.app" \
            --set-env-vars "SERVER_HOST=0.0.0.0" \
            --set-env-vars "SERVER_PORT=8080" \
            --set-env-vars "RUST_LOG=warn" \
            --set-env-vars "GCS_BUCKET_NAME=poool-assets-primary" \
            --set-env-vars "CHAIN_RPC_URL=https://rpc-amoy.polygon.technology" \
            --set-env-vars "CHAIN_ID=80002" \
            --set-env-vars "CHAIN_CONTRACT_ADDRESS=0xeAd7b2eD1CcD81b8a0004312C21Cd99930d4c1ca" \
            --set-env-vars "CHAIN_IDENTITY_REGISTRY_ADDRESS=0xE9DBbDC87928eAeD9c3c5A9F737365a3D7230306" \
            --set-env-vars "CHAIN_IMPLEMENTATION_ADDRESS=0xb61CCe33B546a5C7c36F0B58119e7F4B3D1D04e5" \
            --set-env-vars "CHAIN_SETTLEMENT_ADDRESS=0x021F6B0029125B3924FF5Ba3e0FF59e1FA39B88a" \
            --set-env-vars "CHAIN_SETTLEMENT_ENABLED=true" \
            --set-env-vars "CHAIN_NETWORK=polygon_amoy" \
            --set-env-vars "CHAIN_MAX_BATCH_SIZE=50" \
            --set-secrets "DATABASE_URL=poool-database-url:latest" \
            --set-secrets "JWT_SECRET=poool-jwt-secret:latest" \
            --set-secrets "SESSION_SECRET=poool-jwt-secret:latest" \
            --set-secrets "ENCRYPTION_KEY=poool-encryption-key:latest" \
            --set-secrets "TOTP_SECRET_ENCRYPTION_KEY=poool-encryption-key:latest" \
            --set-secrets "GOOGLE_CLIENT_ID=poool-google-client-id:latest" \
            --set-secrets "GOOGLE_CLIENT_SECRET=poool-google-client-secret:latest" \
            --set-secrets "REDIS_URL=poool-redis-url:latest" \
            $CHAIN_SECRET_ARG

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "Service deployed at: $SERVICE_URL"
          
          READY_BODY=$(curl -fsS "$SERVICE_URL/ready")
          echo "$READY_BODY"
          python3 - <<'PY' "$READY_BODY"
          import json
          import sys

          body = json.loads(sys.argv[1])
          if body.get("status") != "ok":
              raise SystemExit(f"readiness status is not ok: {body.get('status')}")
          env = body.get("components", {}).get("env", {})
          missing = [k for k, v in env.items() if v != "ok"]
          if missing:
              raise SystemExit(f"readiness env components missing: {', '.join(missing)}")
          PY

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment FAILED for ${{ env.SERVICE_NAME }} @ ${{ github.sha }}"
