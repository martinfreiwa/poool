[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "paris"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

# Fuzz testing config
[fuzz]
runs = 10000
max_test_rejects = 65536
seed = "0xdeadbeef"

# Invariant testing config
[invariant]
runs = 256
depth = 100
fail_on_revert = false

# ──────────────────────────────────────────────────────────────
#  RPC ENDPOINTS
# ──────────────────────────────────────────────────────────────

[rpc_endpoints]
polygon_amoy = "${POLYGON_AMOY_RPC_URL}"
polygon_mainnet = "${POLYGON_MAINNET_RPC_URL}"
localhost = "http://localhost:8545"

