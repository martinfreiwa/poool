; ═══════════════════════════════════════════════════════════════════
; PgBouncer Configuration — POOOL Backend Connection Pooling Sidecar
;
; Deployed as a sidecar process alongside the Rust backend.
; The backend connects to PgBouncer on localhost:6432,
; PgBouncer connects to the actual PostgreSQL instance.
;
; Phase 0.5 — Infrastructure
; ═══════════════════════════════════════════════════════════════════

[databases]
; The backend connects to: postgres://poool@127.0.0.1:6432/poool
; PgBouncer proxies to the real database via DATABASE_URL (set via env)
; The actual connection string is injected at runtime via the entrypoint script.
; Placeholder — overwritten by entrypoint.sh at startup.
* = host=PLACEHOLDER port=5432

[pgbouncer]
; Listen on localhost only (sidecar pattern, not exposed externally)
listen_addr = 127.0.0.1
listen_port = 6432

; Authentication
auth_type = trust
; No auth file needed when using trust mode in a sidecar container

; Connection pooling mode
; "transaction" mode: connections are returned to the pool after each transaction.
; Best for web apps — each HTTP request gets a fresh connection.
pool_mode = transaction

; Pool sizing
; These values complement the Rust-side pool tuning in db.rs:
; Rust PgPool max_connections=30 → PgBouncer handles the overflow.
default_pool_size = 25
min_pool_size = 5
max_client_conn = 100
max_db_connections = 30
reserve_pool_size = 5
reserve_pool_timeout = 3

; Timeouts
server_idle_timeout = 120
server_connect_timeout = 5
server_login_retry = 3
query_timeout = 60
query_wait_timeout = 30
client_idle_timeout = 300

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; TLS (handled by Cloud SQL proxy / Unix socket — not needed here)
; server_tls_sslmode = prefer

; Stats
stats_period = 60

; Admin console (disabled in production)
admin_users =
