<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - POOOL</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/signup.css">
</head>

<body>
    <div id="signup-container">
        <section id="left-section">
            <div id="container">
                <div id="content">
                    <!-- Header -->
                    <div id="header">
                        <div id="logo-pool">
                            <img src="/static/images/logo-pool.svg" alt="Pool Logo" width="184" height="48">
                        </div>
                        <div id="text-and-supporting-text">
                            <h1 id="text">Create an account</h1>
                            <p id="supporting-text">Start your investment journey</p>
                        </div>
                    </div>

                    <div id="content-inner">
                        <!-- Error message container -->
                        <div id="auth-error">
                            {% if error %}
                            <div class="auth-error-message"
                                style="color: #F04438; background: #FEF3F2; border: 1px solid #FEE4E2; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 14px;">
                                {{ error }}
                            </div>
                            {% endif %}
                        </div>

                        <!-- Social login buttons -->
                        <div id="social-buttons"
                            style="display: flex; flex-direction: column; gap: 12px; margin-top: 12px;">
                            <button id="google-button" class="social-button"
                                onclick="window.location.href='/auth/google'">
                                <div class="social-icon">
                                    <img src="/static/images/social-google.svg" alt="Google" width="24" height="24">
                                </div>
                                <span class="social-text">Sign up with Google</span>
                            </button>
                        </div>

                        <!-- Divider -->
                        <div id="content-divider">
                            <div id="divider-left"></div>
                            <span id="or-text">OR</span>
                            <div id="divider-right"></div>
                        </div>

                        <!-- Signup form (email + password) -->
                        <form id="signup-form" hx-post="/auth/signup" hx-target="#auth-error" hx-swap="innerHTML">

                            <div id="input-field">
                                <div id="input-with-label">
                                    <div class="label-wrapper">
                                        <label for="email-input" class="input-label">Email</label>
                                    </div>
                                    <div id="email-input-wrapper">
                                        <input type="email" id="email-input" name="email" placeholder="Enter your email"
                                            required autocomplete="email">
                                    </div>
                                </div>
                            </div>

                            <div id="input-field-password">
                                <div id="input-with-label-password">
                                    <div class="label-wrapper">
                                        <label for="password-input" class="input-label">Password</label>
                                    </div>
                                    <div id="password-input-wrapper">
                                        <input type="password" id="password-input" name="password"
                                            placeholder="Create a strong password" required autocomplete="new-password"
                                            minlength="8">
                                    </div>
                                </div>
                                <p style="font-size: 12px; color: #667085; margin-top: 6px;">
                                    Min. 8 characters, uppercase, lowercase, and a number
                                </p>
                            </div>

                            <button type="submit" id="get-started-button">
                                <div id="button-text-padding">
                                    <span id="button-text">Get started</span>
                                </div>
                            </button>
                        </form>

                        <!-- Login link -->
                        <div id="login-row">
                            <span id="login-text">Already have an account?</span>
                            <a href="/auth/login" id="login-link">
                                <span id="login-link-text">Log in</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="right-section">
            <div id="testimonial-image"></div>
        </section>
    </div>
</body>

</html>
